async function autoTranslate(word) {
  try {
    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=es|en`);
    const data = await res.json();
    return data.responseData?.translatedText || '';
  } catch { return ''; }
}

function GlosarioInner({ dark }) {
  const onBack = null; // embedded inside Vocabulario – no standalone back needed
  const [entries, setEntries] = useState(() => {
    const saved = getStorage('aprende.glossary', null);
    if (saved && saved.length > 0) return saved;
    const seeded = GLOSSARY_SEED.map((e, i) => ({...e, id: Date.now() + i}));
    setStorage('aprende.glossary', seeded);
    return seeded;
  });
  const [tab, setTab] = useState('lista');
  const [search, setSearch] = useState('');
  const [sort, setSort] = useState('reciente');
  const [typeFilter, setTypeFilter] = useState('all');
  const [showAdd, setShowAdd] = useState(false);
  const [newEs, setNewEs] = useState('');
  const [newEn, setNewEn] = useState('');
  const [newType, setNewType] = useState('noun');
  const [newExample, setNewExample] = useState('');
  const [translating, setTranslating] = useState(false);

  // Flashcard / SRS state
  const [srs, setSrs] = useState(() => getStorage('aprende.srs', {}));
  const [cardIdx, setCardIdx] = useState(0);
  const [cardFlipped, setCardFlipped] = useState(false);
  const [cardDir, setCardDir] = useState('es-en'); // 'es-en' or 'en-es'

  useEffect(() => { setStorage('aprende.srs', srs); }, [srs]);

  // Build a due deck (cards never reviewed OR due today)
  const now = Date.now();
  const dueDeck = entries.filter(e => {
    const r = srs[e.id];
    if (!r) return true;
    return (r.due || 0) <= now;
  });
  const deck = dueDeck.length > 0 ? dueDeck : entries;
  const currentCard = deck[cardIdx % Math.max(deck.length, 1)];

  const recordReview = (quality) => {
    // quality: 0 (again), 1 (hard), 2 (good), 3 (easy)
    if (!currentCard) return;
    const prev = srs[currentCard.id] || { ease: 2.5, interval: 0, reps: 0 };
    let { ease, interval, reps } = prev;
    if (quality === 0) {
      reps = 0;
      interval = 0;
      ease = Math.max(1.3, ease - 0.2);
    } else {
      reps += 1;
      if (reps === 1) interval = 1;
      else if (reps === 2) interval = 3;
      else interval = Math.round(interval * ease);
      if (quality === 1) { ease = Math.max(1.3, ease - 0.15); interval = Math.max(1, Math.round(interval * 0.6)); }
      if (quality === 3) ease = ease + 0.15;
    }
    const due = Date.now() + interval * 86400000;
    setSrs(prev => ({ ...prev, [currentCard.id]: { ease, interval, reps, due, lastReviewed: Date.now() } }));
    setCardFlipped(false);
    setCardIdx(i => i + 1);
  };

  useEffect(() => {
    setStorage('aprende.glossary', entries);
  }, [entries]);

  const matchesType = (e) => {
    if (typeFilter === 'all') return true;
    if (typeFilter === 'adj') return e.type === 'adj' || e.type === 'adjective';
    return e.type === typeFilter;
  };
  const filtered = entries.filter(e =>
    matchesType(e) && (
      e.es.toLowerCase().includes(search.toLowerCase()) ||
      (e.en && e.en.toLowerCase().includes(search.toLowerCase()))
    )
  ).sort((a, b) => {
    if (sort === 'reciente') return b.id - a.id;
    if (sort === 'az') return a.es.localeCompare(b.es);
    if (sort === 'tipo') return (a.type || '').localeCompare(b.type || '');
    return 0;
  });

  const stats = {
    total: entries.length,
    noun: entries.filter(e => e.type === 'noun').length,
    verb: entries.filter(e => e.type === 'verb').length,
    adj: entries.filter(e => e.type === 'adj' || e.type === 'adjective').length,
    phrase: entries.filter(e => e.type === 'phrase').length,
  };

  const handleAutoTranslate = async () => {
    if (!newEs.trim()) return;
    setTranslating(true);
    const translated = await autoTranslate(newEs.trim());
    setNewEn(translated);
    setTranslating(false);
  };

  const handleAdd = async () => {
    if (!newEs.trim()) return;
    let en = newEn.trim();
    if (!en) {
      setTranslating(true);
      en = await autoTranslate(newEs.trim());
      setTranslating(false);
    }
    const entry = {
      id: Date.now(),
      es: newEs.trim(),
      en,
      type: newType,
      example: newExample.trim() || undefined,
    };
    setEntries(prev => [entry, ...prev]);
    setNewEs(''); setNewEn(''); setNewType('noun'); setNewExample('');
    setShowAdd(false);
  };

  const handleDelete = (id) => {
    setEntries(prev => prev.filter(e => e.id !== id));
  };

  const handleExportCSV = () => {
    const escape = (s) => {
      const v = (s == null ? '' : String(s));
      return /[",\n]/.test(v) ? `"${v.replace(/"/g, '""')}"` : v;
    };
    const header = ['Español','English','Tipo','Ejemplo'];
    const rows = entries.map(e => [e.es, e.en || '', e.type || '', e.example || ''].map(escape).join(','));
    const csv = '\ufeff' + [header.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `glosario-${todayStr()}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  // Anki-importable TSV. Anki desktop auto-detects #separator:tab and #html:true directives.
  // Open Anki → File → Import → choose the .txt file.
  const handleExportAnki = () => {
    const escape = (s) => String(s || '').replace(/\t/g,' ').replace(/\r?\n/g,'<br>');
    const rows = entries.map(e => [
      escape(e.es),
      escape(e.en) + (e.example ? `<br><i>${escape(e.example)}</i>` : ''),
      [e.type, 'glosario', 'aprende'].filter(Boolean).join(' ')
    ].join('\t'));
    const txt = '#separator:tab\n#html:true\n' + rows.join('\n');
    const blob = new Blob([txt], { type: 'text/plain;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `anki-glosario-${todayStr()}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const typePills = [
    { id:'all',    label:'Todos',  count: stats.total },
    { id:'noun',   label:'Noun',   count: stats.noun, color:'text-blue-500' },
    { id:'verb',   label:'Verb',   count: stats.verb, color:'text-green-500' },
    { id:'adj',    label:'Adj',    count: stats.adj,  color:'text-pink-500' },
    { id:'phrase', label:'Phrase', count: stats.phrase, color:'text-orange-500' },
  ];

  return (
    <div>
      <div className="px-4 lg:px-8 py-6 max-w-6xl mx-auto">
        <div className="flex items-center justify-between mb-4 lg:mb-6">
          <div>
            <h2 className={`text-lg font-serif font-bold ${dark ? 'text-white' : 'text-stone-800'}`}>Mi glosario personal</h2>
            <p className={`text-sm mt-0.5 ${dark ? 'text-stone-400' : 'text-stone-500'}`}>{dueDeck.length} para repasar</p>
          </div>
          <div className="hidden lg:flex items-center gap-2">
            <div className="flex flex-col items-end gap-0.5">
              <div className="flex items-center gap-2">
                <button onClick={handleExportAnki} title="Anki is a free spaced-repetition flashcard app. Open Anki → File → Import → pick this .txt file." className={`px-3 py-2 rounded-xl text-sm font-semibold transition-colors ${dark ? 'bg-white/[0.08] text-stone-200 hover:bg-white/[0.12]' : 'bg-stone-100 text-stone-700 hover:bg-stone-200'}`}>🃏 Anki</button>
                <button onClick={handleExportCSV} className={`px-3 py-2 rounded-xl text-sm font-semibold transition-colors ${dark ? 'bg-white/[0.08] text-stone-200 hover:bg-white/[0.12]' : 'bg-stone-100 text-stone-700 hover:bg-stone-200'}`}>⬇️ CSV</button>
                <button onClick={() => setShowAdd(true)} className="bg-orange-500 text-white px-4 py-2 rounded-xl text-sm font-semibold">+ Añadir</button>
              </div>
              <p className={`text-[10px] ${dark ? 'text-stone-600' : 'text-stone-400'}`}>🃏 Anki = free flashcard app (spaced repetition) · File → Import in Anki desktop</p>
            </div>
          </div>
        </div>

        <div className="mb-5">
          <TabBar dark={dark} tabs={[{id:'lista',label:'Lista'},{id:'tarjetas',label:`Tarjetas (${dueDeck.length})`}]} active={tab} onChange={(t) => { setTab(t); setCardFlipped(false); setCardIdx(0); }} />
        </div>

        {tab === 'lista' && (<>
        {/* Type filter pills (doubles as stats) */}
        <div className="flex flex-wrap gap-2 mb-5">
          {typePills.map(p => (
            <button key={p.id} onClick={() => setTypeFilter(p.id)}
              className={`px-4 py-2 rounded-full text-sm font-semibold transition-all flex items-center gap-2 ${typeFilter === p.id ? 'bg-orange-500 text-white' : dark ? 'bg-white/[0.06] text-stone-300 hover:bg-white/[0.10]' : 'bg-stone-100 text-stone-600 hover:bg-stone-200'}`}>
              <span>{p.label}</span>
              <span className={`text-xs font-bold ${typeFilter === p.id ? 'text-white/80' : (p.color || (dark ? 'text-stone-500' : 'text-stone-400'))}`}>{p.count}</span>
            </button>
          ))}
        </div>

        {/* Search + Sort */}
        <div className="flex gap-2 mb-4">
          <input value={search} onChange={e => setSearch(e.target.value)}
            placeholder="Buscar..."
            className={`flex-1 rounded-xl px-4 py-2.5 text-sm outline-none border transition-colors ${dark ? 'bg-white/[0.06] border-white/[0.10] text-white placeholder-stone-500' : 'bg-white border-stone-200 text-stone-900 placeholder-stone-400'}`} />

function buildSearchIndex() {
  const idx = [];
  // Words of day
  WORDS_OF_DAY.forEach(w => idx.push({ kind:'Palabra', section:'hoy', es:w.es, en:w.en, hint:w.example }));
  // Phrases of day
  PHRASES_OF_DAY.forEach(p => idx.push({ kind:'Frase', section:'hoy', es:p.es, en:p.en, hint:p.example }));
  // Tenses
  Object.keys(TENSES || {}).forEach(group => {
    (TENSES[group] || []).forEach(t => idx.push({ kind:'Tiempo', section:'tiempos', es:t.title, en:t.subtitle, hint:t.concept }));
  });
  // Cheat sheets
  (typeof CHEAT_SHEETS !== 'undefined' ? CHEAT_SHEETS : []).forEach(c => idx.push({ kind:'Chuleta', section:'chuletas', es:c.title || c.titleEs || '', en:c.subtitle || c.titleEn || '', hint:c.concept || c.intro || '' }));
  // Vocab themes
  (typeof VOCAB_THEMES !== 'undefined' ? VOCAB_THEMES : []).forEach(t => {
    (t.words || []).forEach(w => idx.push({ kind:'Vocab', section:'vocabulario', es:w.es, en:w.en, hint:w.example }));
  });
  // Connectors
  (typeof CONNECTORS !== 'undefined' ? CONNECTORS : []).forEach(g => {
    (g.items || g.connectors || []).forEach(c => idx.push({ kind:'Conector', section:'conectores', es:c.es || c.word, en:c.en, hint:c.example }));
  });
  // Situational phrases
  (typeof SITUATIONAL_PHRASES !== 'undefined' ? SITUATIONAL_PHRASES : []).forEach(g => {
    (g.phrases || g.items || []).forEach(p => idx.push({ kind:'Frase', section:'frases', es:p.es, en:p.en, hint:p.example || p.when }));
  });
  // Idioms
  (typeof IDIOMS !== 'undefined' ? IDIOMS : []).forEach(i => idx.push({ kind:'Modismo', section:'frases', es:i.es, en:i.meaning || i.en, hint:i.example }));
  // Business vocab
  (typeof BUSINESS_VOCAB !== 'undefined' ? BUSINESS_VOCAB : []).forEach(g => {
    (g.items || []).forEach(it => idx.push({ kind:'Negocios · Vocab', section:'negocios', es:it.es, en:it.en, hint:it.example }));
  });
  // Business phrases
  (typeof BUSINESS_PHRASES !== 'undefined' ? BUSINESS_PHRASES : []).forEach(g => {
    (g.items || []).forEach(it => idx.push({ kind:'Negocios · Frase', section:'negocios', es:it.es, en:it.en, hint:it.when }));
  });
  // Business dialogs
  (typeof BUSINESS_DIALOGS !== 'undefined' ? BUSINESS_DIALOGS : []).forEach(d => {
    idx.push({ kind:'Negocios · Diálogo', section:'negocios', es:d.title, en:d.titleEn, hint:d.setting });
  });
  // Business cheat sheets
  (typeof BUSINESS_SHEETS !== 'undefined' ? BUSINESS_SHEETS : []).forEach(s => {
    idx.push({ kind:'Negocios · Chuleta', section:'negocios', es:s.title, en:s.titleEn, hint:s.intro });
  });
  return idx;
}

// NOTE: SEARCH_INDEX is built lower, after the BUSINESS_* constants are defined,
// so that Negocios content can be indexed without hitting a const temporal dead zone.
let SEARCH_INDEX = [];

function GlobalSearch({ open, onClose, onJump }) {
  const [q, setQ] = useState('');
  useEffect(() => { if (!open) setQ(''); }, [open]);
  if (!open) return null;
  const query = q.trim().toLowerCase();
  const results = query.length < 2 ? [] : SEARCH_INDEX.filter(r =>
    (r.es && r.es.toLowerCase().includes(query)) ||
    (r.en && r.en.toLowerCase().includes(query)) ||
    (r.hint && r.hint.toLowerCase().includes(query))
  ).slice(0, 50);

  const KIND_COLOR = {
    'Palabra':'bg-orange-100 text-orange-700',
    'Frase':'bg-rose-100 text-rose-700',
    'Tiempo':'bg-blue-100 text-blue-700',
    'Chuleta':'bg-purple-100 text-purple-700',
    'Vocab':'bg-emerald-100 text-emerald-700',
    'Conector':'bg-teal-100 text-teal-700',
    'Modismo':'bg-pink-100 text-pink-700',
  };

  return (
    <div className="fixed inset-0 z-[60] flex items-start justify-center p-4 pt-20" style={{background:'rgba(0,0,0,0.5)'}} onClick={onClose}>
      <div className="w-full max-w-xl bg-white rounded-2xl shadow-2xl overflow-hidden" onClick={e => e.stopPropagation()}>
        <div className="flex items-center gap-2 px-5 py-4 border-b border-stone-100">
          <span className="text-stone-400">🔍</span>
          <input
            autoFocus
            value={q}
            onChange={e => setQ(e.target.value)}
            onKeyDown={e => { if (e.key === 'Escape') onClose(); }}
            placeholder="Buscar en todo el contenido..."
            className="flex-1 outline-none text-base placeholder-stone-400" />
          <button onClick={onClose} className="text-stone-400 text-2xl leading-none">×</button>
        </div>
        <div className="max-h-[60vh] overflow-y-auto">
          {query.length < 2 && (
            <p className="text-center text-sm text-stone-400 py-10">Escribe al menos 2 letras para buscar.</p>
          )}
          {query.length >= 2 && results.length === 0 && (
            <p className="text-center text-sm text-stone-400 py-10">Sin resultados para "{q}".</p>
          )}
          {results.map((r, i) => (
            <button key={i} onClick={() => { onJump(r.section); onClose(); }}
              className="w-full text-left px-5 py-3 border-b border-stone-100 hover:bg-stone-50 transition-colors">
              <div className="flex items-center gap-2 mb-1">
                <span className={`text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded ${KIND_COLOR[r.kind] || 'bg-stone-100 text-stone-700'}`}>{r.kind}</span>
                <p className="font-serif font-bold text-base flex-1">{r.es}</p>
              </div>
              {r.en && <p className="text-xs text-stone-500">{r.en}</p>}
              {r.hint && <p className="text-xs text-stone-400 italic mt-0.5 break-words">{r.hint}</p>}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

    amber:'from-amber-400 to-amber-500',
    stone:'from-stone-400 to-stone-500'
  };

  useEffect(() => {
    return () => {
      ttsStop();
      if (shadowTimerRef.current) clearTimeout(shadowTimerRef.current);
    };
  }, []);

  const playAll = (lines, mode = 'normal') => {
    ttsStop();
    if (shadowTimerRef.current) clearTimeout(shadowTimerRef.current);
    stopRef.current = false;
    setPlayMode(mode);
    let i = 0;
    const next = async () => {
      if (stopRef.current || i >= lines.length) {
        setPlayingIdx(null);
        setPlayMode(null);
        return;
      }
      setPlayingIdx(i);
      const line = lines[i];
      const voiceOpts = line.who === 'A'
        ? { gender:'female', dialect:'es-ES', rate:0.91, pitch:1.0 }
        : { gender:'male',   dialect:'es-ES', rate:0.93, pitch:1.0 };
      await playSpeakable(line.es, voiceOpts);
      if (stopRef.current) { setPlayingIdx(null); setPlayMode(null); return; }
      i++;
      const gap = mode === 'shadow'
        ? Math.max(1500, Math.round(line.es.length * 70))
        : 420;
      shadowTimerRef.current = setTimeout(next, gap);
    };
    next();
  };

  const stopAll = () => {
    stopRef.current = true;
    ttsStop();
    if (shadowTimerRef.current) { clearTimeout(shadowTimerRef.current); shadowTimerRef.current = null; }
    setPlayingIdx(null);
    setPlayMode(null);
  };

  // ---- VOCAB CATEGORY DETAIL VIEW (cards grid, no scrolling list) ----

  // ---- SHEET DETAIL VIEW ----
  if (selectedSheet) {

function Ajustes({ dark, onBack }) {
  // ── ElevenLabs state ──
  const [provider, setProvider]       = useState(() => getStorage('aprende.tts.provider', 'web'));
  const [apiKey, setApiKey]           = useState(() => getStorage('aprende.tts.apiKey', ''));
  const [showKey, setShowKey]         = useState(false);
  const [voiceFemale, setVoiceFemale] = useState(() => getStorage('aprende.tts.voiceFemale', TTS_DEFAULT_FEMALE));
  const [voiceMale, setVoiceMale]     = useState(() => getStorage('aprende.tts.voiceMale',   TTS_DEFAULT_MALE));
  const [elTestStatus, setElTestStatus] = useState(null);
  const [elTestMsg, setElTestMsg]       = useState('');
  const [usage, setUsage]             = useState(() => ttsGetUsage());

  // ── Google state ──
  const [googleKey, setGoogleKey]             = useState(() => getStorage('aprende.tts.googleKey', ''));
  const [showGoogleKey, setShowGoogleKey]     = useState(false);
  const [googleVoiceFemale, setGoogleVoiceFemale] = useState(() => getStorage('aprende.tts.googleVoiceFemale', GOOGLE_DEFAULT_FEMALE));
  const [googleVoiceMale, setGoogleVoiceMale] = useState(() => getStorage('aprende.tts.googleVoiceMale', GOOGLE_DEFAULT_MALE));
  const [gTestStatus, setGTestStatus]         = useState(null);
  const [gTestMsg, setGTestMsg]               = useState('');
  const [googleUsage, setGoogleUsage]         = useState(() => ttsGetGoogleUsage());

  // ── Azure state ──
  const [azureKey, setAzureKey]               = useState(() => getStorage('aprende.tts.azureKey', ''));
  const [showAzureKey, setShowAzureKey]       = useState(false);
  const [azureRegion, setAzureRegion]         = useState(() => getStorage('aprende.tts.azureRegion', AZURE_DEFAULT_REGION));
  const [azureVoiceFemale, setAzureVoiceFemale] = useState(() => getStorage('aprende.tts.azureVoiceFemale', AZURE_DEFAULT_FEMALE));
  const [azureVoiceMale, setAzureVoiceMale]   = useState(() => getStorage('aprende.tts.azureVoiceMale',   AZURE_DEFAULT_MALE));
  const [azTestStatus, setAzTestStatus]       = useState(null);
  const [azTestMsg, setAzTestMsg]             = useState('');
  const [azureUsage, setAzureUsage]           = useState(() => ttsGetAzureUsage());

  // ── Shared ──
  const [speechRate, setSpeechRate]           = useState(() => getStorage('aprende.tts.speechRate', 1.0));
  const [cacheSize, setCacheSize] = useState(() => ttsCacheSize());

  // Auto-save all settings on change
  useEffect(() => {
    setStorage('aprende.tts.provider',    provider);
    setStorage('aprende.tts.apiKey',      apiKey.trim());
    setStorage('aprende.tts.voiceFemale', voiceFemale);
    setStorage('aprende.tts.voiceMale',   voiceMale);
  }, [provider, apiKey, voiceFemale, voiceMale]);

  useEffect(() => {
    setStorage('aprende.tts.googleKey',        googleKey.trim());
    setStorage('aprende.tts.googleVoiceFemale', googleVoiceFemale);
    setStorage('aprende.tts.googleVoiceMale',   googleVoiceMale);
  }, [googleKey, googleVoiceFemale, googleVoiceMale]);

  useEffect(() => {
    setStorage('aprende.tts.azureKey',         azureKey.trim());
    setStorage('aprende.tts.azureRegion',       azureRegion);
    setStorage('aprende.tts.azureVoiceFemale',  azureVoiceFemale);
    setStorage('aprende.tts.azureVoiceMale',    azureVoiceMale);
  }, [azureKey, azureRegion, azureVoiceFemale, azureVoiceMale]);

  useEffect(() => {
    setStorage('aprende.tts.speechRate', speechRate);
  }, [speechRate]);

  // ── ElevenLabs test ──
  const runElTest = async (gender) => {
    setElTestStatus('testing');
    setElTestMsg(gender === 'female' ? 'Probando voz femenina...' : 'Probando voz masculina...');
    const voiceId = gender === 'female' ? voiceFemale : voiceMale;
    const testText = gender === 'female'
      ? 'Hola, soy tu tutora de español. Vamos a practicar juntos.'
      : 'Buenos días. Soy tu tutor. Hoy vamos a repasar el subjuntivo.';
    if (provider !== 'elevenlabs' || !apiKey.trim()) {
      speakES(testText, { gender, dialect:'es-ES', rate:0.95 });
      setElTestStatus('ok');
      setElTestMsg('Reproduciendo con voz del navegador (sin ElevenLabs configurado).');
      return;
    }
    try {
      // Step 1: validate key via /v1/user before attempting TTS
      const userResp = await fetch('https://api.elevenlabs.io/v1/user', {
        headers: { 'xi-api-key': apiKey.trim() }
      });
      if (!userResp.ok) {
        const body = await userResp.text().catch(() => '');
        let detail = '';
        try { detail = JSON.parse(body)?.detail?.message || JSON.parse(body)?.detail?.status || ''; } catch(_) {}
        if (userResp.status === 401) {
          setElTestStatus('err');
          setElTestMsg('ElevenLabs: acceso API no disponible en el plan gratuito (requiere saldo). Tu voz activa es Azure Neural – funciona perfectamente sin ElevenLabs.');
          return;
        }
        throw new Error('ElevenLabs /v1/user ' + userResp.status + ': ' + (detail || body).slice(0, 100));
      }
      const userInfo = await userResp.json().catch(() => null);
      const plan = userInfo?.subscription?.tier || '';
      // Step 2: attempt TTS
      const base64 = await ttsFetchElevenLabs(testText, voiceId, apiKey.trim());
      ttsBumpUsage(testText.length);
      const url = ttsSaveCached(testText, voiceId, base64);
      const audio = new Audio(url); ttsCurrentAudio = audio; audio.play().catch(() => {});
      setElTestStatus('ok');
      setElTestMsg('¡Funciona! ElevenLabs conectado.' + (plan ? ' Plan: ' + plan + '.' : ''));
      setUsage(ttsGetUsage());
      setCacheSize(ttsCacheSize());
    } catch(e) {
      setElTestStatus('err');
      const msg = e.message || '';
      if (msg.includes('401')) setElTestMsg('Error 401: API key sin permiso de TTS. En ElevenLabs → API Keys → asegúrate de activar "Text to Speech".');

                <div>
                  <p className={`text-xs font-semibold mb-2 ${dark ? 'text-stone-300' : 'text-stone-700'}`}>2. En el otro dispositivo → Pegar código</p>
                  <div className="flex gap-2">
                    <input value={importVal} onChange={e => setImportVal(e.target.value)}
                      placeholder="Pega el código aquí..."
                      className={`flex-1 rounded-xl px-3 py-2.5 text-sm border font-mono ${dark ? 'bg-white/[0.06] border-white/10 text-white placeholder:text-stone-500' : 'bg-stone-50 border-stone-200 text-stone-900 placeholder:text-stone-400'} focus:outline-none focus:border-orange-400`} />
                    <button onClick={handleImport} disabled={!importVal.trim()}
                      className="rounded-xl px-4 py-2.5 bg-orange-500 hover:bg-orange-600 disabled:opacity-40 text-white font-semibold text-sm transition-colors">
                      Importar
                    </button>
                  </div>
                  {importMsg && <p className={`text-xs mt-2 font-medium ${importMsg.startsWith('✅') ? 'text-emerald-600' : 'text-red-500'}`}>{importMsg}</p>}
                </div>
              </div>
            </Card>
          );
        })()}

      </div>
    </div>
  );
}

// HELPERS – Levenshtein distance
// ============================================================

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_, i) => Array.from({length: n+1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= m; i++) for (let j = 1; j <= n; j++)
    dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

function normalizeForScoring(str) {
  return str
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^\w\s]/g, '')
    .trim();
}

function Dictado({ onBack, dark }) {
  const [level, setLevel] = React.useState(null);
  const [pool, setPool] = React.useState([]);
  const [poolIdx, setPoolIdx] = React.useState(0);
  const [input, setInput] = React.useState('');
  const [submitted, setSubmitted] = React.useState(false);
  const [replayCount, setReplayCount] = React.useState(0);
  const [sessionScore, setSessionScore] = React.useState({ correct:0, total:0, sentences:0 });
  const [xpToast, setXpToast] = React.useState(null);
  const [weakMode, setWeakMode] = React.useState(false);
  const inputRef = React.useRef(null);

  const current = pool[poolIdx] || '';

  // Build a weighted pool: unseen first, then low-accuracy
  const buildPool = React.useCallback((lvl, weakOnly) => {
    const sentences = DICTADO_SENTENCES[lvl] || [];
    const stats = dictadoStatsGet();
    const scored = sentences.map(s => {
      const key = s.slice(0,30);
      const st = stats[key];
      if (!st) return { s, weight: 10 }; // never seen – high priority
      const acc = st.totalWords > 0 ? st.correctWords / st.totalWords : 0;
      if (weakOnly && acc >= 0.85) return null;
      return { s, weight: acc < 0.6 ? 8 : acc < 0.85 ? 4 : 1 };
    }).filter(Boolean);
    // Weighted shuffle
    const shuffled = [];
    const items = [...scored];
    while (items.length) {
      const totalW = items.reduce((a,b) => a+b.weight, 0);
      let r = Math.random() * totalW;
      for (let i = 0; i < items.length; i++) {
        r -= items[i].weight;
        if (r <= 0) { shuffled.push(items[i].s); items.splice(i,1); break; }
      }
    }
    return shuffled.length ? shuffled : sentences;
  }, []);

  const startLevel = (lvl, weak=false) => {
    setLevel(lvl);
    setWeakMode(weak);
    const p = buildPool(lvl, weak);
    setPool(p);
    setPoolIdx(0);
    setInput('');
    setSubmitted(false);
    setReplayCount(0);
    setSessionScore({ correct:0, total:0, sentences:0 });
  };

  const handlePlay = () => {
    speakES(current, { gender:'female' });
    setReplayCount(c => c+1);
  };

  const handleCheck = () => {
    if (!input.trim()) return;
    const normCorrect = normalizeForScoring(current).split(/\s+/);
    const normUser    = normalizeForScoring(input).split(/\s+/);
    let correct = 0;
    normCorrect.forEach((w,i) => { if (w === (normUser[i]||'')) correct++; });
    const total = normCorrect.length;
    const isPerfect = correct === total;
    const xpEarned = Math.max(1, Math.round((correct/total)*10)) + (isPerfect ? 5 : 0);
    dictadoStatsUpdate(current, correct, total);
    xpAdd(xpEarned);
    tickStreak();
    setSessionScore(s => ({ correct:s.correct+correct, total:s.total+total, sentences:s.sentences+1 }));
    setSubmitted(true);
    setXpToast(xpEarned);
  };

  const handleNext = () => {
    const next = poolIdx + 1;
    if (next >= pool.length) {
      setLevel(null);
    } else {
      setPoolIdx(next);
      setInput('');
      setSubmitted(false);
      setReplayCount(0);
    }
  };

  const insertAccent = (char) => {
    const el = inputRef.current;
    if (!el) return;
    const start = el.selectionStart, end = el.selectionEnd;
    const newVal = input.slice(0,start) + char + input.slice(end);
    setInput(newVal);
    requestAnimationFrame(() => { el.setSelectionRange(start+1,start+1); el.focus(); });
  };

  const renderDiff = () => {
    const displayWords = current.replace(/[¿¡]/g,'').replace(/[.,;:!?]/g,'').trim().split(/\s+/);
    const normC = normalizeForScoring(current).split(/\s+/);
    const normU = normalizeForScoring(input).split(/\s+/);
    return displayWords.map((word,i) => {
      const cw = normC[i]||'', uw = normU[i]||'';
      const ok = cw===uw;
      return (
        <span key={i} className="inline-flex flex-col items-center mr-2 mb-2">
          {!ok && <span className="text-[10px] text-red-400 font-mono mb-0.5">{uw||'–'}</span>}
          <span className={`text-sm font-semibold px-1.5 py-0.5 rounded ${ok?'bg-emerald-100 text-emerald-800':'bg-red-100 text-red-800'}`}>{word}</span>
        </span>
      );
    });
  };

  // Stats for level select screen
  const getLevelStats = (lvl) => {
    const sentences = DICTADO_SENTENCES[lvl]||[];
    const stats = dictadoStatsGet();
    let mastered=0, weak=0;
    sentences.forEach(s => {
      const st = stats[s.slice(0,30)];
      if (!st) return;
      const acc = st.totalWords>0 ? st.correctWords/st.totalWords : 0;
      if (acc >= 0.85) mastered++;
      else weak++;
    });
    return { mastered, weak, total: sentences.length };
  };

  if (!level) {
    const totalDone = dictadoGetCount();
    return (
      <div>
        <BackHeader title="Dictado" subtitle="Escucha y escribe" onBack={onBack} dark={dark} />
        <div className="px-4 lg:px-8 py-6 max-w-3xl mx-auto space-y-6">
          <div>
            <h2 className="font-serif font-bold text-3xl lg:text-4xl leading-tight mb-2">Dictado</h2>
            <p className={`text-sm ${dark?'text-stone-400':'text-stone-500'}`}>Escucha y escribe lo que oyes. Las frases difíciles vuelven más a menudo.</p>
          </div>
          {(sessionScore.sentences > 0 || totalDone > 0) && (
            <Card dark={dark} className="p-5">
              <div className="grid grid-cols-3 gap-4 text-center">
                <div><p className="text-2xl font-bold text-orange-500">{totalDone}</p><p className={`text-xs ${dark?'text-stone-400':'text-stone-500'}`}>completadas</p></div>
                <div><p className="text-2xl font-bold">{sessionScore.correct}</p><p className={`text-xs ${dark?'text-stone-400':'text-stone-500'}`}>palabras hoy</p></div>
                <div><p className="text-2xl font-bold">{sessionScore.sentences}</p><p className={`text-xs ${dark?'text-stone-400':'text-stone-500'}`}>frases hoy</p></div>
              </div>
            </Card>
          )}
          <div className="grid grid-cols-1 gap-3">
            {[
              { id:'facil',   label:'Fácil',   sub:'A1–A2 · frases cortas',     badge:'bg-emerald-100 text-emerald-800' },
              { id:'medio',   label:'Medio',   sub:'B1–B2 · frases completas',   badge:'bg-amber-100 text-amber-800'    },
              { id:'dificil', label:'Difícil', sub:'C1 · subjuntivo y más',      badge:'bg-red-100 text-red-800'        },
            ].map(l => {
              const st = getLevelStats(l.id);
              return (
                <Card dark={dark} key={l.id} className="p-5">
                  <div className="flex items-center justify-between mb-3">
                    <div className="flex items-center gap-3">
                      <span className={`text-xs font-bold px-2.5 py-1 rounded-lg uppercase tracking-wider ${l.badge}`}>{l.label}</span>
                      <p className={`text-sm ${dark?'text-stone-400':'text-stone-500'}`}>{l.sub}</p>
                    </div>
                    <div className={`text-xs ${dark?'text-stone-400':'text-stone-500'}`}>
                      ✅ {st.mastered}/{st.total}
                    </div>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={() => startLevel(l.id)}
                      className="flex-1 rounded-xl bg-orange-500 hover:bg-orange-600 text-white font-semibold py-2.5 text-sm transition-colors">
                      ▶ Practicar
                    </button>
                    {st.weak > 0 && (
                      <button onClick={() => startLevel(l.id, true)}
                        className={`rounded-xl px-4 py-2.5 font-semibold text-sm border-2 transition-colors ${dark?'border-red-400/40 text-red-400 hover:bg-red-400/10':'border-red-300 text-red-600 hover:bg-red-50'}`}>
                        🔁 {st.weak} pendientes
                      </button>
                    )}
                  </div>
                </Card>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  const levelLabel = level==='facil'?'Fácil':level==='medio'?'Medio':'Difícil';
  const progress = pool.length > 0 ? Math.round((poolIdx/pool.length)*100) : 0;

  return (
    <div>
      <BackHeader title="Dictado" subtitle={`${levelLabel}${weakMode?' · Pendientes':''} · ${poolIdx+1}/${pool.length}`} onBack={() => setLevel(null)} dark={dark} />
      {xpToast && <XPToast xp={xpToast} onDone={() => setXpToast(null)} />}
      <div className="px-4 lg:px-8 py-6 max-w-2xl mx-auto space-y-5">
        {/* Progress bar */}
        <div className={`h-1.5 rounded-full overflow-hidden ${dark?'bg-white/10':'bg-stone-100'}`}>
          <div className="h-full bg-orange-400 transition-all duration-500 rounded-full" style={{width:progress+'%'}} />
        </div>

        {sessionScore.sentences > 0 && (
          <p className={`text-sm font-semibold ${dark?'text-stone-400':'text-stone-500'}`}>
            ✓ {sessionScore.correct}/{sessionScore.total} palabras correctas esta sesión
          </p>
        )}

        <Card dark={dark} className="p-5">
          <p className="text-[10px] font-bold tracking-widest uppercase text-stone-500 mb-4">Escucha la frase</p>
          <button onClick={handlePlay}
            className="w-full rounded-xl bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3 flex items-center justify-center gap-2 text-sm transition-colors">
            <span>▶</span>
            <span>Reproducir{replayCount>0?` (×${replayCount+1})`:''}</span>
          </button>
          {submitted && (
            <div className="mt-4 pt-4 border-t border-stone-100">
              <p className="text-[10px] font-bold tracking-widest uppercase text-stone-500 mb-2">Respuesta correcta</p>
              <p className="font-serif font-semibold mb-3">{current}</p>
              <div className="flex flex-wrap">{renderDiff()}</div>
            </div>
          )}
        </Card>

        <Card dark={dark} className="p-5">
          <p className="text-[10px] font-bold tracking-widest uppercase text-stone-500 mb-3">Tu respuesta</p>
          <textarea ref={inputRef} value={input} onChange={e=>setInput(e.target.value)} disabled={submitted}
            onKeyDown={e=>{ if(e.key==='Enter'&&!e.shiftKey&&!submitted){e.preventDefault();handleCheck();} }}
            placeholder="Escribe lo que escuchas..." rows={3}
            className={`w-full rounded-xl px-4 py-3 text-sm border-2 resize-none outline-none transition-colors font-medium ${submitted?'opacity-60 cursor-not-allowed':''} ${dark?'bg-white/[0.06] border-white/10 text-white placeholder:text-stone-500 focus:border-orange-400':'bg-white border-stone-200 text-stone-900 placeholder:text-stone-400 focus:border-orange-400'}`}
          />
          <div className="flex flex-wrap gap-1.5 mt-2">
            {['á','é','í','ó','ú','ñ','ü'].map(ch => (
              <button key={ch} onMouseDown={e=>e.preventDefault()} onClick={()=>insertAccent(ch)}
                className={`rounded-lg px-2.5 py-1 text-sm font-semibold border transition-colors ${dark?'border-white/10 hover:bg-white/10 text-stone-200':'border-stone-200 hover:bg-orange-50 hover:border-orange-300 text-stone-700'}`}>
                {ch}
              </button>
            ))}
          </div>
          <div className="flex gap-3 mt-4">
            {!submitted ? (
              <button onClick={handleCheck} disabled={!input.trim()}
                className="flex-1 rounded-xl bg-orange-500 hover:bg-orange-600 disabled:opacity-40 text-white font-semibold py-2.5 text-sm transition-colors">
                Comprobar
              </button>
            ) : (
              <button onClick={handleNext}
                className="flex-1 rounded-xl bg-orange-500 hover:bg-orange-600 text-white font-semibold py-2.5 text-sm transition-colors">
                {poolIdx+1 >= pool.length ? 'Terminar ronda' : 'Siguiente →'}
              </button>
            )}
          </div>
        </Card>
      </div>
    </div>
  );
}

// Fisher-Yates shuffle – returns a new shuffled array
function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Build the full pool by combining handcrafted sentences with examples
// harvested from VOCAB_THEMES, WORDS_OF_DAY, and CHEAT_SHEETS
function buildPronunciacionPool() {
  const seen = new Set();
  const pool = [];
  const add = (s) => {
    if (!s) return;
    const t = s.trim();
    // Skip very short items or ones with no Spanish content
    if (t.split(/\s+/).length < 4) return;
    if (seen.has(t)) return;
    seen.add(t);
    pool.push(t);
  };

  PRONUNCIACION_EXTRA.forEach(add);

  (typeof WORDS_OF_DAY !== 'undefined' ? WORDS_OF_DAY : []).forEach(w => {
    add(w.example);
  });

  (typeof VOCAB_THEMES !== 'undefined' ? VOCAB_THEMES : []).forEach(theme => {
    (theme.words || []).forEach(word => add(word.example));
  });

  (typeof CHEAT_SHEETS !== 'undefined' ? CHEAT_SHEETS : []).forEach(sheet => {
    (sheet.content || []).forEach(section => {
      (section.examples || []).forEach(ex => add(ex.es));
    });
  });

  return pool;
}

// Eagerly built once at module load (all data constants already defined above)
const _PRONUNCIACION_POOL = buildPronunciacionPool();

function Pronunciacion({ onBack, dark }) {
  // Persistent shuffle queue – survives refreshes; reshuffles when exhausted
  const [queue, setQueue] = React.useState(() => {
    const stored = getStorage('aprende.pronunciacion.queue', null);
    if (Array.isArray(stored) && stored.length >= Math.floor(_PRONUNCIACION_POOL.length * 0.8)) return stored;
    const q = shuffleArray(_PRONUNCIACION_POOL);
    setStorage('aprende.pronunciacion.queue', q);
    return q;
  });
  const [pos, setPos] = React.useState(() => {
    const p = getStorage('aprende.pronunciacion.pos', 0);
    return (Number.isInteger(p) && p >= 0) ? p : 0;
  });
  const [recording, setRecording] = React.useState(false);
  const [transcript, setTranscript] = React.useState(null);
  const [error, setError] = React.useState(null);
  const [history, setHistory] = React.useState([]);
  const [xpToast, setXpToast] = React.useState(null);
  const recognitionRef = React.useRef(null);
  const azureRecogRef = React.useRef(null);

  const SR = typeof window !== 'undefined' && (window.SpeechRecognition || window.webkitSpeechRecognition);
  const current = queue[Math.min(pos, queue.length - 1)] || _PRONUNCIACION_POOL[0];
  const azCfg = ttsGetAzureConfig();
  const hasAzure = !!(azCfg.apiKey && azCfg.region);

  const handleListen = () => speakES(current, { gender:'female' });

  const processResult = (text) => {
    const acc = computeAccuracy(current, text);
    const xpEarned = acc >= 100 ? 15 : acc >= 80 ? 10 : acc >= 50 ? 5 : 2;
    xpAdd(xpEarned); tickStreak(); achievementCheck({ pronunciacionPct: acc });
    setTranscript(text); setRecording(false); setXpToast(xpEarned);
    setHistory(h => [{ sentence:current, transcript:text, accuracy:acc }, ...h].slice(0,5));
  };

  const handleRecord = async () => {
    setError(null);
    if (recording) {
      try { if (recognitionRef.current) recognitionRef.current.stop(); } catch(e) {}
      try { if (azureRecogRef.current) { azureRecogRef.current.close(); azureRecogRef.current = null; } } catch(e) {}
      setRecording(false);
      return;
    }
    setRecording(true);

    // ── Tier 1: Azure STT (no Google dependency — works in Arc) ──
    if (hasAzure) {
      try {
        const text = await azureRecognizeOnce(azCfg.apiKey, azCfg.region, r => { azureRecogRef.current = r; });
        azureRecogRef.current = null;
        processResult(text);
        return;
      } catch(e) {
        azureRecogRef.current = null;
        if (e.srCode === 'no-speech') { setError('no-speech'); setRecording(false); return; }
        // Azure failed for another reason — fall through to Web Speech
        console.warn('Azure STT failed (' + e.message + '), trying Web Speech');
      }
    }

    // ── Tier 2: Web Speech API (requires Chrome/Edge, blocked in Arc by Google network) ──
    if (!SR) { setRecording(false); setError('no_support'); return; }
    const recognition = new SR();
    recognition.lang = 'es-ES';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.maxAlternatives = 3;
    recognitionRef.current = recognition;
    recognition.onresult = (e) => {
      const alts = Array.from(e.results[0]).map(r => r.transcript);
      const best = alts.reduce((b, t) => computeAccuracy(current, t) > computeAccuracy(current, b) ? t : b, alts[0]);
      processResult(best);
    };
    recognition.onerror = (e) => { setRecording(false); setError(e.error || 'generic'); };
    recognition.onend = () => setRecording(false);
    try { recognition.start(); } catch(e) { setRecording(false); setError('start-failed'); }
  };

  const handleNext = () => {
    const nextPos = pos + 1;
    if (nextPos >= queue.length) {
      // Exhausted the whole pool – reshuffle for a fresh round
      const newQueue = shuffleArray(_PRONUNCIACION_POOL);
      setQueue(newQueue);
      setStorage('aprende.pronunciacion.queue', newQueue);
      setPos(0);
      setStorage('aprende.pronunciacion.pos', 0);
    } else {
      setPos(nextPos);
      setStorage('aprende.pronunciacion.pos', nextPos);
    }
    setTranscript(null);
    setError(null);
    setRecording(false);
  };

  // Align target words to spoken words using a sliding ±2 window.
  // Returns per-word similarity scores (0–1) instead of position-locked comparison,
  // so a dropped article doesn't cascade-fail every word after it.
  const alignWords = (correct, spoken) => {
    const cw = normalizeForScoring(correct).split(/\s+/);
    const sw = normalizeForScoring(spoken || '').split(/\s+/);
    const used = new Set();
    return cw.map((tw, i) => {
      const lo = Math.max(0, i - 2);
      const hi = Math.min(sw.length - 1, i + 2);
      let best = { j: -1, score: 0 };
      for (let j = lo; j <= hi; j++) {
        if (used.has(j)) continue;
        const maxL = Math.max(tw.length, sw[j].length);
        const sim = maxL === 0 ? 1 : 1 - levenshtein(tw, sw[j]) / maxL;
        if (sim > best.score) best = { j, score: sim };
      }
      if (best.j >= 0 && best.score >= 0.5) used.add(best.j);
      return best.score;
    });
  };

  const computeAccuracy = (correct, spoken) => {
    const scores = alignWords(correct, spoken);
    const total = scores.reduce((sum, s) => sum + Math.min(1, Math.max(0, s)), 0);
    return Math.round((total / scores.length) * 100);
  };

  const renderWordResult = () => {
    const words = current.replace(/[¿¡.,;:!?]/g, '').split(/\s+/);
    const scores = alignWords(current, transcript || '');
    return words.map((w, i) => {
      const s = scores[i] ?? 0;
      const cls = s >= 0.8
        ? 'bg-emerald-100 text-emerald-800'
        : s >= 0.5
        ? 'bg-amber-100 text-amber-800'
        : 'bg-red-100 text-red-800';
      return <span key={i} className={`inline-block text-sm font-semibold px-1.5 py-0.5 rounded mr-1.5 mb-1 ${cls}`}>{w}</span>;
    });
  };

  const accuracy = transcript != null ? computeAccuracy(current, transcript) : null;

  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  const isMac = /Macintosh|MacIntel/.test(navigator.userAgent);
  const errorMessages = {
    // Browser doesn't expose SR at all
    no_support: {
      title: 'Reconocimiento de voz no disponible',
      msg: isIOS
        ? 'En iPhone/iPad, el reconocimiento de voz solo funciona en Safari. Abre esta página en Safari y añádela a la pantalla de inicio desde ahí.'
        : 'Tu navegador no soporta reconocimiento de voz. Prueba con Chrome o Edge.'
    },
    // User/browser denied microphone permission
    'not-allowed': {
      title: 'Permiso de micrófono denegado',
      msg: isMac
        ? 'Arc necesita acceso al micrófono. Ve a Ajustes del Mac → Privacidad y Seguridad → Micrófono → activa Arc. Luego recarga la página.'
        : 'Haz clic en el icono 🔒 en la barra de dirección → Permisos del sitio → Micrófono → Permitir. Luego recarga.'
    },
    // OS-level mic blocked or no mic hardware
    'audio-capture': {
      title: 'No se puede acceder al micrófono',
      msg: isMac
        ? 'macOS está bloqueando el micrófono para Arc. Ve a Ajustes del Mac → Privacidad y Seguridad → Micrófono → activa Arc. Luego recarga la página.'
        : 'No se detectó micrófono o el sistema operativo está bloqueando el acceso. Comprueba los permisos del sistema.'
    },
    // Google speech API unreachable (network/privacy filter)
    'network': {
      title: 'Error de red',
      msg: 'No se pudo conectar al servicio de reconocimiento de voz. Comprueba tu conexión a internet. Si usas un bloqueador de rastreo agresivo en Arc, puede estar bloqueando el servicio de Google.'
    },
    // Browser policy blocks speech API on this origin
    'service-not-allowed': {
      title: 'Servicio bloqueado por el navegador',
      msg: 'Arc está bloqueando el servicio de reconocimiento de voz. Prueba a abrir la página en Chrome directamente, o desactiva los escudos de privacidad para este sitio en Arc.'
    },
    'no-speech': {
      title: 'No se detectó voz',
      msg: 'No se escuchó nada. Habla más claro y alto, acércate al micrófono, y vuelve a intentarlo.'
    },
    'aborted': {
      title: 'Reconocimiento cancelado',
      msg: 'El reconocimiento se canceló. Pulsa Hablar para intentarlo de nuevo.'
    },
    'start-failed': {
      title: 'No se pudo iniciar',
      msg: isMac
        ? 'No se pudo iniciar el micrófono. Comprueba que Arc tiene permiso en Ajustes del Mac → Privacidad y Seguridad → Micrófono.'
        : 'No se pudo iniciar el reconocimiento. Comprueba los permisos del micrófono.'
    },
    // Fallback for any other code — show the raw code
    generic: {
      title: 'Error de reconocimiento',
      msg: 'No se pudo procesar el audio. Comprueba que el micrófono funciona e inténtalo de nuevo.'
    },
  };
  const getError = (code) => errorMessages[code] || { title: `Error: ${code}`, msg: 'Código de error desconocido. Comprueba los permisos del micrófono e inténtalo de nuevo.' };

  return (
    <div>
      <BackHeader title="Pronunciación" subtitle="Habla y mejora" onBack={onBack} dark={dark} />
      {xpToast && <XPToast xp={xpToast} onDone={() => setXpToast(null)} />}
      <div className="px-4 lg:px-8 py-6 max-w-2xl mx-auto space-y-5">

        {!hasAzure && !SR && (
          <div className="rounded-2xl bg-amber-50 border border-amber-200 p-4">
            <p className="font-bold text-amber-800 text-sm mb-1">
              {isIOS ? '📱 Abre esta página en Safari' : '💻 Reconocimiento no disponible'}
            </p>
            <p className="text-amber-700 text-xs">
              {isIOS
                ? 'El reconocimiento de voz no funciona en Arc ni Chrome para iOS. Abre la página en Safari.'
                : 'Añade tu API key de Azure en Ajustes para activar el reconocimiento, o abre la página en Chrome.'}
            </p>
          </div>
        )}
        {hasAzure && (
          <div className={`rounded-2xl px-4 py-2.5 flex items-center gap-2 text-xs font-medium ${dark ? 'bg-white/[0.06] text-stone-400' : 'bg-stone-50 text-stone-500'}`}>
            <span className="text-emerald-500">●</span> Reconocimiento via Azure (sin Google)
          </div>
        )}
        {error && (
          <Card dark={dark} className="p-5 border-2 border-amber-300">
            <p className="font-semibold text-amber-700 mb-1">{getError(error).title}</p>
            <p className={`text-sm ${dark?'text-stone-400':'text-stone-600'}`}>{getError(error).msg}</p>
          </Card>
        )}

        <Card dark={dark} className="p-6 text-center">
          <p className={`text-[10px] font-bold tracking-widest uppercase mb-3 ${dark?'text-stone-500':'text-stone-400'}`}>{pos+1} / {queue.length}</p>
          <p className="text-xl font-serif font-bold leading-relaxed mb-6">{current}</p>
          <div className="flex gap-3 justify-center flex-wrap">
            <button onClick={handleListen}
              className={`rounded-xl px-5 py-2.5 font-semibold text-sm transition-colors flex items-center gap-2 ${dark?'bg-white/10 hover:bg-white/20 text-stone-200':'bg-stone-100 hover:bg-stone-200 text-stone-700'}`}>
              🔊 Escuchar
            </button>
            <button onClick={handleRecord}
              className={`rounded-xl px-6 py-2.5 font-semibold text-sm transition-colors flex items-center gap-2 ${recording?'bg-red-500 hover:bg-red-600 text-white animate-pulse':'bg-orange-500 hover:bg-orange-600 text-white'}`}>
              {recording ? '🔴 Escuchando...' : '🎤 Hablar'}
            </button>
            <button onClick={handleNext}
              className={`rounded-xl px-5 py-2.5 font-semibold text-sm transition-colors ${dark?'bg-white/10 hover:bg-white/20 text-stone-200':'bg-stone-100 hover:bg-stone-200 text-stone-700'}`}>
              Siguiente →
            </button>
          </div>
        </Card>

        {transcript != null && (
          <Card dark={dark} className="p-5">
            <div className="flex items-center justify-between mb-3">
              <p className="text-[10px] font-bold tracking-widest uppercase text-stone-500">Resultado</p>
              <span className={`text-3xl font-bold ${accuracy>=80?'text-emerald-600':accuracy>=50?'text-amber-600':'text-red-500'}`}>{accuracy}%</span>
            </div>
            <div className="flex flex-wrap mb-4">{renderWordResult()}</div>
            <div className={`text-xs rounded-xl p-3 ${dark?'bg-white/[0.06]':'bg-stone-50'}`}>
              <span className={`font-semibold ${dark?'text-stone-300':'text-stone-600'}`}>Tú dijiste: </span>
              <span className={dark?'text-stone-400':'text-stone-500'}>{transcript}</span>
            </div>
            <div className="flex flex-wrap gap-1.5 mt-2 text-xs">
              <span className="px-2 py-0.5 rounded-lg bg-emerald-100 text-emerald-700 font-medium">🟢 correcto</span>
              <span className="px-2 py-0.5 rounded-lg bg-amber-100 text-amber-700 font-medium">🟡 casi</span>
              <span className="px-2 py-0.5 rounded-lg bg-red-100 text-red-700 font-medium">🔴 diferente</span>
            </div>
          </Card>
        )}

        {history.length > 0 && (
          <Card dark={dark} className="p-5">
            <p className="text-[10px] font-bold tracking-widest uppercase text-stone-500 mb-3">Últimos intentos</p>
            <div className="space-y-2">
              {history.map((h,i) => (
                <div key={i} className={`flex items-center gap-3 text-sm ${dark?'text-stone-300':'text-stone-600'}`}>
                  <span className={`font-bold w-10 text-right flex-shrink-0 ${h.accuracy>=80?'text-emerald-600':h.accuracy>=50?'text-amber-600':'text-red-500'}`}>{h.accuracy}%</span>
                  <span className="break-words flex-1 text-xs">{h.sentence}</span>
                </div>
              ))}
            </div>
          </Card>
        )}

      </div>
    </div>
  );
}

const XP_LEVELS = [
  { min:0,    label:'Principiante', emoji:'🌱', color:'stone'   },
  { min:50,   label:'Aprendiz',     emoji:'📖', color:'blue'    },
  { min:150,  label:'Intermedio',   emoji:'💬', color:'emerald' },
  { min:400,  label:'Avanzado',     emoji:'🎯', color:'orange'  },
  { min:800,  label:'Experto',      emoji:'🏆', color:'purple'  },
  { min:1500, label:'Maestro',      emoji:'⭐', color:'amber'   },
];

function xpGetState() {
  const today = todayStr();
  const s = getStorage('aprende.xp', { total:0, todayDate:today, todayXP:0 });
  if (s.todayDate !== today) { s.todayXP = 0; s.todayDate = today; }
  return s;
}

function xpAdd(amount) {
  const s = xpGetState();
  s.total += amount;
  s.todayXP = (s.todayXP||0) + amount;
  setStorage('aprende.xp', s);
  // check achievement unlocks
  achievementCheck({ xp: s.total });
  return s;
}

function xpGetLevel(total) {
  let lvl = XP_LEVELS[0];
  for (const l of XP_LEVELS) { if (total >= l.min) lvl = l; else break; }
  const idx = XP_LEVELS.indexOf(lvl);
  const next = XP_LEVELS[idx+1] || null;
  const pct = next ? Math.min(100, Math.round(((total - lvl.min)/(next.min - lvl.min))*100)) : 100;
  return { ...lvl, next, pct, total };
}

// ── Achievements ──
const ACHIEVEMENTS_DEF = [
  { id:'first_dictado',      emoji:'✍️', title:'Primera dictación',    desc:'Completa tu primera frase de dictado' },
  { id:'dictado_perfect',    emoji:'🎯', title:'Oído perfecto',         desc:'Dictado sin un solo error' },
  { id:'dictado_25',         emoji:'📝', title:'Escribano',             desc:'25 frases de dictado completadas' },
  { id:'dictado_100',        emoji:'🏅', title:'Maestro del dictado',   desc:'100 frases completadas' },
  { id:'pronunciacion_80',   emoji:'🎤', title:'Buen acento',           desc:'Pronunciación al 80% o más' },
  { id:'pronunciacion_100',  emoji:'💯', title:'Perfecto',              desc:'Pronunciación al 100%' },
  { id:'streak_7',           emoji:'🔥', title:'Semana de fuego',       desc:'Racha de 7 días seguidos' },
  { id:'streak_30',          emoji:'🌟', title:'Mes dedicado',          desc:'Racha de 30 días seguidos' },
  { id:'xp_100',             emoji:'⭐', title:'Cien puntos',           desc:'Alcanzar 100 XP' },
  { id:'xp_500',             emoji:'🚀', title:'En órbita',             desc:'Alcanzar 500 XP' },
  { id:'xp_1000',            emoji:'🏆', title:'Mil puntos',            desc:'Alcanzar 1000 XP' },
];

function achievementGet() { return getStorage('aprende.achievements', []); }

function achievementUnlock(id) {
  const current = achievementGet();
  if (current.includes(id)) return null;
  current.push(id);
  setStorage('aprende.achievements', current);
  return ACHIEVEMENTS_DEF.find(a => a.id === id) || null;
}

function achievementCheck({ xp, streak, dictadoTotal, dictadoPerfect, pronunciacionPct }) {
  if (xp !== undefined) {
    if (xp >= 100)  achievementUnlock('xp_100');
    if (xp >= 500)  achievementUnlock('xp_500');
    if (xp >= 1000) achievementUnlock('xp_1000');
  }
  if (streak !== undefined) {
    if (streak >= 7)  achievementUnlock('streak_7');
    if (streak >= 30) achievementUnlock('streak_30');
  }
  if (dictadoTotal !== undefined) {
    if (dictadoTotal >= 1)   achievementUnlock('first_dictado');
    if (dictadoTotal >= 25)  achievementUnlock('dictado_25');
    if (dictadoTotal >= 100) achievementUnlock('dictado_100');
  }
  if (dictadoPerfect) achievementUnlock('dictado_perfect');
  if (pronunciacionPct !== undefined) {
    if (pronunciacionPct >= 80)  achievementUnlock('pronunciacion_80');
    if (pronunciacionPct >= 100) achievementUnlock('pronunciacion_100');
  }
}

// ── Dictado stats (per-sentence accuracy tracking) ──
function dictadoStatsGet() { return getStorage('aprende.dictado.stats', {}); }
function dictadoStatsUpdate(sentence, correct, total) {
  const stats = dictadoStatsGet();
  const key = sentence.slice(0,30);
  const prev = stats[key] || { attempts:0, correctWords:0, totalWords:0 };
  prev.attempts += 1;
  prev.correctWords += correct;
  prev.totalWords += total;
  stats[key] = prev;
  setStorage('aprende.dictado.stats', stats);
  // update global dictado count
  const count = getStorage('aprende.dictado.count', 0) + 1;
  setStorage('aprende.dictado.count', count);
  achievementCheck({ dictadoTotal: count, dictadoPerfect: correct === total && total > 0 });
  return prev;
}
function dictadoGetCount() { return getStorage('aprende.dictado.count', 0); }

// ── XP Toast ──
function XPToast({ xp, onDone }) {
  React.useEffect(() => {
    const t = setTimeout(onDone, 1800);
    return () => clearTimeout(t);
  }, []);
  return (
    <div className="fixed bottom-24 lg:bottom-8 right-4 z-50 animate-bounce">
      <div className="bg-orange-500 text-white px-4 py-2.5 rounded-2xl shadow-lg font-bold text-sm flex items-center gap-2">
        <span>⭐</span> +{xp} XP
      </div>
    </div>
  );
}

                ${section === item.id
                  ? 'bg-orange-500 text-white shadow-sm'
                  : dark ? 'text-stone-300 hover:bg-white/[0.06]' : 'text-stone-700 hover:bg-stone-100'
                }`}>
              <span className="text-base">{item.emoji}</span>
              <span>{item.label}</span>
            </button>
          ))}
        </nav>
      </aside>

      {/* Main content */}
      <main className="lg:ml-64 min-h-screen">
        {/* Mobile header – only on inicio (sub-sections use BackHeader instead) */}
        <header className={`${section === 'inicio' ? 'flex' : 'hidden'} lg:hidden sticky top-0 z-30 px-4 py-3 items-center justify-between ${dark ? 'glass-dark border-b border-white/[0.06]' : 'glass-light border-b border-stone-200/60'}`}>
          <h1 className="font-serif font-bold text-xl text-orange-500">La Vida Español</h1>
          <button onClick={() => setSearchOpen(true)} className="w-9 h-9 flex items-center justify-center rounded-full bg-stone-100 text-stone-600 text-base">🔍</button>
        </header>

        <div className="pb-24 lg:pb-8">
          {renderSection()}
        </div>
      </main>

      <GlobalSearch open={searchOpen} onClose={() => setSearchOpen(false)} onJump={(s) => goTo(s)} />

      {/* ── Mobile bottom nav ── */}
      {/* 4 pinned items + ⋯ More – no scrolling, always fits */}
      {(() => {
        const PINNED = ['inicio','conversaciones','dictado','pronunciacion'];
        const [moreOpen, setMoreOpen] = React.useState(false);
        const activeIsPinned = PINNED.includes(section);

        const NavBtn = ({ item, onClick }) => (
          <button onClick={onClick}
            className={`flex flex-col items-center justify-center gap-0.5 flex-1 py-2 transition-all
              ${section === item.id ? 'text-orange-500' : dark ? 'text-stone-400' : 'text-stone-500'}`}>
            <span className="text-xl leading-none">{item.emoji}</span>
            <span className="text-[9px] font-semibold leading-none mt-0.5 truncate max-w-[52px] text-center">{item.label}</span>
          </button>
        );

        return (
          <>
            <nav className={`lg:hidden fixed bottom-0 left-0 right-0 z-40 border-t ${dark ? 'glass-dark border-white/[0.08]' : 'glass-light border-stone-200/60'}`}
              style={{ paddingBottom: 'env(safe-area-inset-bottom)' }}>
              <div className="flex">
                {PINNED.map(id => {
                  const item = NAV_ITEMS.find(n => n.id === id);
                  return item ? <NavBtn key={id} item={item} onClick={() => { goTo(id); setMoreOpen(false); }} /> : null;
                })}
                {/* If current section isn't pinned, show it instead of the last pinned */}
                {!activeIsPinned && (() => {
                  const active = NAV_ITEMS.find(n => n.id === section);
                  return active ? (
                    <button className="flex flex-col items-center justify-center gap-0.5 flex-1 py-2 text-orange-500">
                      <span className="text-xl leading-none">{active.emoji}</span>
                      <span className="text-[9px] font-semibold leading-none mt-0.5 truncate max-w-[52px] text-center">{active.label}</span>
                    </button>
                  ) : null;
                })()}
                {/* ⋯ More button */}
                <button onClick={() => setMoreOpen(o => !o)}
                  className={`flex flex-col items-center justify-center gap-0.5 flex-1 py-2 transition-all ${moreOpen ? 'text-orange-500' : dark ? 'text-stone-400' : 'text-stone-500'}`}>
                  <span className="text-xl leading-none">⋯</span>
                  <span className="text-[9px] font-semibold leading-none mt-0.5">Más</span>
                </button>
              </div>
            </nav>

            {/* More drawer – slides up over content */}
            {moreOpen && (
              <div className="lg:hidden fixed inset-0 z-50 flex flex-col justify-end" onClick={() => setMoreOpen(false)}>
                <div className={`rounded-t-3xl border-t shadow-2xl p-5 pb-8 ${dark ? 'glass-dark border-white/[0.08]' : 'glass-light border-stone-200/60'}`}
                  style={{ paddingBottom: 'calc(env(safe-area-inset-bottom) + 1.5rem)' }}
                  onClick={e => e.stopPropagation()}>
                  <div className={`w-10 h-1 rounded-full mx-auto mb-5 ${dark ? 'bg-white/20' : 'bg-stone-300'}`} />
                  <div className="grid grid-cols-4 gap-2">
                    {NAV_ITEMS.map(item => (
                      <button key={item.id} onClick={() => { goTo(item.id); setMoreOpen(false); }}
                        className={`flex flex-col items-center gap-1.5 p-3 rounded-2xl transition-all
                          ${section === item.id
                            ? 'bg-orange-500 text-white'
                            : dark ? 'bg-white/[0.06] text-stone-300 hover:bg-white/[0.10]' : 'bg-stone-100 text-stone-700 hover:bg-stone-200'
                          }`}>
                        <span className="text-2xl leading-none">{item.emoji}</span>
                        <span className="text-[10px] font-semibold leading-tight text-center">{item.label}</span>
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </>
        );
      })()}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
