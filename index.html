    { es: 'la ventana', en: 'window' },
  ], level: 'A2' },
];

const GLOSSARY_SEED = [
  { es: 'venga', en: 'come on / ok / let\'s go / bye', category: 'slang', example: 'Venga, nos vamos ya' },
  { es: 'mola', en: 'it\'s cool / I like it', category: 'slang', example: 'Esa película mola mucho' },
  { es: 'en plan', en: 'like / kind of', category: 'slang', example: 'Estaba en plan serio' },
  { es: 'guay', en: 'cool / great', category: 'slang', example: 'Qué guay, me alegra mucho' },
  { es: 'flipar', en: 'to freak out / be amazed', category: 'slang', example: 'Me flipa lo que ha pasado' },
];

// HELPERS
// ═══════════════════════════════════════════════════════════════

function getStorageData(key, fallback) {
  try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : fallback; } catch { return fallback; }
}
function setStorageData(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}
function getWordOfDay() {
  const today = new Date().toDateString();
  const idx = Math.abs(today.split('').reduce((a,c,i) => a + c.charCodeAt(0) * (i+1), 0)) % WORDS_OF_DAY.length;
  return WORDS_OF_DAY[idx];
}
function getPhraseOfDay() {
  const today = new Date().toDateString();
  const idx = Math.abs(today.split('').reduce((a,c,i) => a + c.charCodeAt(0) * (i+1), 0) + 7) % PHRASES_OF_DAY.length;
  return PHRASES_OF_DAY[idx];
}

            <div className="flex gap-2">
              <button onClick={addWord} className="flex-1 p-2 bg-orange-500 text-white font-semibold rounded-lg">Guardar</button>
              <button onClick={() => setShowForm(false)} className={`flex-1 p-2 rounded-lg font-semibold ${dark ? 'bg-white/[0.06]' : 'bg-stone-100'}`}>Cancelar</button>
            </div>
          </Card>
        )}

        {!showForm && <button onClick={() => setShowForm(true)} className="w-full p-3 bg-orange-500 text-white font-semibold rounded-lg mb-4">+ Añadir palabra</button>}

        {glossary.map((word, i) => (
          <Card key={i} dark={dark} className="p-4">
            <p className="font-serif font-bold text-lg">{word.es}</p>
            <p className="text-sm text-stone-600">{word.en}</p>
            {word.example && <p className="text-xs italic text-stone-500 mt-1">"{word.example}"</p>}
          </Card>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════════

function App() {
  const [section, setSection] = useState('inicio');
  const [dark, setDark] = useState(getStorageData('hablemos.dark', false));

  useEffect(() => {
    if (dark) document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
    setStorageData('hablemos.dark', dark);
  }, [dark]);

  return (
    <div className={`min-h-screen transition-colors ${dark ? 'mesh-dark' : 'mesh-light'}`}>
      {section === 'inicio' ? (
        <>
          <div className={`sticky top-0 z-50 ${dark ? 'glass-dark border-white/[0.06]' : 'glass-light border-stone-200'} border-b`}>
            <div className="max-w-2xl mx-auto px-4 h-16 flex items-center justify-between">
              <h1 className="font-serif font-bold text-2xl">Hablemos</h1>
              <button onClick={() => setDark(!dark)} className={`w-10 h-10 rounded-lg flex items-center justify-center ${dark ? 'bg-white/[0.08]' : 'bg-stone-100'}`}>
                {dark ? '☀️' : '🌙'}
              </button>
            </div>
          </div>
          <Inicio onSelectSection={setSection} dark={dark} />
        </>
      ) : section === 'hoy' ? <Hoy onBack={() => setSection('inicio')} dark={dark} />
      : section === 'tiempos' ? <Tiempos onBack={() => setSection('inicio')} dark={dark} />
      : section === 'chuletas' ? (
        <div>
          <BackHeader title="Chuletas" onBack={() => setSection('inicio')} dark={dark} />
          <div className="max-w-2xl mx-auto px-4 py-6 pb-12 space-y-3">
            {CHEAT_SHEETS.map(cs => (
              <Card key={cs.id} dark={dark} className="p-4">
                <p className="font-serif font-bold mb-2">{cs.title}</p>
                <p className="text-sm text-stone-600">{cs.concept}</p>
                {cs.examples && <div className="mt-3 space-y-1">{cs.examples.map((ex, i) => <p key={i} className="text-xs text-stone-700">• {ex}</p>)}</div>}
                {cs.cards && <div className="mt-3 space-y-1">{cs.cards.map((card, i) => <p key={i} className="text-xs"><span className="font-semibold">{card.es}</span> — {card.en} ({card.usage})</p>)}</div>}
              </Card>
            ))}
          </div>
        </div>
      )
      : section === 'vocabulario' ? <Vocabulario onBack={() => setSection('inicio')} dark={dark} />
      : section === 'conectores' ? <Conectores onBack={() => setSection('inicio')} dark={dark} />
      : section === 'frases' ? <Frases onBack={() => setSection('inicio')} dark={dark} />
      : section === 'ejercicios' ? <Ejercicios onBack={() => setSection('inicio')} dark={dark} />
      : section === 'glosario' ? <Glosario onBack={() => setSection('inicio')} dark={dark} />
      : null}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
