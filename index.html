<script>
// Generate 180×180 PNG app icon via Canvas — works with no external files
(function(){
  try {
    var c = document.createElement('canvas');
    c.width = c.height = 180;
    var ctx = c.getContext('2d');
    // Background: Spanish red top/bottom, yellow band
    ctx.fillStyle = '#c60b1e'; ctx.fillRect(0,0,180,180);
    ctx.fillStyle = '#f1bf00'; ctx.fillRect(0,45,180,90);
    // Rounded mask
    ctx.globalCompositeOperation = 'destination-in';
    ctx.beginPath();
    var r=36;
    ctx.moveTo(r,0); ctx.lineTo(180-r,0); ctx.quadraticCurveTo(180,0,180,r);
    ctx.lineTo(180,180-r); ctx.quadraticCurveTo(180,180,180-r,180);
    ctx.lineTo(r,180); ctx.quadraticCurveTo(0,180,0,180-r);
    ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0); ctx.closePath(); ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    // "A" letter
    ctx.fillStyle = '#7a0012';
    ctx.font = 'bold 112px Georgia,serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('A', 90, 96);
    var url = c.toDataURL('image/png');
    document.getElementById('apple-touch-icon-link').href = url;
    document.getElementById('favicon-link').href = url;
  } catch(e){}
})();
</script>

const WORDS_OF_DAY = [
  { es:'cotidiano', en:'everyday / daily', example:'Las tareas cotidianas pueden ser agotadoras.', exampleEn:'Everyday tasks can be exhausting.', tip:'From "cada día". Use it instead of "diario" for a more sophisticated register.' },
  { es:'mañana', en:'tomorrow / morning', example:'Mañana por la mañana tengo una reunión.', exampleEn:'Tomorrow morning I have a meeting.', tip:'Same word for both meanings – context clarifies. "Esta mañana" = this morning, "mañana" alone = tomorrow.' },
  { es:'apenas', en:'hardly / barely / just', example:'Apenas llegué cuando empezó a llover.', exampleEn:'I had just arrived when it started to rain.', tip:'Can mean "barely" (apenas dormí) or "just/as soon as" (apenas llegué). Super useful connector.' },
  { es:'sino', en:'but rather / but instead', example:'No es tonto, sino muy distraído.', exampleEn:'He is not stupid, but rather very distracted.', tip:'"Sino" follows a negation and introduces a correction. "Pero" just adds contrast; "sino" replaces.' },
  { es:'aún', en:'still / yet (with accent = still)', example:'Aún no ha llegado nadie.', exampleEn:'Nobody has arrived yet.', tip:'"Aún" (accent) = still/yet. "Aun" (no accent) = even. Aún no = not yet. Todavía and aún are interchangeable.' },
  { es:'pues', en:'well / since / then / so', example:'Pues, no sé qué decirte.', exampleEn:'Well, I don\'t know what to tell you.', tip:'One of the most versatile Spanish filler/connector words. "Pues" as a filler = "well/so". Also means "since/because" in formal writing.' },
  { es:'demás', en:'the rest / the others', example:'Los demás estudiantes ya han terminado.', exampleEn:'The other students have already finished.', tip:'"Los demás" = the rest/the others. "Lo demás" = the rest (of things). Not to be confused with "demasiado" (too much).' },
  { es:'senda', en:'path / track / way', example:'Siguieron la senda hasta el río.', exampleEn:'They followed the path to the river.', tip:'More poetic than "camino". Common in literature and hiking contexts. "Ir por buen camino/senda" = to be on the right track.' },
  { es:'conque', en:'so / so then / and so', example:'Llegas tarde, conque te espero mañana.', exampleEn:'You\'re late, so I\'ll wait for you tomorrow.', tip:'Consequence connector. Written as one word. Slightly formal/literary. Equivalent to "así que" or "por lo tanto" in informal speech.' },
  { es:'vejez', en:'old age', example:'La vejez trae sabiduría y experiencia.', exampleEn:'Old age brings wisdom and experience.', tip:'From "viejo". Related: "envejecer" (to age), "anciano/a" (elderly person). "En la vejez" = in old age.' },
  { es:'madrugar', en:'to get up early / to be an early riser', example:'Hay que madrugar para coger el primer tren.', exampleEn:'You have to get up early to catch the first train.', tip:'"Madrugada" = early hours (1am–6am). "Madrugar" literally means to rise at dawn. The noun is "madrugón" (early start).' },
  { es:'apetecer', en:'to feel like / to fancy (food/activity)', example:'¿Te apetece tomar algo?', exampleEn:'Do you fancy something to drink?', tip:'Works like "gustar" – the thing you want is the subject. "Me apetece una cerveza" = I fancy a beer. Very natural in Spain.' },
  { es:'resultar', en:'to turn out / to prove to be', example:'Resultó que tenía razón.', exampleEn:'It turned out that she was right.', tip:'"Resultar que..." = it turns out that. "Me resultó difícil" = I found it difficult. Very common in spoken Spanish.' },
  { es:'enterarse', en:'to find out / to realise / to hear about', example:'¿Te has enterado de la noticia?', exampleEn:'Have you heard the news?', tip:'"Enterarse de algo" = to find out about something. "Me enteré tarde" = I found out late. Colloquially, "¿te enteras?" = do you get it?' },
  { es:'aprovechar', en:'to make the most of / to take advantage of', example:'Hay que aprovechar el buen tiempo.', exampleEn:'You have to make the most of the good weather.', tip:'"¡Que aproveche!" = Enjoy your meal! (said to someone eating). "Aprovechar la ocasión" = to seize the opportunity.' },
  { es:'quedarse', en:'to stay / to remain / to keep', example:'Me quedé en casa todo el fin de semana.', exampleEn:'I stayed at home all weekend.', tip:'"Quedarse con algo" = to keep something. "Quedarse + adj" = to become/end up: "me quedé helado" (I was stunned).' },
  { es:'llevar', en:'to have been (+ time expression)', example:'Llevo tres años viviendo en Valencia.', exampleEn:'I have been living in Valencia for three years.', tip:'"Llevar + time + gerund" = to have been doing something for a period. One of the most useful constructions in Spanish.' },
  { es:'tardar', en:'to take time / to be long / to delay', example:'El tren tarda veinte minutos en llegar.', exampleEn:'The train takes twenty minutes to arrive.', tip:'"Tardar en + infinitive" = to take time to do. "No tardes" = don\'t be long. "¿Cuánto tarda?" = How long does it take?' },
  { es:'echar de menos', en:'to miss (a person/place)', example:'Echo de menos a mi familia en Irlanda.', exampleEn:'I miss my family in Ireland.', tip:'Literally "to throw from less". In Latin America, "extrañar" is used instead. Both are correct.' },
  { es:'darse cuenta', en:'to realise / to notice', example:'Me di cuenta de que había cometido un error.', exampleEn:'I realised I had made a mistake.', tip:'"Darse cuenta de + que/noun". Not to be confused with "realizar" which means to carry out/achieve, not to realise.' },
  { es:'ponerse', en:'to become / to put on / to start (+ a)', example:'Se puso muy nervioso antes del examen.', exampleEn:'He became very nervous before the exam.', tip:'"Ponerse + adj" = to become (emotional/physical change). "Ponerse a + infinitivo" = to start doing something.' },
  { es:'meterse', en:'to get into / to interfere / to go into', example:'No te metas en lo que no te importa.', exampleEn:'Don\'t interfere in things that don\'t concern you.', tip:'"Meterse en" = to get involved in. "Meterse con alguien" = to pick on someone. "¿Dónde me he metido?" = What have I got myself into?' },
  { es:'tratar de', en:'to try to / to be about (a topic)', example:'Voy a tratar de llegar antes de las ocho.', exampleEn:'I\'m going to try to arrive before eight.', tip:'"Tratar de + infinitivo" = to try to do. "Tratar de + tema" = to deal with/be about. "¿De qué trata?" = What is it about?' },
  { es:'acabar de', en:'to have just (done something)', example:'Acabo de llegar del trabajo.', exampleEn:'I\'ve just arrived from work.', tip:'"Acabar de + infinitivo" in present = have just done. In imperfect: "acababa de salir" = had just left. Very common, very natural.' },
  { es:'soler', en:'to usually do / to be in the habit of', example:'Suelo desayunar a las ocho.', exampleEn:'I usually have breakfast at eight.', tip:'Only exists in present and imperfect. "Solía ir al gimnasio" = I used to go to the gym. Expresses habitual action.' },
  { es:'estar a punto de', en:'to be about to', example:'Estaba a punto de salir cuando llamaste.', exampleEn:'I was about to leave when you called.', tip:'Exact equivalent of English "to be about to". Works in all tenses. Very useful for dramatic timing in storytelling.' },
  { es:'valer la pena', en:'to be worth it / to be worthwhile', example:'Vale la pena estudiar todos los días.', exampleEn:'It\'s worth studying every day.', tip:'"Valer la pena + infinitivo" or "valer la pena que + subjuntivo". "¿Merece la pena?" is equally common.' },
  { es:'tener ganas', en:'to feel like / to look forward to', example:'Tengo muchas ganas de verte.', exampleEn:'I really look forward to seeing you.', tip:'"Tener ganas de + infinitivo". "¡Qué ganas!" = I can\'t wait! One of the most expressive phrases in colloquial Spanish.' },
  { es:'hacer falta', en:'to need / to be necessary', example:'Hace falta más práctica para mejorar.', exampleEn:'More practice is needed to improve.', tip:'Works like "gustar". "Me hace falta" = I need. "¿Hace falta reservar?" = Is it necessary to book? Very natural alternative to "necesitar".' },
  { es:'dar igual', en:'to not matter / to be all the same', example:'Me da igual qué película ponemos.', exampleEn:'I don\'t mind which film we put on.', tip:'"Me da igual" = I don\'t mind / it\'s all the same to me. "¡Da igual!" = Never mind! / It doesn\'t matter! Extremely common.' },
  { es:'merendar', en:'to have an afternoon snack', example:'Los niños meriendan a las cinco.', exampleEn:'The children have an afternoon snack at five.', tip:'"La merienda" is a sacred Spanish institution – typically around 5pm, between lunch and dinner.' },
  { es:'cabrearse', en:'to get pissed off / really angry', example:'Se cabreó cuando vio el precio.', exampleEn:'He got pissed off when he saw the price.', tip:'Strong colloquial Spain. "Estar cabreado" = to be pissed off. Avoid in formal contexts.' },
  { es:'currar', en:'to work (slang)', example:'Mañana tengo que currar todo el día.', exampleEn:'Tomorrow I have to work all day.', tip:'Spain slang for "trabajar". "El curro" = the job. Universal in casual speech.' },
  { es:'molar', en:'to be cool / to like (slang)', example:'¡Esa camiseta mola mucho!', exampleEn:'That t-shirt is really cool!', tip:'Works like "gustar". "Me mola tu idea" = I love your idea. Quintessential Spain slang.' },
  { es:'flipar', en:'to be amazed / freak out', example:'Vas a flipar cuando lo veas.', exampleEn:'You\'re going to freak out when you see it.', tip:'"Estoy flipando" = I can\'t believe it. "Flipar en colores" = to be totally amazed.' },
  { es:'guay', en:'cool / great', example:'¡Qué guay tu coche nuevo!', exampleEn:'How cool is your new car!', tip:'Classic Spain slang. Slightly dated but still widely used. Universal positive adjective.' },
  { es:'majo', en:'nice / friendly / good-looking', example:'Tu hermano es muy majo.', exampleEn:'Your brother is really nice.', tip:'Very Spain. Means a warm, easy-going, likeable person. Higher praise than it sounds.' },
  { es:'chulo', en:'cool / cocky (depending)', example:'Ese bar es muy chulo.', exampleEn:'That bar is really cool.', tip:'For things = cool/nice. For people = cocky/arrogant. Context matters.' },
  { es:'pasta', en:'money (slang)', example:'No tengo pasta hasta el viernes.', exampleEn:'I have no money until Friday.', tip:'Universal Spain slang for money. "Estar sin pasta" = to be broke.' },
  { es:'tío/tía', en:'mate / dude (literally uncle/aunt)', example:'Oye tío, ¿qué tal?', exampleEn:'Hey mate, how\'s it going?', tip:'Used like "dude" in English. Among friends. Also literal meaning is uncle/aunt.' },
  { es:'vale', en:'okay / alright', example:'Vale, nos vemos a las ocho.', exampleEn:'Okay, see you at eight.', tip:'The most Spanish word ever. Means okay/sure/got it. Also "valer" = to be worth.' },
  { es:'vamos', en:'come on / let\'s go / well', example:'Vamos, no es para tanto.', exampleEn:'Come on, it\'s not that bad.', tip:'More than just "let\'s go" – used as a filler meaning "I mean" or "come on".' },
  { es:'venga', en:'come on / okay then', example:'¡Venga, vamos!', exampleEn:'Come on, let\'s go!', tip:'Imperative of "venir" but functions as encouragement, agreement, or goodbye.' },
  { es:'hala', en:'wow / come on', example:'¡Hala, qué grande es!', exampleEn:'Wow, how big it is!', tip:'Expression of surprise or encouragement. Very Spanish, hard to translate exactly.' },
  { es:'jolín', en:'darn / dang (mild)', example:'¡Jolín, qué frío hace!', exampleEn:'Dang, it\'s so cold!', tip:'Mild softened version of stronger swear words. Family-friendly frustration.' },
  { es:'menudo', en:'what a... (ironic intensifier)', example:'¡Menudo lío!', exampleEn:'What a mess!', tip:'Counterintuitively, "menudo" (small) is used ironically to mean "what a huge..." in exclamations.' },
  { es:'menos mal', en:'thank goodness / good thing', example:'Menos mal que llegué a tiempo.', exampleEn:'Thank goodness I arrived on time.', tip:'Expression of relief. "Menos mal que..." = Good thing that... Extremely common.' },
  { es:'ojalá', en:'I hope / if only / hopefully', example:'Ojalá no llueva mañana.', exampleEn:'I hope it doesn\'t rain tomorrow.', tip:'From Arabic "in sha Allah". Always triggers subjunctive. Pure Spanish optimism.' },
  { es:'a lo mejor', en:'maybe / perhaps', example:'A lo mejor vamos al cine esta noche.', exampleEn:'Maybe we\'ll go to the cinema tonight.', tip:'Counterintuitively takes indicative, not subjunctive. Equivalent to "quizás" or "tal vez" (which take subjunctive).' },
  { es:'a ver', en:'let\'s see', example:'A ver qué pasa.', exampleEn:'Let\'s see what happens.', tip:'Universal filler. Used to start sentences, express thinking, or ask for attention.' },
  { es:'o sea', en:'I mean / that is to say', example:'No vino, o sea, no pudo venir.', exampleEn:'He didn\'t come, I mean, he couldn\'t come.', tip:'Most common clarification filler. Slightly overused by some speakers, but completely standard.' },
  { es:'es decir', en:'that is to say / i.e.', example:'Trabajo en el centro, es decir, en la Plaza Mayor.', exampleEn:'I work downtown, that is, in Plaza Mayor.', tip:'Slightly more formal than "o sea". Used to elaborate or clarify.' },
  { es:'por cierto', en:'by the way', example:'Por cierto, ¿has visto a María?', exampleEn:'By the way, have you seen María?', tip:'Used to introduce a tangent or change of subject. Same role as English "by the way".' },
  { es:'de hecho', en:'in fact / actually', example:'De hecho, lo sabía desde el principio.', exampleEn:'In fact, I knew from the beginning.', tip:'Used to introduce a fact that may surprise or contradict. Common in arguments.' },
  { es:'en realidad', en:'actually / really', example:'En realidad, no me gusta el café.', exampleEn:'Actually, I don\'t like coffee.', tip:'Use to gently correct or clarify. Note: "realmente" exists but is less natural in speech.' },
  { es:'en serio', en:'seriously / really?', example:'¿En serio? No me lo creo.', exampleEn:'Seriously? I don\'t believe it.', tip:'Both a question of disbelief and a statement of seriousness. Tone tells you which.' },
  { es:'a propósito', en:'on purpose / by the way', example:'Lo hizo a propósito.', exampleEn:'He did it on purpose.', tip:'Two meanings: intentionally OR (like "por cierto") by the way.' },
  { es:'sin embargo', en:'however / nevertheless', example:'Es difícil; sin embargo, vale la pena.', exampleEn:'It\'s difficult; however, it\'s worth it.', tip:'Formal contrast connector. Stronger than "pero". Common in writing.' },
  { es:'a pesar de', en:'in spite of / despite', example:'A pesar de la lluvia, salimos.', exampleEn:'In spite of the rain, we went out.', tip:'"A pesar de + noun/infinitive". "A pesar de que + verb". Very useful B1 connector.' },
  { es:'aunque', en:'although / even though', example:'Aunque está cansado, sigue trabajando.', exampleEn:'Although he\'s tired, he keeps working.', tip:'With indicative = factual concession. With subjunctive = hypothetical. Key B1 distinction.' },
  { es:'mientras', en:'while / as long as', example:'Mientras estudiaba, escuchaba música.', exampleEn:'While he was studying, he was listening to music.', tip:'"Mientras" + indicative = simultaneous time. + subjunctive = "as long as".' },
  { es:'cuanto antes', en:'as soon as possible', example:'Llámame cuanto antes.', exampleEn:'Call me as soon as possible.', tip:'Equivalent of ASAP. More natural than "lo más pronto posible" in speech.' },
  { es:'a menudo', en:'often / frequently', example:'Voy al gimnasio a menudo.', exampleEn:'I go to the gym often.', tip:'Common alternative to "frecuentemente". Sounds more natural in speech.' },
  { es:'de vez en cuando', en:'from time to time', example:'De vez en cuando voy al teatro.', exampleEn:'From time to time I go to the theatre.', tip:'Beautiful set phrase. Means occasionally. Use freely.' },
  { es:'a veces', en:'sometimes', example:'A veces me siento solo.', exampleEn:'Sometimes I feel alone.', tip:'Most basic frequency expression. Don\'t confuse with "a vez" (doesn\'t exist).' },
  { es:'siempre que', en:'whenever / as long as', example:'Siempre que vengas, eres bienvenido.', exampleEn:'Whenever you come, you\'re welcome.', tip:'With subjunctive = condition ("provided that"). With indicative = "every time that".' },
  { es:'en cuanto', en:'as soon as', example:'En cuanto llegue, te aviso.', exampleEn:'As soon as he arrives, I\'ll let you know.', tip:'Triggers subjunctive when referring to future events. B1 favourite.' },
  { es:'hasta que', en:'until', example:'Espera hasta que termine.', exampleEn:'Wait until I finish.', tip:'Future = subjunctive. Past habitual = indicative. Watch the trigger rule.' },
  { es:'antes de', en:'before', example:'Antes de salir, cierra la puerta.', exampleEn:'Before leaving, close the door.', tip:'"Antes de + infinitive". "Antes de que + subjunctive" if there\'s a different subject.' },
  { es:'después de', en:'after', example:'Después de comer, dormimos siesta.', exampleEn:'After eating, we take a nap.', tip:'Same pattern as "antes de". + infinitive (same subject) or + que + subjunctive (different subject).' },
  { es:'al + infinitivo', en:'upon / when (doing)', example:'Al entrar, vi el regalo.', exampleEn:'Upon entering, I saw the gift.', tip:'Compact way to express simultaneous action. "Al + infinitive" = "when/upon doing".' },
  { es:'desde hace', en:'for (time period, ongoing)', example:'Vivo aquí desde hace cinco años.', exampleEn:'I\'ve lived here for five years.', tip:'For ongoing actions. Alternative to "llevar + time + gerund".' },
  { es:'hace', en:'ago', example:'Hace dos años que nos conocimos.', exampleEn:'We met two years ago.', tip:'"Hace + time" = ago. Different from "desde hace" which means "for".' },
  { es:'recién', en:'recently / just', example:'Está recién hecho.', exampleEn:'It\'s freshly made.', tip:'Common in Latin America for "just". In Spain, more limited usage. "Recién casados" = newlyweds.' },
  { es:'casi', en:'almost / nearly', example:'Casi me caigo.', exampleEn:'I almost fell.', tip:'Note: Spanish often uses present tense with "casi" where English uses past ("casi me caigo" = I almost fell).' },
  { es:'cada vez más', en:'more and more', example:'Hace cada vez más calor.', exampleEn:'It\'s getting hotter and hotter.', tip:'Beautiful comparative. "Cada vez menos" = less and less.' },
  { es:'tan pronto como', en:'as soon as', example:'Tan pronto como pueda, te llamo.', exampleEn:'As soon as I can, I\'ll call you.', tip:'Synonym of "en cuanto". Same subjunctive trigger for future events.' },
  { es:'al final', en:'in the end / finally', example:'Al final, decidió quedarse.', exampleEn:'In the end, he decided to stay.', tip:'Used to introduce the outcome of a process. Different from "finalmente" (more formal).' },
  { es:'en fin', en:'anyway / well', example:'En fin, no importa.', exampleEn:'Anyway, it doesn\'t matter.', tip:'Resignation filler. "En fin..." closes a topic with mild dismissal or acceptance.' },
  { es:'al fin y al cabo', en:'at the end of the day / after all', example:'Al fin y al cabo, somos amigos.', exampleEn:'At the end of the day, we\'re friends.', tip:'Beautiful philosophical connector. Use to make a conclusive point.' },
  { es:'por fin', en:'finally / at last', example:'¡Por fin llegaste!', exampleEn:'You finally arrived!', tip:'Expresses relief or impatience that something has finally happened. Different from "finalmente".' },
  { es:'desde luego', en:'of course / certainly', example:'Desde luego que sí.', exampleEn:'Of course yes.', tip:'Strong agreement. More emphatic than "claro". Often used in disbelief: "¡Desde luego!"' },
  { es:'por supuesto', en:'of course', example:'Por supuesto que vendré.', exampleEn:'Of course I\'ll come.', tip:'Slightly more formal than "claro". Standard polite agreement.' },
  { es:'claro', en:'of course / sure', example:'Claro, no hay problema.', exampleEn:'Sure, no problem.', tip:'Most common agreement word. Also literally "clear" or "light-coloured".' },
  { es:'qué va', en:'no way / not at all', example:'¿Estás enfadado? – ¡Qué va!', exampleEn:'Are you angry? – Not at all!', tip:'Strong but friendly denial. Very Spanish. Means "absolutely not".' },
  { es:'ni de coña', en:'no way / not a chance', example:'¿Ir mañana? Ni de coña.', exampleEn:'Go tomorrow? No way.', tip:'Strong informal denial. Slightly vulgar. "Ni de broma" is the milder version.' },
  { es:'ni hablar', en:'no way / out of the question', example:'¿Préstamelo? Ni hablar.', exampleEn:'Lend it to me? Out of the question.', tip:'Polite but firm refusal. Family-friendly version of "ni de coña".' },
  { es:'a lo mejor', en:'maybe', example:'A lo mejor lo hago mañana.', exampleEn:'Maybe I\'ll do it tomorrow.', tip:'Takes indicative (unusual!). Spain prefers this to "quizás" in speech.' },
  { es:'pegar', en:'to hit / to suit / to stick', example:'Esa camisa pega bien con los pantalones.', exampleEn:'That shirt goes well with the trousers.', tip:'Multiple meanings. "Pegar" = to glue, to hit, to suit (clothes).' },
  { es:'tocar', en:'to touch / to play (instrument) / to be one\'s turn', example:'Te toca a ti.', exampleEn:'It\'s your turn.', tip:'"Me toca" = it\'s my turn. Also "tocar la guitarra" = to play guitar.' },
  { es:'caber', en:'to fit', example:'No cabe en la maleta.', exampleEn:'It doesn\'t fit in the suitcase.', tip:'Highly irregular. "Yo quepo" (present), "cupe" (preterite). Means physically fit.' },
  { es:'hacer caso', en:'to pay attention / heed', example:'No me hace caso.', exampleEn:'He doesn\'t pay attention to me.', tip:'"Hacer caso a alguien" = to listen to/heed someone. Common in parenting and relationships.' },
  { es:'tener cuidado', en:'to be careful', example:'Ten cuidado al cruzar la calle.', exampleEn:'Be careful crossing the street.', tip:'"¡Cuidado!" alone = "Watch out!" Standard safety expression.' },
  { es:'tener razón', en:'to be right', example:'Tienes razón, me equivoqué.', exampleEn:'You\'re right, I was wrong.', tip:'Spanish uses "tener" not "ser" for being right. "Estar en lo cierto" is the formal alternative.' },
  { es:'tener prisa', en:'to be in a hurry', example:'Tengo prisa, hablamos luego.', exampleEn:'I\'m in a hurry, we\'ll talk later.', tip:'"Tener" + noun is common where English uses "to be" + adjective.' },
  { es:'tener sueño', en:'to be sleepy', example:'Tengo mucho sueño.', exampleEn:'I\'m very sleepy.', tip:'Not "estar cansado". "Tener sueño" specifically means sleepy/tired.' },
  { es:'tener miedo', en:'to be afraid', example:'Tengo miedo de los perros.', exampleEn:'I\'m afraid of dogs.', tip:'"Tener miedo de + noun/infinitive" or "tener miedo a + noun".' },
  { es:'tener vergüenza', en:'to be embarrassed', example:'Me da vergüenza hablar en público.', exampleEn:'I\'m embarrassed to speak in public.', tip:'"Dar vergüenza" is more common in Spain. Both work.' },
  { es:'tener éxito', en:'to be successful', example:'Su negocio ha tenido mucho éxito.', exampleEn:'His business has been very successful.', tip:'Don\'t use "exitoso" – "tener éxito" is the standard.' },
  { es:'tener lugar', en:'to take place', example:'El concierto tendrá lugar el sábado.', exampleEn:'The concert will take place on Saturday.', tip:'Formal phrase for events. Equivalent to "celebrarse".' },
  { es:'darse prisa', en:'to hurry up', example:'¡Date prisa o llegamos tarde!', exampleEn:'Hurry up or we\'ll be late!', tip:'Reflexive form. "Apurarse" exists but is more Latin American.' },
  { es:'ponerse de acuerdo', en:'to agree / come to an agreement', example:'No podemos ponernos de acuerdo.', exampleEn:'We can\'t agree.', tip:'Stronger than just "estar de acuerdo". Implies the process of negotiation.' },
  { es:'acordarse de', en:'to remember', example:'No me acuerdo de su nombre.', exampleEn:'I don\'t remember his name.', tip:'Reflexive. Different from "recordar" (transitive). Both mean to remember but used differently.' },
  { es:'olvidarse de', en:'to forget', example:'Me olvidé de las llaves.', exampleEn:'I forgot the keys.', tip:'"Olvidarse de + noun/infinitive". The accidental "se me olvidó" structure is even more Spanish.' },
  { es:'parecerse a', en:'to look like / resemble', example:'Te pareces mucho a tu padre.', exampleEn:'You look a lot like your father.', tip:'For physical or character resemblance. "Parecer" alone = to seem.' },
  { es:'fijarse en', en:'to notice / pay attention to', example:'Fíjate en los detalles.', exampleEn:'Pay attention to the details.', tip:'"¡Fíjate!" alone = "Just imagine!" or "Look at that!"' },
  { es:'atreverse a', en:'to dare to', example:'No me atrevo a decírselo.', exampleEn:'I don\'t dare tell him.', tip:'Reflexive verb. Always with "a" + infinitive.' },
  { es:'arrepentirse de', en:'to regret', example:'Me arrepiento de no haberlo hecho.', exampleEn:'I regret not having done it.', tip:'"De" + noun or "de + haber + participle" for past regrets.' },
  { es:'quejarse de', en:'to complain about', example:'Siempre se queja del trabajo.', exampleEn:'He always complains about work.', tip:'Quintessentially Spanish activity. Always with "de".' },
  { es:'reírse de', en:'to laugh at', example:'Se ríen de mi acento.', exampleEn:'They laugh at my accent.', tip:'Reflexive form. "Reír" alone exists but reflexive is more common.' },
  { es:'enamorarse de', en:'to fall in love with', example:'Me enamoré de ella al instante.', exampleEn:'I fell in love with her instantly.', tip:'Always "de" + person. "Estar enamorado de" = to be in love with.' },
  { es:'casarse con', en:'to marry / get married to', example:'Se casó con su novia del instituto.', exampleEn:'He married his high school girlfriend.', tip:'"Con" not "a"! Spanish "marries with" someone.' },
  { es:'soñar con', en:'to dream of/about', example:'Sueño con viajar a Japón.', exampleEn:'I dream of travelling to Japan.', tip:'"Con" not "de" or "sobre". For both literal sleep dreams and aspirations.' },
  { es:'contar con', en:'to count on / rely on', example:'Puedes contar conmigo.', exampleEn:'You can count on me.', tip:'"Contar con + person" = to rely on. Also "contar" alone = to count or to tell (a story).' },
  { es:'pensar en', en:'to think about', example:'Pienso en ti todos los días.', exampleEn:'I think about you every day.', tip:'"Pensar en + thing/person" = to think about. "Pensar de" = to have an opinion of.' },
  { es:'creer en', en:'to believe in', example:'Creo en ti.', exampleEn:'I believe in you.', tip:'For faith or trust. "Creer + que" = to think that.' },
  { es:'consistir en', en:'to consist of', example:'Mi trabajo consiste en escribir.', exampleEn:'My job consists of writing.', tip:'"En" not "de". A common preposition trap.' },
  { es:'tardar en', en:'to take time to / be slow to', example:'Tardé en entenderlo.', exampleEn:'It took me a while to understand it.', tip:'"Tardar en + infinitive". Different from "tomar tiempo".' },
  { es:'insistir en', en:'to insist on', example:'Insiste en pagar la cuenta.', exampleEn:'He insists on paying the bill.', tip:'"Insistir en + infinitive/noun". Don\'t say "insistir sobre".' },
  { es:'depender de', en:'to depend on', example:'Depende de ti.', exampleEn:'It depends on you.', tip:'"Depende" alone is one of the most Spanish answers ever – meaning "it depends".' },
  { es:'acabar con', en:'to put an end to / finish off', example:'Hay que acabar con esta situación.', exampleEn:'We need to put an end to this situation.', tip:'Strong meaning. "Acabar con + thing" = to eliminate or destroy.' },
  { es:'a partir de', en:'from / starting from', example:'A partir de mañana, no fumo más.', exampleEn:'Starting tomorrow, I\'m not smoking anymore.', tip:'For time or quantity. Marks a starting point.' },
  { es:'hasta entonces', en:'until then', example:'Hasta entonces, sigue practicando.', exampleEn:'Until then, keep practising.', tip:'"Hasta" appears in many farewells and time expressions.' },
  { es:'mientras tanto', en:'meanwhile / in the meantime', example:'Yo cocino. Mientras tanto, pon la mesa.', exampleEn:'I\'ll cook. Meanwhile, set the table.', tip:'Natural way to introduce a parallel action.' },
  { es:'por casualidad', en:'by chance / by accident', example:'Nos encontramos por casualidad.', exampleEn:'We met by chance.', tip:'Beautiful set phrase. "Por casualidad" = by coincidence.' },
  { es:'por suerte', en:'luckily', example:'Por suerte, no había nadie.', exampleEn:'Luckily, nobody was there.', tip:'Common alternative to "afortunadamente". More natural in speech.' },
  { es:'por desgracia', en:'unfortunately', example:'Por desgracia, no puedo ir.', exampleEn:'Unfortunately, I can\'t go.', tip:'Common alternative to "desafortunadamente". Note "desgracia" = misfortune.' },
  { es:'a propósito', en:'on purpose', example:'Lo dijo a propósito para molestarme.', exampleEn:'He said it on purpose to bother me.', tip:'Two meanings: intentionally, OR "by the way" (like "por cierto").' },
  { es:'al revés', en:'the wrong way / backwards', example:'Tienes el jersey al revés.', exampleEn:'You have your jumper on backwards.', tip:'Also figuratively: "Lo entendiste al revés" = You understood it the wrong way.' },
  { es:'de repente', en:'suddenly', example:'De repente, empezó a llover.', exampleEn:'Suddenly, it started raining.', tip:'Standard storytelling phrase. "De pronto" is the synonym.' },
  { es:'poco a poco', en:'little by little', example:'Poco a poco vas mejorando.', exampleEn:'Little by little you\'re improving.', tip:'Encouraging phrase for slow progress. Use freely with learners.' },
  { es:'paso a paso', en:'step by step', example:'Paso a paso, llegarás lejos.', exampleEn:'Step by step, you\'ll go far.', tip:'Same idea as "poco a poco" but more methodical.' },
  { es:'en seguida', en:'right away / immediately', example:'Voy en seguida.', exampleEn:'I\'m coming right away.', tip:'Also written "enseguida". Standard "I\'ll be right there".' },
  { es:'de pronto', en:'suddenly', example:'De pronto, todo cambió.', exampleEn:'Suddenly, everything changed.', tip:'Synonym of "de repente". Use whichever feels natural.' },
  { es:'a veces', en:'sometimes', example:'A veces dudo de mí mismo.', exampleEn:'Sometimes I doubt myself.', tip:'Most common adverb of frequency. Always plural "veces".' },
  { es:'a menudo', en:'often', example:'Vamos a la playa a menudo.', exampleEn:'We go to the beach often.', tip:'Synonym of "frecuentemente" but more natural in speech.' },
  { es:'rara vez', en:'rarely', example:'Rara vez veo la tele.', exampleEn:'I rarely watch TV.', tip:'Singular "vez". Don\'t confuse with "raras veces" (also valid but less common).' },
  { es:'casi nunca', en:'almost never', example:'Casi nunca como carne.', exampleEn:'I almost never eat meat.', tip:'Stronger version of "raramente". Very common.' },
  { es:'casi siempre', en:'almost always', example:'Casi siempre desayuno fruta.', exampleEn:'I almost always have fruit for breakfast.', tip:'Useful softener for absolute statements.' },
  { es:'a diario', en:'daily / every day', example:'Practico español a diario.', exampleEn:'I practise Spanish daily.', tip:'More elegant than "todos los días". Common in writing.' },
  { es:'todos los días', en:'every day', example:'Voy al gimnasio todos los días.', exampleEn:'I go to the gym every day.', tip:'Most basic frequency expression. Plural "días". Don\'t say "cada día" (though understood).' },
  { es:'cada dos por tres', en:'all the time / constantly', example:'Cambia de opinión cada dos por tres.', exampleEn:'He changes his mind all the time.', tip:'Idiomatic frequency expression meaning "every other minute".' },
  { es:'a la vez', en:'at the same time', example:'No puedo hacer dos cosas a la vez.', exampleEn:'I can\'t do two things at the same time.', tip:'"Al mismo tiempo" is the synonym. Both standard.' },
  { es:'por lo general', en:'generally / usually', example:'Por lo general, ceno tarde.', exampleEn:'Generally, I have dinner late.', tip:'Common alternative to "generalmente". More natural in speech.' },
  { es:'por lo visto', en:'apparently', example:'Por lo visto, no vendrá.', exampleEn:'Apparently, he\'s not coming.', tip:'For information you\'ve heard but can\'t verify. Less committal than "parece que".' },
  { es:'al parecer', en:'apparently / seemingly', example:'Al parecer, hubo un problema.', exampleEn:'Apparently, there was a problem.', tip:'Synonym of "por lo visto". Slightly more formal.' },
  { es:'según parece', en:'as it seems / apparently', example:'Según parece, todo fue un malentendido.', exampleEn:'As it seems, it was all a misunderstanding.', tip:'Even more nuanced version. Use to report indirectly.' },
  { es:'a lo largo de', en:'throughout / along', example:'A lo largo del año, viajamos mucho.', exampleEn:'Throughout the year, we travel a lot.', tip:'Time or space. "A lo largo de la historia" = throughout history.' },
  { es:'a lo lejos', en:'in the distance', example:'A lo lejos se veía el mar.', exampleEn:'In the distance you could see the sea.', tip:'Beautiful phrase for descriptions. Sets a vivid scene.' },
  { es:'a primera vista', en:'at first sight', example:'A primera vista parece sencillo.', exampleEn:'At first sight it seems simple.', tip:'Also "amor a primera vista" = love at first sight.' },
  { es:'a simple vista', en:'with the naked eye / clearly visible', example:'No se nota a simple vista.', exampleEn:'You can\'t see it with the naked eye.', tip:'Different from "a primera vista". This is about visibility, not first impressions.' },
  { es:'al aire libre', en:'outdoors / in the open air', example:'Cenamos al aire libre.', exampleEn:'We had dinner outdoors.', tip:'Standard expression for outdoor activities. Don\'t say "afuera" for this.' },
  { es:'a pie', en:'on foot', example:'Voy al trabajo a pie.', exampleEn:'I walk to work.', tip:'"A + transport" is fixed: a pie, a caballo. But "en coche, en tren, en avión".' },
  { es:'en serio', en:'seriously', example:'Te lo digo en serio.', exampleEn:'I\'m telling you seriously.', tip:'For both questions ("¿en serio?") and statements.' },
  { es:'de broma', en:'as a joke / kidding', example:'Lo dije de broma.', exampleEn:'I said it as a joke.', tip:'Opposite of "en serio". Common defence after a misunderstanding.' },
  { es:'en cualquier caso', en:'in any case / anyway', example:'En cualquier caso, gracias por intentarlo.', exampleEn:'In any case, thanks for trying.', tip:'Useful for wrapping up an argument. Slightly formal.' },
  { es:'en cualquier momento', en:'at any moment', example:'Puede llegar en cualquier momento.', exampleEn:'He could arrive at any moment.', tip:'Standard time expression. "En cualquier lugar" = anywhere.' },
  { es:'por todas partes', en:'everywhere', example:'Hay turistas por todas partes.', exampleEn:'There are tourists everywhere.', tip:'"En todas partes" is also valid but "por" emphasises movement/spread.' },
  { es:'en ninguna parte', en:'nowhere', example:'No lo encuentro en ninguna parte.', exampleEn:'I can\'t find it anywhere.', tip:'Negative double in Spanish: "no" + "ninguna". Always paired.' },
  { es:'a la derecha', en:'on/to the right', example:'Gira a la derecha en la esquina.', exampleEn:'Turn right at the corner.', tip:'Direction. "Gira a la derecha". Note: not "en la derecha".' },
  { es:'a la izquierda', en:'on/to the left', example:'La farmacia está a la izquierda.', exampleEn:'The pharmacy is on the left.', tip:'Same structure as "a la derecha". Always feminine because "mano" is implied.' },
  { es:'al lado de', en:'next to / beside', example:'El banco está al lado del restaurante.', exampleEn:'The bank is next to the restaurant.', tip:'Standard preposition for "next to". Note "del" = de + el.' },
  { es:'al fondo', en:'at the back / at the end', example:'El baño está al fondo.', exampleEn:'The toilet is at the back.', tip:'For inside locations. "Al fondo del pasillo" = at the end of the corridor.' },
  { es:'enfrente de', en:'opposite / in front of', example:'Vivo enfrente del parque.', exampleEn:'I live opposite the park.', tip:'"Frente a" is the synonym. "Delante de" = in front of (closer/touching).' },
  { es:'detrás de', en:'behind', example:'El gato está detrás del sofá.', exampleEn:'The cat is behind the sofa.', tip:'Don\'t confuse with "atrás" (back, adverb).' },
  { es:'encima de', en:'on top of / above', example:'El libro está encima de la mesa.', exampleEn:'The book is on top of the table.', tip:'"Encima" alone is a connector meaning "on top / what\'s more".' },
  { es:'debajo de', en:'underneath / below', example:'Las llaves están debajo del cojín.', exampleEn:'The keys are under the cushion.', tip:'Standard preposition. "Bajo" alone is more abstract.' },
  { es:'dentro de', en:'inside / within (time)', example:'Vuelvo dentro de una hora.', exampleEn:'I\'ll be back in an hour.', tip:'For time or space. "Dentro de" + future time = standard.' },
  { es:'fuera de', en:'outside (of)', example:'Está fuera del horario laboral.', exampleEn:'It\'s outside working hours.', tip:'Spatial or figurative ("fuera de control").' },
  { es:'cerca de', en:'near / close to', example:'Vivo cerca del centro.', exampleEn:'I live near the centre.', tip:'Distance preposition. Opposite: "lejos de".' },
  { es:'lejos de', en:'far from', example:'Está lejos de aquí.', exampleEn:'It\'s far from here.', tip:'Standard distance phrase. "Lejos" alone = far.' },
  { es:'junto a', en:'next to / together with', example:'Sentémonos junto a la ventana.', exampleEn:'Let\'s sit next to the window.', tip:'Slightly more elegant than "al lado de". "Junto con" = together with.' },
  { es:'a través de', en:'through / by means of', example:'Lo conocí a través de un amigo.', exampleEn:'I met him through a friend.', tip:'Both literal (through a window) and figurative (via someone).' },
  { es:'gracias a', en:'thanks to', example:'Gracias a ti, lo conseguí.', exampleEn:'Thanks to you, I made it.', tip:'Standard phrase of gratitude attribution.' },
  { es:'por culpa de', en:'because of / due to (negative)', example:'Llegué tarde por culpa del tráfico.', exampleEn:'I was late because of the traffic.', tip:'Always negative cause. For positive reasons, use "gracias a".' },
  { es:'a causa de', en:'because of / due to', example:'Cancelaron el vuelo a causa del mal tiempo.', exampleEn:'They cancelled the flight due to bad weather.', tip:'Neutral. More formal than "por culpa de".' },
  { es:'a fin de', en:'in order to', example:'Trabaja duro a fin de ahorrar.', exampleEn:'He works hard in order to save.', tip:'Formal alternative to "para". "A fin de que + subjunctive" for different subjects.' },
  { es:'con el fin de', en:'with the aim of', example:'Estudio con el fin de mejorar.', exampleEn:'I study with the aim of improving.', tip:'Synonym of "a fin de". Both formal.' },
  { es:'a través de', en:'through / via', example:'Compré el billete a través de internet.', exampleEn:'I bought the ticket via the internet.', tip:'Means of doing something or path through.' },
  { es:'en lugar de', en:'instead of', example:'Vamos al cine en lugar de quedarnos en casa.', exampleEn:'Let\'s go to the cinema instead of staying home.', tip:'"En vez de" is the synonym. Both common.' },
  { es:'en vez de', en:'instead of', example:'Bebe agua en vez de refresco.', exampleEn:'Drink water instead of soft drinks.', tip:'Slightly more colloquial than "en lugar de". Both work.' },
  { es:'además de', en:'in addition to / besides', example:'Además de español, habla francés.', exampleEn:'In addition to Spanish, he speaks French.', tip:'"Además" alone is a connector ("besides/moreover").' },
  { es:'aparte de', en:'apart from / besides', example:'Aparte de eso, todo bien.', exampleEn:'Apart from that, everything\'s fine.', tip:'Excludes the mentioned item. Don\'t confuse with "además de" (which adds).' },
  { es:'salvo', en:'except', example:'Vienen todos salvo Juan.', exampleEn:'Everyone\'s coming except Juan.', tip:'Synonyms: "excepto", "menos". All work the same way.' },
  { es:'con tal de', en:'as long as / provided that', example:'Acepto, con tal de que paguen bien.', exampleEn:'I accept, as long as they pay well.', tip:'"+ que + subjunctive" for different subjects. Conditional connector.' },
  { es:'a menos que', en:'unless', example:'No iré a menos que tú vengas.', exampleEn:'I won\'t go unless you come.', tip:'Always triggers subjunctive. B1 essential.' },
  { es:'siempre y cuando', en:'as long as / provided that', example:'Te ayudo, siempre y cuando me lo pidas.', exampleEn:'I\'ll help you, as long as you ask me.', tip:'Same role as "con tal de que". Always with subjunctive.' },
  { es:'en caso de que', en:'in case', example:'Lleva paraguas en caso de que llueva.', exampleEn:'Take an umbrella in case it rains.', tip:'Always with subjunctive. B1 conditional connector.' },
  { es:'puesto que', en:'since / given that', example:'Puesto que llueve, nos quedamos.', exampleEn:'Since it\'s raining, we\'re staying.', tip:'Formal causal connector. "Ya que" is more common in speech.' },
  { es:'ya que', en:'since / given that', example:'Ya que estás aquí, ayúdame.', exampleEn:'Since you\'re here, help me.', tip:'Most common written/spoken alternative to "porque" for known reasons.' },
  { es:'dado que', en:'given that', example:'Dado que es tarde, mejor mañana.', exampleEn:'Given that it\'s late, better tomorrow.', tip:'Formal. Common in academic or professional writing.' },
  { es:'debido a', en:'due to / because of', example:'Debido a la lluvia, cancelaron el evento.', exampleEn:'Due to the rain, they cancelled the event.', tip:'Formal cause. "Debido a que + verb" for full clauses.' },
  { es:'por lo tanto', en:'therefore / so', example:'Trabaja mucho, por lo tanto está cansado.', exampleEn:'He works a lot, therefore he\'s tired.', tip:'Formal consequence connector. Use commas around it.' },
  { es:'así que', en:'so / therefore', example:'Está cansado, así que se acuesta temprano.', exampleEn:'He\'s tired, so he goes to bed early.', tip:'Most common spoken consequence connector. Less formal than "por lo tanto".' },
  { es:'de modo que', en:'so that / in such a way that', example:'Habla despacio, de modo que te entendamos.', exampleEn:'Speak slowly, so we can understand you.', tip:'With subjunctive = purpose. With indicative = result.' },
  { es:'de manera que', en:'so that / so', example:'Lo organizamos de manera que sea fácil.', exampleEn:'We organise it so it\'s easy.', tip:'Synonym of "de modo que". Both formal.' },
  { es:'para que', en:'so that / in order that', example:'Lo explico para que entiendas.', exampleEn:'I explain it so you understand.', tip:'Always triggers subjunctive. Most common purpose connector.' },
  { es:'asunto', en:'matter / issue / subject', example:'Es un asunto importante.', exampleEn:'It\'s an important matter.', tip:'Formal word for topic or affair. "Asuntos personales" = personal matters.' },
  { es:'tema', en:'topic / theme / issue', example:'No es mi tema favorito.', exampleEn:'It\'s not my favourite topic.', tip:'Spanish "tema" can mean topic OR a song. "El tema del verano" = the song of the summer.' },
  { es:'consejo', en:'advice', example:'¿Me das un consejo?', exampleEn:'Can you give me some advice?', tip:'Countable in Spanish: "un consejo, dos consejos". Don\'t use "consejos" if you mean general advice.' },
  { es:'noticia', en:'news (singular item)', example:'Tengo una buena noticia.', exampleEn:'I have some good news.', tip:'Singular for one piece of news. "Las noticias" = the news (plural items).' },
  { es:'recuerdo', en:'memory / souvenir', example:'Tengo buenos recuerdos de Valencia.', exampleEn:'I have good memories of Valencia.', tip:'Both for mental memories and physical souvenirs. From "recordar".' },
  { es:'sueño', en:'dream / sleep', example:'Tengo sueño.', exampleEn:'I\'m sleepy.', tip:'Two meanings: dream (the kind you have at night or aspire to) AND sleepiness.' },
  { es:'ganas', en:'desire / urge', example:'Tengo ganas de bailar.', exampleEn:'I feel like dancing.', tip:'Always plural in this idiomatic use. "Tener ganas de" = to feel like.' },
  { es:'lío', en:'mess / hassle / fling', example:'¡Qué lío!', exampleEn:'What a mess!', tip:'Multi-meaning. "Hacerse un lío" = to get confused. "Tener un lío" = to have a love affair.' },
  { es:'rollo', en:'bore / drag / vibe', example:'Esa peli es un rollo.', exampleEn:'That film is a drag.', tip:'Spain slang. Negative when describing things, neutral when describing vibe ("buen rollo").' },
  { es:'marcha', en:'going out / nightlife / pace', example:'Valencia tiene mucha marcha.', exampleEn:'Valencia has great nightlife.', tip:'Multi-meaning. Also "ponerse en marcha" = to set off. "Tener marcha" = to be lively.' },
  { es:'fiesta', en:'party / festival / public holiday', example:'Mañana es fiesta.', exampleEn:'Tomorrow is a public holiday.', tip:'Three meanings depending on context. Spain has many regional "fiestas" (festivals).' },
  { es:'puente', en:'bridge / long weekend', example:'Aprovechamos el puente para viajar.', exampleEn:'We took advantage of the long weekend to travel.', tip:'When a public holiday creates a long weekend with the regular weekend, you "bridge" them.' },
  { es:'caña', en:'small draught beer', example:'Dos cañas, por favor.', exampleEn:'Two beers, please.', tip:'Quintessentially Spanish. About 200ml. Smaller than "pinta", larger than "tercio".' },
  { es:'tinto de verano', en:'red wine with lemonade', example:'Un tinto de verano, por favor.', exampleEn:'A tinto de verano, please.', tip:'Spain summer drink. Cheaper and lighter alternative to sangría. Locals prefer it.' },
  { es:'bocadillo', en:'sandwich (baguette style)', example:'Me voy a comer un bocadillo de jamón.', exampleEn:'I\'m going to eat a ham sandwich.', tip:'Always on a baguette in Spain. "Sandwich" exists but means sliced-bread sandwich.' },
  { es:'tapa', en:'small plate of food', example:'Vamos a tomar unas tapas.', exampleEn:'Let\'s go for some tapas.', tip:'Iconic Spanish food culture. Often free with drinks in some regions.' },
  { es:'pinchos', en:'small snacks (Northern Spain)', example:'En el País Vasco son famosos los pinchos.', exampleEn:'In the Basque Country, pinchos are famous.', tip:'Northern equivalent of tapas. Usually toothpick-skewered. Pay-per-pincho system.' },
  { es:'sobremesa', en:'after-meal conversation', example:'Nos quedamos de sobremesa hasta las cinco.', exampleEn:'We stayed chatting after the meal until five.', tip:'Untranslatable. The lingering chat after a meal. A sacred Spanish tradition.' },
  { es:'siesta', en:'afternoon nap', example:'Voy a echar una siesta.', exampleEn:'I\'m going to take a nap.', tip:'"Echar una siesta" = to take a nap. Less common than the stereotype suggests, but real.' },
  { es:'madrugada', en:'early morning hours (1am–6am)', example:'Llegamos a casa de madrugada.', exampleEn:'We got home in the early morning.', tip:'Specific time range, not just "early". "De madrugada" = in the early hours.' },
  { es:'amanecer', en:'dawn / sunrise / to dawn', example:'Vimos amanecer en la playa.', exampleEn:'We watched the sunrise on the beach.', tip:'Both noun and verb. "Amanece a las siete" = the sun rises at seven.' },
  { es:'atardecer', en:'sunset / dusk / to grow dark', example:'El atardecer en Valencia es precioso.', exampleEn:'The sunset in Valencia is beautiful.', tip:'Both noun and verb. "Anochecer" is the next phase (nightfall).' },
  { es:'anochecer', en:'nightfall / to grow dark', example:'Volvimos a casa al anochecer.', exampleEn:'We came home at nightfall.', tip:'After "atardecer". The transition to night.' },
  { es:'rato', en:'while / short period', example:'Espera un rato.', exampleEn:'Wait a bit.', tip:'Vague time period. "Hace un rato" = a while ago. "Un buen rato" = quite a while.' },
  { es:'instante', en:'instant / moment', example:'En un instante te atiendo.', exampleEn:'I\'ll be with you in an instant.', tip:'Shorter than "momento". Conveys immediacy.' },

function hashDate(dateStr) {
  let h = 0;
  for (let c of dateStr) { h = (h * 31 + c.charCodeAt(0)) >>> 0; }
  return h;
}

function getWordOfDay() {
  const d = new Date().toISOString().slice(0, 10);
  return WORDS_OF_DAY[hashDate(d) % WORDS_OF_DAY.length];
}

function getPhraseOfDay() {
  const d = new Date().toISOString().slice(0, 10);
  return PHRASES_OF_DAY[(hashDate(d) + 7) % PHRASES_OF_DAY.length];
}

function getWordForDate(daysAgo) {
  const d = new Date();
  d.setDate(d.getDate() - daysAgo);
  const s = d.toISOString().slice(0, 10);
  return {
    word: WORDS_OF_DAY[hashDate(s) % WORDS_OF_DAY.length],
    phrase: PHRASES_OF_DAY[(hashDate(s) + 7) % PHRASES_OF_DAY.length],
    date: s,
    label: daysAgo === 0 ? 'Hoy' : daysAgo === 1 ? 'Ayer' : `Hace ${daysAgo} días`
  };
}

function getStorage(k, def) {
  try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; }
}

function setStorage(k, v) {
  try { localStorage.setItem(k, JSON.stringify(v)); } catch {}
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function diffDays(a, b) {
  const da = new Date(a + 'T00:00:00');
  const db = new Date(b + 'T00:00:00');
  return Math.round((db - da) / 86400000);
}

function tickStreak() {
  const today = todayStr();
  const s = getStorage('aprende.streak', { count: 0, best: 0, lastDate: null });
  if (s.lastDate === today) return s;
  if (s.lastDate && diffDays(s.lastDate, today) === 1) {
    s.count = (s.count || 0) + 1;
  } else {
    s.count = 1;
  }
  s.best = Math.max(s.best || 0, s.count);
  s.lastDate = today;
  setStorage('aprende.streak', s);
  achievementCheck({ streak: s.count });
  return s;
}

function getStreak() {
  const today = todayStr();
  const s = getStorage('aprende.streak', { count: 0, best: 0, lastDate: null });
  if (!s.lastDate) return s;
  const gap = diffDays(s.lastDate, today);
  if (gap > 1) return { ...s, count: 0 };
  return s;
}

// Voice engine – cached voices, quality-ranked gendered selection
// Goal: pick the most natural-sounding Spanish voice available in the browser.
// Web Speech API voice quality varies wildly across OS/browser:
//   - Chrome on any OS bundles "Google español de España" (high quality, neural)
//   - Safari/macOS has "Mónica" (basic) and "Mónica (Enhanced)" / Siri voices (very good, user must install)
//   - Edge on Windows has "Microsoft Elvira Online (Natural)" (very good)
// We rank voices by quality hints in the name and prefer the best match.
let _voices = [];
(function initVoiceCache() {
  if (!('speechSynthesis' in window)) return;
  const load = () => { _voices = window.speechSynthesis.getVoices(); };
  load();
  window.speechSynthesis.addEventListener('voiceschanged', load);
})();

// Higher score = better voice quality
function voiceQualityScore(voice) {
  const name = (voice.name || '').toLowerCase();
  let score = 0;
  // Neural / natural voices (best quality tier)
  if (name.includes('neural')) score += 100;
  if (name.includes('natural')) score += 100;
  if (name.includes('online')) score += 90;        // Microsoft "Online (Natural)"
  if (name.includes('premium')) score += 80;
  if (name.includes('enhanced')) score += 70;      // Apple Enhanced voices
  if (name.includes('siri')) score += 85;          // Siri voices on macOS (highest Apple tier)
  // Google voices on Chrome are consistently higher quality than defaults
  if (name.includes('google')) score += 60;
  // Microsoft modern voices
  if (name.includes('microsoft')) score += 40;
  // localService=false usually means cloud voices (better) on Chrome
  if (voice.localService === false) score += 20;
  // es-ES slightly preferred over other Spanish dialects when picking es-ES
  if (voice.lang === 'es-ES') score += 5;
  return score;
}

const FEMALE_NAMES = ['Mónica','Monica','Lucía','Lucia','Paulina','Elena','Rosa','Laura','María','Penélope','Elvira','Ximena','Dalia','Estrella','Eva','Marisol','Irene','Sofia','Sofía'];
const MALE_NAMES   = ['Jorge','Diego','Juan','Miguel','Carlos','Enrique','Álvaro','Alvaro','Pablo','Javier','Andrés','Gonzalo','Marco','Abel','Damián'];

function isFemaleVoice(v) {
  return FEMALE_NAMES.some(n => v.name.includes(n));
}
function isMaleVoice(v) {
  return MALE_NAMES.some(n => v.name.includes(n));
}

function pickVoice(gender, dialect) {
  if (!_voices.length) _voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  const lang = dialect || 'es-ES';
  let pool = _voices.filter(v => v.lang === lang);
  if (!pool.length) pool = _voices.filter(v => v.lang && v.lang.startsWith('es'));
  if (!pool.length) return null;

  // Rank the full pool by quality first
  const ranked = [...pool].sort((a, b) => voiceQualityScore(b) - voiceQualityScore(a));

  if (gender === 'female') {
    // Try highest-quality voice that is explicitly female-named
    const namedFemale = ranked.find(isFemaleVoice);
    if (namedFemale) return namedFemale;
    // Fallback: highest-quality voice that is NOT male-named
    const notMale = ranked.find(v => !isMaleVoice(v));
    if (notMale) return notMale;
  }
  if (gender === 'male') {
    const namedMale = ranked.find(isMaleVoice);
    if (namedMale) return namedMale;
    const notFemale = ranked.find(v => !isFemaleVoice(v));
    if (notFemale) return notFemale;
  }
  // Default: highest-quality voice in pool
  return ranked[0] || null;
}

// ── iOS Audio unlock ─────────────────────────────────────────
// iOS Safari blocks audio.play() unless it happens within a synchronous
// user-gesture chain. Async TTS fetches break that chain. The fix: on the
// very first tap/click, play a silent 0.1s buffer to "unlock" the audio
// context. After that, all subsequent audio.play() calls work fine.
let _iosAudioUnlocked = false;
function _unlockIOSAudio() {
  if (_iosAudioUnlocked) return;
  _iosAudioUnlocked = true;
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;
    const ctx = new AudioCtx();
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
    setTimeout(() => ctx.close(), 500);
  } catch(e) {}
  // Also create + immediately pause a silent Audio element so the browser
  // permits future programmatic play() calls on Audio objects
  try {
    const a = new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=');
    a.volume = 0;
    a.play().catch(() => {});
  } catch(e) {}
}
document.addEventListener('touchstart', _unlockIOSAudio, { once: true, passive: true });
document.addEventListener('touchend',   _unlockIOSAudio, { once: true, passive: true });
document.addEventListener('click',      _unlockIOSAudio, { once: true });

const TTS_SESSION_CACHE = new Map(); // key → data URL

function ttsCacheKey(text, voiceId) {
  // djb2 hash – small, deterministic, collision-safe enough for <10k entries
  let h = 5381;
  for (let i = 0; i < text.length; i++) h = ((h << 5) + h + text.charCodeAt(i)) | 0;
  return voiceId + ':' + (h >>> 0).toString(36);
}

function ttsGetCached(text, voiceId) {
  const key = ttsCacheKey(text, voiceId);
  if (TTS_SESSION_CACHE.has(key)) return TTS_SESSION_CACHE.get(key);
  try {
    const store = JSON.parse(localStorage.getItem('aprende.tts.cache') || '{}');
    if (store[key]) {
      const url = 'data:audio/mpeg;base64,' + store[key];
      TTS_SESSION_CACHE.set(key, url);
      return url;
    }
  } catch(e) {}
  return null;
}

function ttsSaveCached(text, voiceId, base64) {
  const key = ttsCacheKey(text, voiceId);
  const url = 'data:audio/mpeg;base64,' + base64;
  TTS_SESSION_CACHE.set(key, url);
  try {
    let store = JSON.parse(localStorage.getItem('aprende.tts.cache') || '{}');
    store[key] = base64;
    let str = JSON.stringify(store);
    // Cap at ~3MB – evict oldest half if over
    if (str.length > 3 * 1024 * 1024) {
      const keys = Object.keys(store);
      const drop = Math.floor(keys.length / 2);
      for (let i = 0; i < drop; i++) delete store[keys[i]];
      str = JSON.stringify(store);
    }
    localStorage.setItem('aprende.tts.cache', str);
  } catch(e) {
    // QuotaExceeded – nuke cache, save just this one entry
    try {
      const fresh = {};
      fresh[key] = base64;
      localStorage.setItem('aprende.tts.cache', JSON.stringify(fresh));
    } catch(e2) {}
  }
  return url;
}

function ttsClearCache() {
  TTS_SESSION_CACHE.clear();
  try { localStorage.removeItem('aprende.tts.cache'); } catch(e) {}
}

function ttsCacheSize() {
  try {
    const store = JSON.parse(localStorage.getItem('aprende.tts.cache') || '{}');
    return Object.keys(store).length;
  } catch(e) { return 0; }
}

// ── ElevenLabs API call ──
async function ttsFetchElevenLabs(text, voiceId, apiKey) {
  const url = `https://api.elevenlabs.io/v1/text-to-speech/${voiceId}?output_format=mp3_44100_64`;
  const response = await fetch(url, {
    method: 'POST',
    headers: {
      'xi-api-key': apiKey,
      'Content-Type': 'application/json',
      'Accept': 'audio/mpeg',
    },
    body: JSON.stringify({
      text,
      model_id: 'eleven_multilingual_v2',
      voice_settings: { stability: 0.5, similarity_boost: 0.75, style: 0.0, use_speaker_boost: true },
    }),
  });
  if (!response.ok) {
    const errText = await response.text().catch(() => '');
    let detail = errText;
    try {
      const j = JSON.parse(errText);
      detail = (j?.detail?.message) || (j?.detail?.status) || JSON.stringify(j);
    } catch(_) {}
    console.error('ElevenLabs error', response.status, errText);
    throw new Error('ElevenLabs ' + response.status + ': ' + detail.slice(0, 200));
  }
  const buf = await response.arrayBuffer();
  const bytes = new Uint8Array(buf);
  let bin = '';
  const CHUNK = 0x8000;
  for (let i = 0; i < bytes.length; i += CHUNK) {
    bin += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
  }
  return btoa(bin);
}

// ── Azure Neural TTS via official Speech SDK (browser-safe) ──
// The REST endpoint has CORS quirks; the SDK uses WebSockets and works reliably.
// Loaded lazily from CDN on first call (~2 MB, cached after that).
let _azureSDK = null;
async function loadAzureSDK() {
  if (_azureSDK) return _azureSDK;
  if (window.SpeechSDK) { _azureSDK = window.SpeechSDK; return _azureSDK; }
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/microsoft-cognitiveservices-speech-sdk@latest/distrib/browser/microsoft.cognitiveservices.speech.sdk.bundle-min.js';
    s.onload = resolve;
    s.onerror = () => reject(new Error('Could not load Azure Speech SDK'));
    document.head.appendChild(s);
  });
  _azureSDK = window.SpeechSDK;
  return _azureSDK;
}

async function ttsFetchAzure(text, voiceName, apiKey, region, rate) {
  const spRate = (rate != null ? rate : getStorage('aprende.tts.speechRate', 1.0));
  const SDK = await loadAzureSDK();
  const cfg = SDK.SpeechConfig.fromSubscription(apiKey, region);
  cfg.speechSynthesisOutputFormat = SDK.SpeechSynthesisOutputFormat.Audio24Khz96KBitRateMonoMp3;
  const synth = new SDK.SpeechSynthesizer(cfg, null);
  // Use SSML so we can control rate; extract lang prefix from voice name
  const langCode = voiceName.startsWith('es-MX') ? 'es-MX' : 'es-ES';
  const esc = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const inner = Math.abs(spRate - 1.0) > 0.01
    ? `<prosody rate="${spRate}">${esc}</prosody>`
    : esc;
  const ssml = `<speak version='1.0' xmlns='http://www.w3.org/2001/10/synthesis' xml:lang='${langCode}'><voice name='${voiceName}'>${inner}</voice></speak>`;
  return new Promise((resolve, reject) => {
    synth.speakSsmlAsync(
      ssml,
      result => {
        synth.close();
        if (result.reason === SDK.ResultReason.SynthesizingAudioCompleted) {
          const bytes = new Uint8Array(result.audioData);
          let bin = '';
          const CHUNK = 0x8000;
          for (let i = 0; i < bytes.length; i += CHUNK) {
            bin += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
          }
          resolve(btoa(bin));
        } else {
          reject(new Error('Azure synthesis failed: ' + (result.errorDetails || result.reason)));
        }
      },
      err => { synth.close(); reject(new Error('Azure SDK: ' + err)); }
    );
  });
}

// ── Azure getAudioUrl (cache-first) ──
async function ttsGetAudioUrlAzure(text, gender) {
  const cfg = ttsGetAzureConfig();
  if (!cfg.apiKey || !cfg.region) return null;
  const rate = getStorage('aprende.tts.speechRate', 1.0);
  const voiceName = gender === 'male' ? cfg.voiceMale : cfg.voiceFemale;
  const cacheVoiceKey = voiceName + ':r' + rate;
  const cached = ttsGetCached(text, cacheVoiceKey);
  if (cached) return cached;
  try {
    const base64 = await ttsFetchAzure(text, voiceName, cfg.apiKey, cfg.region, rate);
    ttsBumpAzureUsage(text.length);
    return ttsSaveCached(text, cacheVoiceKey, base64);
  } catch(e) {
    console.warn('Azure TTS failed:', e.message);
    return null;
  }
}

// ── Azure Speech-to-Text (uses same SDK as TTS — no Google dependency) ──
// Returns the recognised text string, or throws with e.srCode set.
async function azureRecognizeOnce(apiKey, region, onRecognizer) {
  const SDK = await loadAzureSDK();
  const speechConfig = SDK.SpeechConfig.fromSubscription(apiKey, region);
  speechConfig.speechRecognitionLanguage = 'es-ES';
  const audioConfig = SDK.AudioConfig.fromDefaultMicrophoneInput();
  const recognizer = new SDK.SpeechRecognizer(speechConfig, audioConfig);
  if (onRecognizer) onRecognizer(recognizer);
  return new Promise((resolve, reject) => {
    recognizer.recognizeOnceAsync(
      result => {
        recognizer.close();
        if (result.reason === SDK.ResultReason.RecognizedSpeech && result.text) {
          // Azure appends a full stop — strip it for cleaner display
          resolve(result.text.replace(/\.\s*$/, ''));
        } else if (result.reason === SDK.ResultReason.NoMatch) {
          const e = new Error('no-speech'); e.srCode = 'no-speech'; reject(e);
        } else {
          const e = new Error(result.errorDetails || 'recognition-failed');
          e.srCode = 'azure-failed'; reject(e);
        }
      },
      err => {
        recognizer.close();
        const e = new Error(String(err)); e.srCode = 'azure-error'; reject(e);
      }
    );
  });
}

// ── Google Cloud TTS fetch ──
async function ttsFetchGoogle(text, voiceObj, apiKey, rate) {
  const spRate = rate != null ? rate : getStorage('aprende.tts.speechRate', 1.0);
  const response = await fetch(
    `https://texttospeech.googleapis.com/v1/text:synthesize?key=${encodeURIComponent(apiKey)}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        input: { text },
        voice: { languageCode: voiceObj.lang, name: voiceObj.name },
        audioConfig: { audioEncoding: 'MP3', speakingRate: spRate }
      })
    }
  );
  if (!response.ok) {
    const err = await response.text().catch(() => '');
    let detail = '';
    try { detail = JSON.parse(err)?.error?.message || ''; } catch(_) {}
    console.error('Google TTS error', response.status, err);
    throw new Error('Google TTS ' + response.status + ': ' + (detail || err).slice(0, 200));
  }
  const data = await response.json();
  return data.audioContent; // already base64
}

// ── Google getAudioUrl (cache-first) ──
async function ttsGetAudioUrlGoogle(text, gender) {
  const cfg = ttsGetGoogleConfig();
  if (!cfg.apiKey) return null;
  const rate = getStorage('aprende.tts.speechRate', 1.0);
  const allVoices = gender === 'male' ? GOOGLE_VOICES_MALE : GOOGLE_VOICES_FEMALE;
  const voiceObj = allVoices.find(v => v.name === (gender === 'male' ? cfg.voiceMale : cfg.voiceFemale))
                || allVoices[0];
  const cacheVoiceKey = voiceObj.name + ':r' + rate;
  const cached = ttsGetCached(text, cacheVoiceKey);
  if (cached) return cached;
  try {
    const base64 = await ttsFetchGoogle(text, voiceObj, cfg.apiKey, rate);
    ttsBumpGoogleUsage(text.length);
    return ttsSaveCached(text, cacheVoiceKey, base64);
  } catch(e) {
    console.warn('Google TTS failed:', e.message);
    return null;
  }
}

// ── Main entry point: ElevenLabs → Google → Azure → null (Web Speech fallback) ──
async function ttsGetAudioUrl(text, gender) {
  const cfg = ttsGetConfig();

  // Tier 1: ElevenLabs
  if (cfg.provider === 'elevenlabs' && cfg.apiKey) {
    const voiceId = gender === 'male' ? cfg.voiceMale : cfg.voiceFemale;
    const cached = ttsGetCached(text, voiceId);
    if (cached) return cached;
    const usage = ttsGetUsage();
    if (usage.count + text.length <= 10000) {
      try {
        const base64 = await ttsFetchElevenLabs(text, voiceId, cfg.apiKey);
        ttsBumpUsage(text.length);
        return ttsSaveCached(text, voiceId, base64);
      } catch(e) {
        console.warn('ElevenLabs TTS failed, trying Google/Azure:', e.message);
        // fall through to Tier 2
      }
    } else {
      console.info('ElevenLabs cap reached – using Google/Azure backup');
      // fall through to Tier 2
    }
  }

  // Tier 2: Google Cloud TTS
  const googleUrl = await ttsGetAudioUrlGoogle(text, gender);
  if (googleUrl) return googleUrl;

  // Tier 3: Azure Neural
  const azureUrl = await ttsGetAudioUrlAzure(text, gender);
  if (azureUrl) return azureUrl;

  // Tier 4: Web Speech (caller handles)
  return null;
}

// ── Current playback handle, so stopAll() can halt API audio ──
let ttsCurrentAudio = null;

function ttsStop() {
  try { if (ttsCurrentAudio) { ttsCurrentAudio.pause(); ttsCurrentAudio.currentTime = 0; ttsCurrentAudio = null; } } catch(e) {}
  try { if ('speechSynthesis' in window) window.speechSynthesis.cancel(); } catch(e) {}
}

// ── Fire-and-forget: speak and move on (used by 🔊 buttons) ──
async function speakES(text, opts) {
  try {
    const { gender=null, dialect='es-ES', rate=0.95, pitch=1.0 } = opts || {};
    ttsStop();
    // Create + prime the Audio element HERE — before any await — so iOS
    // considers it user-gesture-initiated and allows .play() after the fetch.
    const primedAudio = new Audio();
    primedAudio.preload = 'auto';
    const url = await ttsGetAudioUrl(text, gender);
    if (url) {
      primedAudio.src = url;
      primedAudio.playbackRate = Math.max(0.7, Math.min(1.3, rate));
      ttsCurrentAudio = primedAudio;
      try {
        await primedAudio.play();
        return; // success
      } catch(playErr) {
        console.warn('audio.play() blocked (iOS?):', playErr.message);
      }
    }
    // Web Speech fallback
    if (!('speechSynthesis' in window)) return;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = dialect;
    u.rate = rate;
    u.pitch = pitch;
    const v = pickVoice(gender, dialect);
    if (v) u.voice = v;
    window.speechSynthesis.speak(u);
  } catch {}
}

// ── Promise-based: speak and resolve when finished (used by playAll) ──
function playSpeakable(text, opts) {
  return new Promise(async (resolve) => {
    try {
      const { gender=null, dialect='es-ES', rate=0.95, pitch=1.0 } = opts || {};
      // Prime before any await — same iOS gesture-chain trick as speakES
      const primedAudio = new Audio();
      primedAudio.preload = 'auto';
      const url = await ttsGetAudioUrl(text, gender);
      if (url) {
        primedAudio.src = url;
        primedAudio.playbackRate = Math.max(0.7, Math.min(1.3, rate));
        ttsCurrentAudio = primedAudio;
        primedAudio.onended = () => resolve();
        primedAudio.onerror  = () => resolve();
        try {
          await primedAudio.play();
          return; // playing – resolve fires via onended
        } catch(playErr) {
          console.warn('playSpeakable play() blocked (iOS?):', playErr.message);
          // fall through to Web Speech
        }
      }
      if (!('speechSynthesis' in window)) { resolve(); return; }
      const u = new SpeechSynthesisUtterance(text);
      u.lang = dialect;
      u.rate = rate;
      u.pitch = pitch;
      const v = pickVoice(gender, dialect);
      if (v) u.voice = v;
      u.onend = () => resolve();
      u.onerror = () => resolve();
      window.speechSynthesis.speak(u);
    } catch { resolve(); }
  });
}

// ── Legacy helper retained for any callers that still want a raw Web Speech utterance ──
function makeSpeakUtterance(text, opts) {
  if (!('speechSynthesis' in window)) return null;
  const { gender=null, dialect='es-ES', rate=0.95, pitch=1.0 } = opts || {};
  const u = new SpeechSynthesisUtterance(text);
  u.lang = dialect;
  u.rate = rate;
  u.pitch = pitch;
  const v = pickVoice(gender, dialect);
  if (v) u.voice = v;
  return u;
}

function TenseCard({ card, dark }) {
  // Shared inner renderer – used for all tenses (including the special vs-card)
  const renderInner = () => (
    <>
      {/* ── 1. Bold heading ─────────────────────────────────── */}
      <p className="font-serif font-bold text-2xl lg:text-3xl mb-0.5">{card.title}</p>
      <p className={`text-sm mb-5 ${dark ? 'text-stone-400' : 'text-stone-500'}`}>{card.subtitle}</p>

      {/* ── 2. Concept + formation (orange) ─────────────────── */}
      {(card.concept || card.formation) && (
        <div className={`rounded-xl p-4 mb-4 ${dark ? 'bg-orange-900/20' : 'bg-orange-50'}`}>
          <p className={`text-xs font-bold uppercase tracking-wide mb-1 ${dark ? 'text-orange-300' : 'text-orange-600'}`}>Concepto</p>
          {card.concept && <p className={`text-sm mb-2 ${dark ? 'text-orange-100' : 'text-orange-900'}`}>{card.concept}</p>}
          {card.formation && <p className={`text-xs ${dark ? 'text-orange-300' : 'text-orange-700'}`}><strong>Formación:</strong> {card.formation}</p>}
        </div>
      )}

      {/* ── 3. ✅ Key Points (green) ─────────────────────────── */}
      {card.keyPoints && card.keyPoints.length > 0 && (
        <div className={`rounded-xl p-4 mb-4 ${dark ? 'bg-emerald-900/20' : 'bg-emerald-50'}`}>
          <p className={`text-xs font-bold uppercase tracking-wide mb-2 ${dark ? 'text-emerald-300' : 'text-emerald-700'}`}>✅ Key Points</p>
          <ul className="space-y-2">
            {card.keyPoints.map((pt, i) => (
              <li key={i} className={`text-sm flex gap-2 leading-snug ${dark ? 'text-emerald-100' : 'text-emerald-900'}`}>
                <span className="flex-shrink-0 font-bold">•</span><span>{pt}</span>
              </li>
            ))}
          </ul>
        </div>
      )}

      {/* ── 4. ⚠️ Must Remember (amber) ──────────────────────── */}
      {card.mustRemember && card.mustRemember.length > 0 && (
        <div className={`rounded-xl p-4 mb-4 ${dark ? 'bg-amber-900/20' : 'bg-amber-50'}`}>
          <p className={`text-xs font-bold uppercase tracking-wide mb-2 ${dark ? 'text-amber-300' : 'text-amber-700'}`}>⚠️ Must Remember</p>
          <ul className="space-y-2">
            {card.mustRemember.map((pt, i) => (
              <li key={i} className={`text-sm flex gap-2 leading-snug ${dark ? 'text-amber-100' : 'text-amber-900'}`}>
                <span className="flex-shrink-0 font-bold">!</span><span>{pt}</span>
              </li>
            ))}
          </ul>
        </div>
      )}

      {/* ── 5. Conjugation table ─────────────────────────────── */}
      {card.table && card.table.length > 0 && (
        <div className="mb-4">
          <p className={`text-xs font-bold uppercase tracking-wide mb-2 ${dark ? 'text-stone-500' : 'text-stone-400'}`}>Conjugación</p>
          <DataTable data={card.table} dark={dark} />
        </div>
      )}

      {/* ── 6. Irregular verbs ───────────────────────────────── */}
      {card.irregulars && card.irregulars.length > 0 && (
        <div className="mb-4">
          <p className={`text-xs font-bold uppercase tracking-wide mb-2 ${dark ? 'text-stone-500' : 'text-stone-400'}`}>Verbos irregulares</p>
          <DataTable data={card.irregulars} dark={dark} />
        </div>
      )}

      {/* ── 7. Stem changes ──────────────────────────────────── */}
      {card.stemChanges && card.stemChanges.length > 0 && (
        <div className="mb-4">
          <p className={`text-xs font-bold uppercase tracking-wide mb-2 ${dark ? 'text-stone-500' : 'text-stone-400'}`}>Cambios de raíz</p>
          <DataTable data={card.stemChanges} dark={dark} />
        </div>
      )}

      {/* ── 8. Examples with audio ───────────────────────────── */}
      {card.examples && card.examples.length > 0 && (
        <div className="mb-4">
          <p className={`text-xs font-bold uppercase tracking-wide mb-2 ${dark ? 'text-stone-500' : 'text-stone-400'}`}>Ejemplos</p>
          <div className="space-y-2">
            {card.examples.map((ex, i) => (
              <div key={i} className={`rounded-lg p-3 ${dark ? 'bg-white/[0.03]' : 'bg-stone-50'}`}>
                <div className="flex items-start gap-2 mb-0.5">
                  <p className="text-sm font-semibold flex-1">{ex.es}</p>
                  <SpeakBtn text={ex.es} size="sm" />
                </div>
                <p className={`text-xs ${dark ? 'text-stone-400' : 'text-stone-500'}`}>{ex.en}</p>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── 9. Trigger words ─────────────────────────────────── */}
      {card.triggers && card.triggers.length > 0 && (
        <div>
          <p className={`text-xs font-bold uppercase tracking-wide mb-2 ${dark ? 'text-stone-500' : 'text-stone-400'}`}>Activadores temporales</p>
          <div className="flex flex-wrap gap-1.5">
            {card.triggers.map((t, i) => (
              <span key={i} className={`text-xs px-2 py-1 rounded-full ${dark ? 'bg-white/[0.08] text-stone-300' : 'bg-stone-100 text-stone-600'}`}>{t}</span>
            ))}
          </div>
        </div>
      )}
    </>
  );

  return (
    <Card dark={dark} className="p-5 lg:p-7 mb-4">
      {renderInner()}
    </Card>
  );
}

                    <p className={`text-xs lg:text-sm mb-2 font-medium ${dark ? 'text-orange-300' : 'text-orange-600'}`}>{card.subtitle}</p>

    </div>
  );
}
