const WORDS_OF_DAY = [
  { es:'cotidiano', en:'everyday / daily', example:'Las tareas cotidianas pueden ser agotadoras.', exampleEn:'Everyday tasks can be exhausting.', tip:'From "cada día". Use it instead of "diario" for a more sophisticated register.' },
  { es:'mañana', en:'tomorrow / morning', example:'Mañana por la mañana tengo una reunión.', exampleEn:'Tomorrow morning I have a meeting.', tip:'Same word for both meanings — context clarifies. "Esta mañana" = this morning, "mañana" alone = tomorrow.' },
  { es:'apenas', en:'hardly / barely / just', example:'Apenas llegué cuando empezó a llover.', exampleEn:'I had just arrived when it started to rain.', tip:'Can mean "barely" (apenas dormí) or "just/as soon as" (apenas llegué). Super useful connector.' },
  { es:'sino', en:'but rather / but instead', example:'No es tonto, sino muy distraído.', exampleEn:'He is not stupid, but rather very distracted.', tip:'"Sino" follows a negation and introduces a correction. "Pero" just adds contrast; "sino" replaces.' },
  { es:'aún', en:'still / yet (with accent = still)', example:'Aún no ha llegado nadie.', exampleEn:'Nobody has arrived yet.', tip:'"Aún" (accent) = still/yet. "Aun" (no accent) = even. Aún no = not yet. Todavía and aún are interchangeable.' },
  { es:'pues', en:'well / since / then / so', example:'Pues, no sé qué decirte.', exampleEn:'Well, I don\'t know what to tell you.', tip:'One of the most versatile Spanish filler/connector words. "Pues" as a filler = "well/so". Also means "since/because" in formal writing.' },
  { es:'demás', en:'the rest / the others', example:'Los demás estudiantes ya han terminado.', exampleEn:'The other students have already finished.', tip:'"Los demás" = the rest/the others. "Lo demás" = the rest (of things). Not to be confused with "demasiado" (too much).' },
  { es:'senda', en:'path / track / way', example:'Siguieron la senda hasta el río.', exampleEn:'They followed the path to the river.', tip:'More poetic than "camino". Common in literature and hiking contexts. "Ir por buen camino/senda" = to be on the right track.' },
  { es:'conque', en:'so / so then / and so', example:'Llegas tarde, conque te espero mañana.', exampleEn:'You\'re late, so I\'ll wait for you tomorrow.', tip:'Consequence connector. Written as one word. Slightly formal/literary. Equivalent to "así que" or "por lo tanto" in informal speech.' },
  { es:'vejez', en:'old age', example:'La vejez trae sabiduría y experiencia.', exampleEn:'Old age brings wisdom and experience.', tip:'From "viejo". Related: "envejecer" (to age), "anciano/a" (elderly person). "En la vejez" = in old age.' },
  { es:'madrugar', en:'to get up early / to be an early riser', example:'Hay que madrugar para coger el primer tren.', exampleEn:'You have to get up early to catch the first train.', tip:'"Madrugada" = early hours (1am–6am). "Madrugar" literally means to rise at dawn. The noun is "madrugón" (early start).' },
  { es:'apetecer', en:'to feel like / to fancy (food/activity)', example:'¿Te apetece tomar algo?', exampleEn:'Do you fancy something to drink?', tip:'Works like "gustar" — the thing you want is the subject. "Me apetece una cerveza" = I fancy a beer. Very natural in Spain.' },
  { es:'resultar', en:'to turn out / to prove to be', example:'Resultó que tenía razón.', exampleEn:'It turned out that she was right.', tip:'"Resultar que..." = it turns out that. "Me resultó difícil" = I found it difficult. Very common in spoken Spanish.' },
  { es:'enterarse', en:'to find out / to realise / to hear about', example:'¿Te has enterado de la noticia?', exampleEn:'Have you heard the news?', tip:'"Enterarse de algo" = to find out about something. "Me enteré tarde" = I found out late. Colloquially, "¿te enteras?" = do you get it?' },
  { es:'aprovechar', en:'to make the most of / to take advantage of', example:'Hay que aprovechar el buen tiempo.', exampleEn:'You have to make the most of the good weather.', tip:'"¡Que aproveche!" = Enjoy your meal! (said to someone eating). "Aprovechar la ocasión" = to seize the opportunity.' },
  { es:'quedarse', en:'to stay / to remain / to keep', example:'Me quedé en casa todo el fin de semana.', exampleEn:'I stayed at home all weekend.', tip:'"Quedarse con algo" = to keep something. "Quedarse + adj" = to become/end up: "me quedé helado" (I was stunned).' },
  { es:'llevar', en:'to have been (+ time expression)', example:'Llevo tres años viviendo en Valencia.', exampleEn:'I have been living in Valencia for three years.', tip:'"Llevar + time + gerund" = to have been doing something for a period. One of the most useful constructions in Spanish.' },
  { es:'tardar', en:'to take time / to be long / to delay', example:'El tren tarda veinte minutos en llegar.', exampleEn:'The train takes twenty minutes to arrive.', tip:'"Tardar en + infinitive" = to take time to do. "No tardes" = don\'t be long. "¿Cuánto tarda?" = How long does it take?' },
  { es:'echar de menos', en:'to miss (a person/place)', example:'Echo de menos a mi familia en Irlanda.', exampleEn:'I miss my family in Ireland.', tip:'Literally "to throw from less". In Latin America, "extrañar" is used instead. Both are correct.' },
  { es:'darse cuenta', en:'to realise / to notice', example:'Me di cuenta de que había cometido un error.', exampleEn:'I realised I had made a mistake.', tip:'"Darse cuenta de + que/noun". Not to be confused with "realizar" which means to carry out/achieve, not to realise.' },
  { es:'ponerse', en:'to become / to put on / to start (+ a)', example:'Se puso muy nervioso antes del examen.', exampleEn:'He became very nervous before the exam.', tip:'"Ponerse + adj" = to become (emotional/physical change). "Ponerse a + infinitivo" = to start doing something.' },
  { es:'meterse', en:'to get into / to interfere / to go into', example:'No te metas en lo que no te importa.', exampleEn:'Don\'t interfere in things that don\'t concern you.', tip:'"Meterse en" = to get involved in. "Meterse con alguien" = to pick on someone. "¿Dónde me he metido?" = What have I got myself into?' },
  { es:'tratar de', en:'to try to / to be about (a topic)', example:'Voy a tratar de llegar antes de las ocho.', exampleEn:'I\'m going to try to arrive before eight.', tip:'"Tratar de + infinitivo" = to try to do. "Tratar de + tema" = to deal with/be about. "¿De qué trata?" = What is it about?' },
  { es:'acabar de', en:'to have just (done something)', example:'Acabo de llegar del trabajo.', exampleEn:'I\'ve just arrived from work.', tip:'"Acabar de + infinitivo" in present = have just done. In imperfect: "acababa de salir" = had just left. Very common, very natural.' },
  { es:'soler', en:'to usually do / to be in the habit of', example:'Suelo desayunar a las ocho.', exampleEn:'I usually have breakfast at eight.', tip:'Only exists in present and imperfect. "Solía ir al gimnasio" = I used to go to the gym. Expresses habitual action.' },
  { es:'estar a punto de', en:'to be about to', example:'Estaba a punto de salir cuando llamaste.', exampleEn:'I was about to leave when you called.', tip:'Exact equivalent of English "to be about to". Works in all tenses. Very useful for dramatic timing in storytelling.' },
  { es:'valer la pena', en:'to be worth it / to be worthwhile', example:'Vale la pena estudiar todos los días.', exampleEn:'It\'s worth studying every day.', tip:'"Valer la pena + infinitivo" or "valer la pena que + subjuntivo". "¿Merece la pena?" is equally common.' },
  { es:'tener ganas', en:'to feel like / to look forward to', example:'Tengo muchas ganas de verte.', exampleEn:'I really look forward to seeing you.', tip:'"Tener ganas de + infinitivo". "¡Qué ganas!" = I can\'t wait! One of the most expressive phrases in colloquial Spanish.' },
  { es:'hacer falta', en:'to need / to be necessary', example:'Hace falta más práctica para mejorar.', exampleEn:'More practice is needed to improve.', tip:'Works like "gustar". "Me hace falta" = I need. "¿Hace falta reservar?" = Is it necessary to book? Very natural alternative to "necesitar".' },
  { es:'dar igual', en:'to not matter / to be all the same', example:'Me da igual qué película ponemos.', exampleEn:'I don\'t mind which film we put on.', tip:'"Me da igual" = I don\'t mind / it\'s all the same to me. "¡Da igual!" = Never mind! / It doesn\'t matter! Extremely common.' }
];

function hashDate(dateStr) {
  let h = 0;
  for (let c of dateStr) { h = (h * 31 + c.charCodeAt(0)) >>> 0; }
  return h;
}

function getWordOfDay() {
  const d = new Date().toISOString().slice(0, 10);
  return WORDS_OF_DAY[hashDate(d) % WORDS_OF_DAY.length];
}

function getPhraseOfDay() {
  const d = new Date().toISOString().slice(0, 10);
  return PHRASES_OF_DAY[(hashDate(d) + 7) % PHRASES_OF_DAY.length];
}

function getWordForDate(daysAgo) {
  const d = new Date();
  d.setDate(d.getDate() - daysAgo);
  const s = d.toISOString().slice(0, 10);
  return {
    word: WORDS_OF_DAY[hashDate(s) % WORDS_OF_DAY.length],
    phrase: PHRASES_OF_DAY[(hashDate(s) + 7) % PHRASES_OF_DAY.length],
    date: s,
    label: daysAgo === 0 ? 'Hoy' : daysAgo === 1 ? 'Ayer' : `Hace ${daysAgo} días`
  };
}

function getStorage(k, def) {
  try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; }
}

function setStorage(k, v) {
  try { localStorage.setItem(k, JSON.stringify(v)); } catch {}
}

}

function ExerciseView({ exercise, dark, onComplete, onNext }) {
  const [userAnswer, setUserAnswer] = useState('');
  const [submitted, setSubmitted] = useState(false);
  const [correct, setCorrect] = useState(false);
  const [selectedOption, setSelectedOption] = useState(null);

  // Match state
  const [leftItems] = useState(() => {
    if (exercise.type !== 'match') return [];
    return [...exercise.pairs].map((p, i) => ({...p, idx: i})).sort(() => Math.random() - 0.5);
  });
  const [rightItems] = useState(() => {
    if (exercise.type !== 'match') return [];
    return [...exercise.pairs].map((p, i) => ({...p, idx: i})).sort(() => Math.random() - 0.5);
  });
  const [selectedLeft, setSelectedLeft] = useState(null);
  const [matched, setMatched] = useState(new Set());
  const [wrongPair, setWrongPair] = useState(null);
  const [matchComplete, setMatchComplete] = useState(false);

  const handleFillSubmit = () => {
    if (!userAnswer.trim()) return;
    const isCorrect = userAnswer.trim().toLowerCase() === exercise.answer.toLowerCase();
    setCorrect(isCorrect);
    setSubmitted(true);
  };

  const handleMCQSelect = (option) => {
    if (submitted) return;
    setSelectedOption(option);
    setCorrect(option === exercise.answer);
    setSubmitted(true);
  };

  const handleTranslationSubmit = () => {
    if (!userAnswer.trim()) return;
    setSubmitted(true);
    setCorrect(true);
  };

  const handleLeftClick = (item) => {
    if (matched.has(item.idx)) return;
    setSelectedLeft(item);
  };

  const handleRightClick = (item) => {
    if (matched.has(item.idx)) return;
    if (!selectedLeft) return;
    if (selectedLeft.idx === item.idx) {
      const newMatched = new Set(matched);
      newMatched.add(item.idx);
      setMatched(newMatched);
      setSelectedLeft(null);
      if (newMatched.size === exercise.pairs.length) {
        setMatchComplete(true);
      }
    } else {
      setWrongPair({ left: selectedLeft.idx, right: item.idx });
      setTimeout(() => {
        setWrongPair(null);
        setSelectedLeft(null);
      }, 700);
    }
  };

  if (exercise.type === 'match') {
    if (matchComplete) {
      return (
        <div className="text-center py-8">
          <p className="text-4xl mb-3">🎉</p>
          <p className="text-xl font-bold mb-2">¡Perfecto!</p>
          <p className={`text-sm mb-6 ${dark ? 'text-stone-400' : 'text-stone-500'}`}>Has emparejado todo correctamente.</p>
          <button onClick={onNext} className="bg-orange-500 text-white px-6 py-2 rounded-xl font-semibold text-sm">Siguiente →</button>
        </div>
      );
    }
    return (
      <div>
        <p className={`text-xs font-bold uppercase tracking-wide mb-1 ${dark ? 'text-stone-400' : 'text-stone-500'}`}>{exercise.type} · Emparejar</p>
        <p className="font-bold text-lg mb-4">{exercise.title}</p>
        <p className={`text-xs mb-4 ${dark ? 'text-stone-500' : 'text-stone-400'}`}>Toca un elemento de la izquierda, luego el correspondiente de la derecha.</p>
        <div className="grid grid-cols-2 gap-3">
          <div className="space-y-2">
            {leftItems.map((item, i) => {
              const isMatched = matched.has(item.idx);
              const isSelected = selectedLeft && selectedLeft.idx === item.idx;
              const isWrong = wrongPair && wrongPair.left === item.idx;
              return (
                <button key={i} onClick={() => handleLeftClick(item)} disabled={isMatched}
                  className={`w-full py-3 px-3 rounded-xl text-sm font-medium text-left transition-all
                    ${isMatched ? 'opacity-0 pointer-events-none' : ''}
                    ${isWrong ? 'bg-red-500 text-white' : ''}
                    ${isSelected && !isWrong ? 'bg-orange-500 text-white' : ''}
                    ${!isSelected && !isWrong && !isMatched ? dark ? 'bg-white/[0.08] text-stone-200 hover:bg-white/[0.12]' : 'bg-stone-100 text-stone-700 hover:bg-stone-200' : ''}
                  `}>
                  {item.left}
                </button>
              );
            })}
          </div>
          <div className="space-y-2">
            {rightItems.map((item, i) => {
              const isMatched = matched.has(item.idx);
              const isWrong = wrongPair && wrongPair.right === item.idx;
              return (
                <button key={i} onClick={() => handleRightClick(item)} disabled={isMatched}
                  className={`w-full py-3 px-3 rounded-xl text-sm font-medium text-left transition-all
                    ${isMatched ? 'opacity-0 pointer-events-none' : ''}
                    ${isWrong ? 'bg-red-500 text-white' : ''}
                    ${!isWrong && !isMatched ? dark ? 'bg-white/[0.08] text-stone-200 hover:bg-white/[0.12]' : 'bg-stone-100 text-stone-700 hover:bg-stone-200' : ''}
                  `}>
                  {item.right}
                </button>
              );
            })}
          </div>
        </div>
        <p className={`text-xs mt-4 text-center ${dark ? 'text-stone-500' : 'text-stone-400'}`}>{matched.size} / {exercise.pairs.length} emparejados</p>
      </div>
    );
  }

  if (exercise.type === 'fill') {
    return (
      <div>
        <p className={`text-xs font-bold uppercase tracking-wide mb-1 ${dark ? 'text-stone-400' : 'text-stone-500'}`}>{exercise.type} · Rellena el hueco</p>
        <LevelBadge level={exercise.level} />
        <p className="font-bold text-lg mt-2 mb-4">{exercise.title}</p>
        <p className={`text-base mb-4 leading-relaxed ${dark ? 'text-stone-200' : 'text-stone-700'}`}>
          {exercise.question.replace('___', '______')}
        </p>
        {!submitted ? (
          <div className="space-y-3">
            <input autoFocus value={userAnswer} onChange={e => setUserAnswer(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleFillSubmit()}
              placeholder="Tu respuesta..."
              className={`w-full rounded-xl px-4 py-3 text-sm outline-none border-2 transition-colors ${dark ? 'bg-white/[0.06] border-white/[0.12] text-white placeholder-stone-500 focus:border-orange-500' : 'bg-white border-stone-200 text-stone-900 placeholder-stone-400 focus:border-orange-500'}`} />
            <button onClick={handleFillSubmit} className="bg-orange-500 text-white px-6 py-2.5 rounded-xl font-semibold text-sm w-full">Comprobar</button>
            {exercise.hint && <p className={`text-xs ${dark ? 'text-stone-500' : 'text-stone-400'}`}>💡 {exercise.hint}</p>}
          </div>
        ) : (
          <div className="space-y-3">
            <div className={`rounded-xl p-4 ${correct ? dark ? 'bg-green-900/20 border border-green-700/30' : 'bg-green-50 border border-green-200' : dark ? 'bg-red-900/20 border border-red-700/30' : 'bg-red-50 border border-red-200'}`}>
              <p className={`font-bold mb-1 ${correct ? 'text-green-600' : 'text-red-600'}`}>{correct ? '✓ ¡Correcto!' : '✗ Incorrecto'}</p>
              {!correct && (
                <p className={`text-sm ${dark ? 'text-stone-300' : 'text-stone-700'}`}>Respuesta correcta: <span className="font-bold">{exercise.answer}</span></p>
              )}
              <p className={`text-xs mt-1 ${dark ? 'text-stone-400' : 'text-stone-500'}`}>Tu respuesta: {userAnswer}</p>
            </div>
            <button onClick={onNext} className="bg-orange-500 text-white px-6 py-2.5 rounded-xl font-semibold text-sm w-full">Siguiente →</button>
          </div>
        )}
      </div>
    );
  }

  if (exercise.type === 'mcq') {
    return (
      <div>
        <p className={`text-xs font-bold uppercase tracking-wide mb-1 ${dark ? 'text-stone-400' : 'text-stone-500'}`}>Opción múltiple</p>
        <LevelBadge level={exercise.level} />
        <p className="font-bold text-lg mt-2 mb-4">{exercise.title}</p>
        <p className={`text-base mb-5 leading-relaxed ${dark ? 'text-stone-200' : 'text-stone-700'}`}>{exercise.question}</p>
        <div className="space-y-2 mb-4">
          {exercise.options.map((opt, i) => {
            let cls = '';
            if (submitted) {
              if (opt === exercise.answer) cls = 'bg-green-500 text-white border-transparent';
              else if (opt === selectedOption) cls = 'bg-red-500 text-white border-transparent';
              else cls = dark ? 'opacity-40 bg-white/[0.04] border-white/[0.08] text-stone-400' : 'opacity-40 bg-white border-stone-200 text-stone-500';
            } else {
              cls = dark ? 'bg-white/[0.06] border-white/[0.10] text-stone-200 hover:bg-white/[0.12]' : 'bg-white border-stone-200 text-stone-700 hover:bg-stone-50';
            }
            return (
              <button key={i} onClick={() => handleMCQSelect(opt)} disabled={submitted}
                className={`w-full text-left px-4 py-3 rounded-xl border text-sm font-medium transition-all ${cls}`}>
                {opt}
              </button>
            );
          })}
        </div>
        {submitted && (
          <>
            {exercise.hint && <p className={`text-xs mb-3 ${dark ? 'text-stone-500' : 'text-stone-400'}`}>💡 {exercise.hint}</p>}
            <button onClick={onNext} className="bg-orange-500 text-white px-6 py-2.5 rounded-xl font-semibold text-sm w-full">Siguiente →</button>
          </>
        )}
      </div>
    );
  }

  if (exercise.type === 'translation') {
    return (
      <div>
        <p className={`text-xs font-bold uppercase tracking-wide mb-1 ${dark ? 'text-stone-400' : 'text-stone-500'}`}>Traducción</p>
        <LevelBadge level={exercise.level} />
        <p className="font-bold text-lg mt-2 mb-4">{exercise.title}</p>
        <div className={`rounded-xl p-4 mb-4 ${dark ? 'bg-blue-900/20' : 'bg-blue-50'}`}>
          <p className={`text-sm font-semibold mb-1 ${dark ? 'text-blue-300' : 'text-blue-700'}`}>Traduce al español:</p>
          <p className={`text-base font-medium ${dark ? 'text-blue-100' : 'text-blue-800'}`}>{exercise.question}</p>
        </div>
        {!submitted ? (
          <div className="space-y-3">
            <textarea autoFocus value={userAnswer} onChange={e => setUserAnswer(e.target.value)}
              placeholder="Tu traducción en español..."
              rows={3}
              className={`w-full rounded-xl px-4 py-3 text-sm outline-none border-2 resize-none transition-colors ${dark ? 'bg-white/[0.06] border-white/[0.12] text-white placeholder-stone-500 focus:border-orange-500' : 'bg-white border-stone-200 text-stone-900 placeholder-stone-400 focus:border-orange-500'}`} />
            <button onClick={handleTranslationSubmit} className="bg-orange-500 text-white px-6 py-2.5 rounded-xl font-semibold text-sm w-full">Comprobar</button>
            {exercise.hint && <p className={`text-xs ${dark ? 'text-stone-500' : 'text-stone-400'}`}>💡 {exercise.hint}</p>}
          </div>
        ) : (
          <div className="space-y-3">
            <div className={`rounded-xl p-4 ${dark ? 'bg-white/[0.04] border border-white/[0.08]' : 'bg-stone-50 border border-stone-200'}`}>
              <p className={`text-xs font-bold mb-1 ${dark ? 'text-stone-400' : 'text-stone-500'}`}>Tu respuesta:</p>
              <p className="text-sm mb-3">{userAnswer}</p>
              <p className={`text-xs font-bold mb-1 ${dark ? 'text-green-400' : 'text-green-600'}`}>Respuesta modelo:</p>
              <p className="text-sm font-semibold">{exercise.answer}</p>
            </div>
            <button onClick={onNext} className="bg-orange-500 text-white px-6 py-2.5 rounded-xl font-semibold text-sm w-full">Siguiente →</button>
          </div>
        )}
      </div>
    );
  }

  return null;
}

                  <span className="text-stone-400">→</span>
                </div>
              </Card>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// SECTION: Glosario
// ============================================================

async function autoTranslate(word) {
  try {
    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=es|en`);
    const data = await res.json();
    return data.responseData?.translatedText || '';
  } catch { return ''; }
}

function Glosario({ onBack, dark }) {
  const [entries, setEntries] = useState(() => {
    const saved = getStorage('aprende.glossary', null);
    if (saved && saved.length > 0) return saved;
    const seeded = GLOSSARY_SEED.map((e, i) => ({...e, id: Date.now() + i}));
    setStorage('aprende.glossary', seeded);
    return seeded;
  });
  const [search, setSearch] = useState('');
  const [sort, setSort] = useState('reciente');
  const [showAdd, setShowAdd] = useState(false);
  const [newEs, setNewEs] = useState('');
  const [newEn, setNewEn] = useState('');
  const [newType, setNewType] = useState('noun');
  const [newExample, setNewExample] = useState('');
  const [translating, setTranslating] = useState(false);

  useEffect(() => {
    setStorage('aprende.glossary', entries);
  }, [entries]);

  const filtered = entries.filter(e =>
    e.es.toLowerCase().includes(search.toLowerCase()) ||
    (e.en && e.en.toLowerCase().includes(search.toLowerCase()))
  ).sort((a, b) => {
    if (sort === 'reciente') return b.id - a.id;
    if (sort === 'az') return a.es.localeCompare(b.es);
    if (sort === 'tipo') return (a.type || '').localeCompare(b.type || '');
    return 0;
  });

  const stats = {
    total: entries.length,
    noun: entries.filter(e => e.type === 'noun').length,
    verb: entries.filter(e => e.type === 'verb').length,
    adj: entries.filter(e => e.type === 'adj' || e.type === 'adjective').length,
    phrase: entries.filter(e => e.type === 'phrase').length,
  };

  const handleAutoTranslate = async () => {
    if (!newEs.trim()) return;
    setTranslating(true);
    const translated = await autoTranslate(newEs.trim());
    setNewEn(translated);
    setTranslating(false);
  };

  const handleAdd = async () => {
    if (!newEs.trim()) return;
    let en = newEn.trim();
    if (!en) {
      setTranslating(true);
      en = await autoTranslate(newEs.trim());
      setTranslating(false);
    }
    const entry = {
      id: Date.now(),
      es: newEs.trim(),
      en,
      type: newType,
      example: newExample.trim() || undefined,
    };
    setEntries(prev => [entry, ...prev]);
    setNewEs(''); setNewEn(''); setNewType('noun'); setNewExample('');
    setShowAdd(false);
  };

  const handleDelete = (id) => {
    setEntries(prev => prev.filter(e => e.id !== id));
  };

  return (
    <div>
      <BackHeader title="Glosario" subtitle="My vocabulary" onBack={onBack} dark={dark} />
      <div className="px-4 lg:px-8 py-6 max-w-2xl mx-auto">
        <div className="hidden lg:flex items-center justify-between mb-6">
          <div>
            <h2 className="text-2xl font-serif font-bold">Glosario</h2>
            <p className={`text-sm mt-1 ${dark ? 'text-stone-400' : 'text-stone-500'}`}>Mi vocabulario personal</p>
          </div>
          <button onClick={() => setShowAdd(true)} className="bg-orange-500 text-white px-4 py-2 rounded-xl text-sm font-semibold">+ Añadir</button>
        </div>

        {/* Stats bar */}
        <div className={`flex gap-3 overflow-x-auto hide-scroll mb-5 p-3 rounded-xl ${dark ? 'bg-white/[0.04]' : 'bg-stone-50'}`}>
          <div className="flex-shrink-0 text-center">
            <p className="font-bold text-lg">{stats.total}</p>
            <p className={`text-[10px] ${dark ? 'text-stone-500' : 'text-stone-400'}`}>Total</p>
          </div>
          <div className={`w-px ${dark ? 'bg-white/[0.08]' : 'bg-stone-200'}`} />
          <div className="flex-shrink-0 text-center">
            <p className="font-bold text-lg text-blue-500">{stats.noun}</p>
            <p className={`text-[10px] ${dark ? 'text-stone-500' : 'text-stone-400'}`}>Noun</p>
          </div>
          <div className="flex-shrink-0 text-center">
            <p className="font-bold text-lg text-green-500">{stats.verb}</p>
            <p className={`text-[10px] ${dark ? 'text-stone-500' : 'text-stone-400'}`}>Verb</p>
          </div>
          <div className="flex-shrink-0 text-center">
            <p className="font-bold text-lg text-pink-500">{stats.adj}</p>
            <p className={`text-[10px] ${dark ? 'text-stone-500' : 'text-stone-400'}`}>Adj</p>
          </div>
          <div className="flex-shrink-0 text-center">
            <p className="font-bold text-lg text-orange-500">{stats.phrase}</p>
            <p className={`text-[10px] ${dark ? 'text-stone-500' : 'text-stone-400'}`}>Phrase</p>
          </div>
        </div>

        {/* Search + Sort */}
        <div className="flex gap-2 mb-4">
          <input value={search} onChange={e => setSearch(e.target.value)}
            placeholder="Buscar..."
            className={`flex-1 rounded-xl px-4 py-2.5 text-sm outline-none border transition-colors ${dark ? 'bg-white/[0.06] border-white/[0.10] text-white placeholder-stone-500' : 'bg-white border-stone-200 text-stone-900 placeholder-stone-400'}`} />
          <select value={sort} onChange={e => setSort(e.target.value)}
            className={`rounded-xl px-3 py-2.5 text-sm outline-none border ${dark ? 'bg-white/[0.06] border-white/[0.10] text-white' : 'bg-white border-stone-200 text-stone-900'}`}>
            <option value="reciente">Reciente</option>
            <option value="az">A-Z</option>
            <option value="tipo">Tipo</option>
          </select>
        </div>

        {/* Mobile add button */}
        <div className="lg:hidden mb-4">
          <button onClick={() => setShowAdd(true)} className="w-full bg-orange-500 text-white py-2.5 rounded-xl text-sm font-semibold">+ Añadir palabra</button>
        </div>

        {/* Add modal */}
        {showAdd && (
          <div className="fixed inset-0 z-50 flex items-end lg:items-center justify-center p-4" style={{background:'rgba(0,0,0,0.5)'}}>
            <div className={`w-full max-w-md rounded-2xl p-5 ${dark ? 'bg-stone-900' : 'bg-white'} shadow-2xl`}>
              <div className="flex items-center justify-between mb-4">
                <p className="font-bold text-lg">Añadir palabra</p>
                <button onClick={() => setShowAdd(false)} className={`text-2xl leading-none ${dark ? 'text-stone-400' : 'text-stone-400'}`}>×</button>
              </div>
              <div className="space-y-3">
                <div>
                  <label className={`text-xs font-semibold mb-1 block ${dark ? 'text-stone-400' : 'text-stone-500'}`}>Español *</label>
                  <input value={newEs} onChange={e => setNewEs(e.target.value)}
                    placeholder="Ej: apetecer"
                    className={`w-full rounded-xl px-4 py-2.5 text-sm outline-none border-2 transition-colors ${dark ? 'bg-white/[0.06] border-white/[0.10] text-white placeholder-stone-500 focus:border-orange-500' : 'bg-white border-stone-200 text-stone-900 focus:border-orange-500'}`} />
                </div>
                <div>
                  <div className="flex items-center justify-between mb-1">
                    <label className={`text-xs font-semibold ${dark ? 'text-stone-400' : 'text-stone-500'}`}>Inglés (opcional)</label>
                    <button onClick={handleAutoTranslate} disabled={translating || !newEs.trim()}
                      className={`text-xs px-2 py-1 rounded-lg font-semibold transition-all ${translating ? 'opacity-50 cursor-not-allowed' : ''} ${dark ? 'bg-blue-900/30 text-blue-300 hover:bg-blue-900/50' : 'bg-blue-50 text-blue-600 hover:bg-blue-100'}`}>
                      {translating ? '...' : '🔄 Auto-traducir'}
                    </button>
                  </div>
                  <input value={newEn} onChange={e => setNewEn(e.target.value)}
                    placeholder="Traducción al inglés"
                    className={`w-full rounded-xl px-4 py-2.5 text-sm outline-none border-2 transition-colors ${dark ? 'bg-white/[0.06] border-white/[0.10] text-white placeholder-stone-500 focus:border-orange-500' : 'bg-white border-stone-200 text-stone-900 focus:border-orange-500'}`} />
                </div>
                <div>
                  <label className={`text-xs font-semibold mb-1 block ${dark ? 'text-stone-400' : 'text-stone-500'}`}>Tipo</label>
                  <select value={newType} onChange={e => setNewType(e.target.value)}
                    className={`w-full rounded-xl px-4 py-2.5 text-sm outline-none border-2 ${dark ? 'bg-white/[0.06] border-white/[0.10] text-white' : 'bg-white border-stone-200 text-stone-900'}`}>
                    <option value="noun">Noun</option>
                    <option value="verb">Verb</option>
                    <option value="adj">Adjective</option>
                    <option value="phrase">Phrase</option>
                    <option value="other">Other</option>
                  </select>
                </div>
                <div>
                  <label className={`text-xs font-semibold mb-1 block ${dark ? 'text-stone-400' : 'text-stone-500'}`}>Ejemplo (opcional)</label>
                  <input value={newExample} onChange={e => setNewExample(e.target.value)}
                    placeholder="Frase de ejemplo"
                    className={`w-full rounded-xl px-4 py-2.5 text-sm outline-none border-2 transition-colors ${dark ? 'bg-white/[0.06] border-white/[0.10] text-white placeholder-stone-500 focus:border-orange-500' : 'bg-white border-stone-200 text-stone-900 focus:border-orange-500'}`} />
                </div>
                <button onClick={handleAdd} disabled={!newEs.trim() || translating}
                  className={`w-full py-3 rounded-xl text-sm font-bold transition-all ${!newEs.trim() ? 'opacity-50 cursor-not-allowed bg-orange-400 text-white' : 'bg-orange-500 text-white hover:bg-orange-600'}`}>
                  {translating ? 'Traduciendo...' : 'Guardar'}
                </button>
              </div>
            </div>
          </div>
        )}

        {/* Word list */}
        <div className="space-y-3">
          {filtered.length === 0 && (
            <p className={`text-center py-8 text-sm ${dark ? 'text-stone-500' : 'text-stone-400'}`}>No se encontraron palabras.</p>
          )}
          {filtered.map(entry => (
            <Card key={entry.id} dark={dark} className="p-4">
              <div className="flex items-start gap-3">
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 mb-1">
                    <p className="font-serif font-bold text-lg">{entry.es}</p>
                    <TypeBadge type={entry.type} />
                  </div>
                  {entry.en && <p className={`text-sm font-medium mb-1 ${dark ? 'text-stone-400' : 'text-stone-500'}`}>{entry.en}</p>}
                  {entry.example && <p className={`text-xs italic ${dark ? 'text-stone-500' : 'text-stone-500'}`}>"{entry.example}"</p>}
                </div>
                <button onClick={() => handleDelete(entry.id)}
                  className={`text-xs px-2 py-1 rounded-lg transition-all flex-shrink-0 ${dark ? 'text-red-400 hover:bg-red-900/20' : 'text-red-500 hover:bg-red-50'}`}>
                  ✕
                </button>
              </div>
            </Card>
          ))}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================

function App() {
  const [dark, setDark] = useState(() => getStorage('aprende.dark', false));
  const [section, setSection] = useState('inicio');

  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
    setStorage('aprende.dark', dark);
  }, [dark]);

  const NAV_ITEMS = [
    { id: 'inicio', label: 'Inicio', emoji: '🏠' },
    { id: 'hoy', label: 'Hoy', emoji: '⭐' },
    { id: 'tiempos', label: 'Tiempos', emoji: '🕐' },
    { id: 'chuletas', label: 'Chuletas', emoji: '📋' },
    { id: 'vocabulario', label: 'Vocab', emoji: '📚' },
    { id: 'conectores', label: 'Conectores', emoji: '🔗' },
    { id: 'frases', label: 'Frases', emoji: '💬' },
    { id: 'ejercicios', label: 'Ejercicios', emoji: '✏️' },
    { id: 'glosario', label: 'Glosario', emoji: '🔖' },
  ];

  const renderSection = () => {
    const props = { dark, onBack: () => setSection('inicio') };
    switch(section) {
      case 'inicio': return <Inicio dark={dark} section={section} setSection={setSection} />;
      case 'hoy': return <Hoy {...props} />;
      case 'tiempos': return <Tiempos {...props} />;
      case 'chuletas': return <Chuletas {...props} />;
      case 'vocabulario': return <Vocabulario {...props} />;
      case 'conectores': return <Conectores {...props} />;
      case 'frases': return <Frases {...props} />;
      case 'ejercicios': return <Ejercicios {...props} />;
      case 'glosario': return <Glosario {...props} />;
      default: return <Inicio dark={dark} section={section} setSection={setSection} />;
    }
  };

  return (
    <div className={`min-h-screen ${dark ? 'dark mesh-dark text-white' : 'mesh-light text-stone-900'}`}>
      {/* Desktop sidebar */}
      <aside className={`hidden lg:flex fixed left-0 top-0 h-full w-64 flex-col z-40 border-r ${dark ? 'glass-dark border-white/[0.08]' : 'glass border-stone-200/60'}`}>
        <div className="p-6 border-b border-inherit">
          <h1 className="font-serif font-bold text-2xl text-orange-500">Aprende</h1>
          <p className="text-xs text-stone-500 mt-1">A2 → B1 Español</p>
        </div>
        <nav className="flex-1 overflow-y-auto p-3 space-y-1">
          {NAV_ITEMS.map(item => (
            <button key={item.id} onClick={() => setSection(item.id)}
              className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition-all font-medium text-sm
                ${section === item.id
                  ? 'bg-orange-500 text-white shadow-sm'
                  : dark ? 'text-stone-300 hover:bg-white/[0.06]' : 'text-stone-700 hover:bg-stone-100'
                }`}>
              <span className="text-base">{item.emoji}</span>
              <span>{item.label}</span>
            </button>
          ))}
        </nav>
        <div className="p-4 border-t border-inherit">
          <button onClick={() => setDark(!dark)} className={`w-full py-2 px-4 rounded-xl text-sm font-medium transition-all ${dark ? 'bg-white/[0.08] text-white hover:bg-white/[0.12]' : 'bg-stone-100 text-stone-700 hover:bg-stone-200'}`}>
            {dark ? '☀️ Modo claro' : '🌙 Modo oscuro'}
          </button>
        </div>
      </aside>

      {/* Main content */}
      <main className="lg:ml-64 min-h-screen">
        {/* Mobile header */}
        <header className={`lg:hidden sticky top-0 z-30 px-4 py-3 flex items-center justify-between ${dark ? 'glass-dark border-b border-white/[0.06]' : 'glass border-b border-stone-200/60'}`}>
          <h1 className="font-serif font-bold text-xl text-orange-500">Aprende</h1>
          <button onClick={() => setDark(!dark)} className="text-lg">{dark ? '☀️' : '🌙'}</button>
        </header>

        <div className="pb-24 lg:pb-8">
          {renderSection()}
        </div>
      </main>

      {/* Mobile bottom nav */}
      <nav className={`lg:hidden fixed bottom-0 left-0 right-0 z-40 border-t ${dark ? 'glass-dark border-white/[0.08]' : 'glass border-stone-200/60'}`}>
        <div className="flex overflow-x-auto hide-scroll">
          {NAV_ITEMS.map(item => (
            <button key={item.id} onClick={() => setSection(item.id)}
              className={`flex flex-col items-center gap-0.5 px-3 py-2 flex-shrink-0 min-w-[64px] transition-all
                ${section === item.id ? 'text-orange-500' : dark ? 'text-stone-400' : 'text-stone-500'}`}>
              <span className="text-lg">{item.emoji}</span>
              <span className="text-[9px] font-medium">{item.label}</span>
            </button>
          ))}
        </div>
      </nav>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
