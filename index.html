    setWordPopover({ word: clean, x: rect.left + rect.width / 2, y: rect.bottom + window.scrollY + 4 });
  };

  const renderClickableText = (text) => {
    return text.split(/(\s+)/).map((token, i) => {
      if (/^\s+$/.test(token)) return token;
      return (
        <span key={i} onMouseDown={e => e.preventDefault()} onClick={e => handleWordClick(e, token)}
          className={`cursor-pointer rounded px-0.5 transition-colors ${dark ? 'hover:bg-orange-900/40' : 'hover:bg-orange-100'}`}>
          {token}
        </span>
      );
    });
  };

  if (selected) {
    return (
      <div onClick={() => setWordPopover(null)}>
        <BackHeader title={selected.title} subtitle={selected.titleEn} onBack={() => { setSelected(null); setShowAnswers({}); setWordPopover(null); }} dark={dark} />
        <div className="px-4 lg:px-8 py-6 max-w-2xl mx-auto">
          <div className="flex items-center gap-2 mb-4">
            <span className="text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded bg-orange-100 text-orange-700">{selected.level}</span>
            <SpeakBtn text={selected.paragraphs.join(' ')} size="sm" />
            <span className="text-xs text-stone-500">Toca 🔊 para escuchar · Toca palabra para traducir</span>
          </div>

          {wordPopover && (
            <div onClick={e => e.stopPropagation()}
              style={{ position:'fixed', left: Math.min(wordPopover.x, window.innerWidth - 220), top: wordPopover.y, zIndex:9999, minWidth:'200px' }}
              className={`rounded-2xl shadow-xl border p-3 ${dark ? 'bg-stone-900 border-white/10 text-white' : 'bg-white border-stone-200 text-stone-900'}`}>
              <div className="flex items-center justify-between gap-2 mb-2">
                <span className="font-serif font-bold text-base">{wordPopover.word}</span>
                <button onClick={() => setWordPopover(null)} className="text-stone-400 hover:text-stone-600 text-xs">✕</button>
              </div>
              <div className="flex gap-2">
                <button onClick={() => speakES(wordPopover.word, { gender:'female' })}
                  className="flex items-center gap-1 rounded-lg px-2.5 py-1.5 bg-orange-100 hover:bg-orange-200 text-orange-700 text-xs font-semibold transition-colors">
                  🔊 Escuchar
                </button>
                <a href={`https://www.wordreference.com/es/en/translation.asp?spen=${encodeURIComponent(wordPopover.word)}`} target="_blank" rel="noopener noreferrer"
                  className="flex items-center gap-1 rounded-lg px-2.5 py-1.5 bg-sky-100 hover:bg-sky-200 text-sky-700 text-xs font-semibold transition-colors">
                  📖 Buscar
                </a>
              </div>
            </div>
          )}

          <Card dark={dark} className="p-5 mb-5">
            <p className="text-sm italic text-stone-500 mb-4">{selected.intro}</p>
            {selected.paragraphs.map((p, i) => (
              <div key={i} className="mb-4 group">
                <div className="flex items-start gap-2">
                  <p className="text-base leading-relaxed flex-1">{renderClickableText(p)}</p>
                  <SpeakBtn text={p} size="sm" />
                </div>
              </div>
            ))}
          </Card>

          <Card dark={dark} className="p-5 mb-5">
            <p className="text-xs font-bold uppercase tracking-wider text-orange-500 mb-3">Vocabulario clave</p>
            <div className="space-y-2">
              {selected.glossary.map((g, i) => (
                <div key={i} className="flex items-baseline gap-3 text-sm">
                  <span className="font-serif font-bold flex-shrink-0">{g[0]}</span>
                  <span className="text-stone-300">·</span>
                  <span className="text-stone-600 flex-1">{g[1]}</span>
                  <button onClick={() => speakES(g[0])} className="text-stone-400 hover:text-orange-500 text-xs">🔊</button>
                </div>
              ))}
            </div>
          </Card>

          <Card dark={dark} className="p-5">
            <p className="text-xs font-bold uppercase tracking-wider text-orange-500 mb-3">Preguntas de comprensión</p>
            <div className="space-y-3">
              {selected.questions.map((q, i) => (
                <div key={i}>
                  <p className="text-sm font-semibold mb-1">{i + 1}. {q.q}</p>
                  {showAnswers[i] ? (
                    <p className="text-sm text-emerald-700 bg-emerald-50 rounded-lg p-2">✓ {q.a}</p>
                  ) : (
                    <button onClick={() => setShowAnswers(prev => ({ ...prev, [i]: true }))}
                      className="text-xs bg-stone-100 hover:bg-stone-200 text-stone-600 px-3 py-1.5 rounded-lg font-semibold">
                      Mostrar respuesta
                    </button>
                  )}
                </div>
              ))}
            </div>
          </Card>
        </div>
      </div>
    );
  }

  return (
    <div>
      <BackHeader title="Lecturas" subtitle="Reading passages" onBack={onBack} dark={dark} onSearch={onSearch} />
      <div className="px-4 lg:px-8 py-6 max-w-5xl mx-auto">
        <div className="hidden lg:block mb-6">
          <h2 className="text-2xl font-serif font-bold">Lecturas</h2>
          <p className="text-sm text-stone-500 mt-1">Mini textos con audio, vocabulario y preguntas</p>
        </div>
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 lg:gap-6">
          {READING_PASSAGES.map(p => (
            <button key={p.id} onClick={() => setSelected(p)} className={`text-left rounded-2xl overflow-hidden border transition-all hover:shadow-md hover:-translate-y-0.5 min-h-[220px] flex flex-col ${dark ? 'bg-white/[0.04] border-white/[0.08] hover:bg-white/[0.08]' : 'bg-white border-stone-200/80 shadow-sm'}`}>
              <div className="h-1.5 w-full bg-gradient-to-r from-sky-400 to-sky-500" />
              <div className="p-5 flex-1 flex flex-col">
                <div className="flex items-center gap-2 mb-3">
                  <span className="text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded bg-orange-100 text-orange-700">{p.level}</span>
                  <span className={`text-xs ${dark ? 'text-stone-500' : 'text-stone-400'}`}>{p.paragraphs.length} párrafos</span>
                </div>
                <p className="font-serif font-bold text-lg mb-1 leading-snug">{p.title}</p>
                <p className={`text-sm mb-3 ${dark ? 'text-stone-400' : 'text-stone-500'}`}>{p.titleEn}</p>
                <p className={`text-sm italic line-clamp-3 mt-auto ${dark ? 'text-stone-400' : 'text-stone-500'}`}>{p.intro}</p>
              </div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function Conversaciones({ onBack, dark, onSearch }) {
  const [selected, setSelected] = useState(null);
  const [showTranslation, setShowTranslation] = useState(true);
  const [playingIdx, setPlayingIdx] = useState(null);
  const [playMode, setPlayMode] = useState(null); // null | 'normal' | 'shadow'
  const stopRef = useRef(false);
  const shadowTimerRef = useRef(null);

  useEffect(() => {
    return () => {
      ttsStop();
      if (shadowTimerRef.current) clearTimeout(shadowTimerRef.current);
    };
  }, []);

  const playAll = (lines, mode = 'normal') => {
    ttsStop();
    if (shadowTimerRef.current) clearTimeout(shadowTimerRef.current);
    stopRef.current = false;
    setPlayMode(mode);
    let i = 0;
    const next = async () => {
      if (stopRef.current || i >= lines.length) {
        setPlayingIdx(null);
        setPlayMode(null);
        return;
      }
      setPlayingIdx(i);
      const line = lines[i];
      // Speaker A = female Castilian, Speaker B = male Castilian – distinct voices
      const voiceOpts = line.who === 'A'
        ? { gender:'female', dialect:'es-ES', rate:0.91, pitch:1.0 }
        : { gender:'male',   dialect:'es-ES', rate:0.93, pitch:1.0 };
      await playSpeakable(line.es, voiceOpts);
      if (stopRef.current) { setPlayingIdx(null); setPlayMode(null); return; }
      i++;
      // Shadow mode leaves a longer gap (~1.2× line length) so the learner can repeat aloud
      const gap = mode === 'shadow'
        ? Math.max(1500, Math.round(line.es.length * 70))
        : 420;
      shadowTimerRef.current = setTimeout(next, gap);
    };
    next();
  };

  const stopAll = () => {
    stopRef.current = true;
    ttsStop();
    if (shadowTimerRef.current) { clearTimeout(shadowTimerRef.current); shadowTimerRef.current = null; }
    setPlayingIdx(null);
    setPlayMode(null);
  };

  if (selected) {
    return (
      <div>
        <BackHeader title={selected.title} subtitle={selected.titleEn} onBack={() => { stopAll(); setSelected(null); }} dark={dark} />
        <div className="px-4 lg:px-8 py-6 max-w-2xl mx-auto">
          <div className="flex flex-wrap items-center gap-2 mb-4">
            <span className="text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded bg-orange-100 text-orange-700">{selected.level}</span>
            <span className="text-xs text-stone-400">{selected.lines.length} líneas</span>
            <div className="flex-1"></div>
            <button onClick={() => setShowTranslation(!showTranslation)}
              className="text-[11px] font-bold px-3 py-1.5 rounded-full bg-stone-100 hover:bg-stone-200 text-stone-700">
              {showTranslation ? 'Ocultar traducción' : 'Mostrar traducción'}
            </button>
          </div>

          <Card dark={dark} className="p-5 mb-5">
            <p className="text-sm italic text-stone-500 mb-4">{selected.setting}</p>
            <div className="flex flex-wrap gap-2 mb-4">
              {playingIdx === null ? (
                <>
                  <button onClick={() => playAll(selected.lines, 'normal')}
                    className="flex items-center gap-2 px-4 py-2 rounded-full bg-orange-500 hover:bg-orange-600 text-white text-sm font-bold">
                    <span>▶</span> Reproducir todo
                  </button>
                  <button onClick={() => playAll(selected.lines, 'shadow')}
                    className="flex items-center gap-2 px-4 py-2 rounded-full bg-violet-500 hover:bg-violet-600 text-white text-sm font-bold"
                    title="Tras cada línea, el audio hace una pausa larga para que la repitas en voz alta">
                    <span>🎭</span> Modo sombra
                  </button>
                </>
              ) : (
                <button onClick={stopAll}
                  className="flex items-center gap-2 px-4 py-2 rounded-full bg-stone-800 hover:bg-stone-900 text-white text-sm font-bold">
                  <span>⏹</span> Parar {playMode === 'shadow' ? '(sombra)' : ''}
                </button>
              )}
            </div>
            {playMode === 'shadow' && (
              <p className={`text-xs italic mb-3 ${dark ? 'text-violet-300' : 'text-violet-600'}`}>🎭 Modo sombra: repite cada línea en voz alta durante la pausa.</p>
            )}

            <div className="space-y-4">
              {selected.lines.map((line, i) => {
                const speaker = selected.speakers.find(s => s.id === line.who) || selected.speakers[0];
                const isPlaying = playingIdx === i;
                return (
                  <div key={i} className={`rounded-xl p-3 transition-colors ${isPlaying ? 'bg-amber-50 ring-2 ring-amber-300' : 'bg-stone-50'}`}>
                    <div className="flex items-center gap-2 mb-1.5">
                      <span className={`text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded ${speaker.color}`}>{speaker.name}</span>
                    </div>
                    <div className="flex items-start gap-2">
                      <p className="text-base leading-relaxed flex-1">{line.es}</p>
                      <SpeakBtn text={line.es} size="sm" gender={line.who === 'A' ? 'female' : 'male'} dialect="es-ES" />
                    </div>
                    {showTranslation && (
                      <p className="text-xs text-stone-500 mt-1">{line.en}</p>
                    )}
                  </div>
                );
              })}
            </div>
          </Card>

          {selected.vocab && selected.vocab.length > 0 && (
            <Card dark={dark} className="p-5 mb-5">
              <p className="text-xs font-bold uppercase tracking-wider text-orange-500 mb-3">Vocabulario clave</p>
              <div className="space-y-2">
                {selected.vocab.map((v, i) => (
                  <div key={i} className="flex items-baseline gap-3 text-sm">
                    <span className="font-serif font-bold flex-shrink-0">{v.es}</span>
                    <span className="text-stone-300">·</span>
                    <span className="text-stone-600 flex-1">{v.en}</span>
                    <button onClick={() => speakES(v.es)} className="text-stone-400 hover:text-orange-500 text-xs">🔊</button>
                  </div>
                ))}
              </div>
            </Card>
          )}

          {selected.notes && (
            <Card dark={dark} className="p-5">
              <p className="text-xs font-bold uppercase tracking-wider text-orange-500 mb-2">Notas culturales</p>
              <p className="text-sm text-stone-700 leading-relaxed">{selected.notes}</p>
            </Card>
          )}
        </div>
      </div>
    );
  }

  return (
    <div>
      <BackHeader title="Conversaciones" subtitle="Listening practice" onBack={onBack} dark={dark} onSearch={onSearch} />
      <div className="px-4 lg:px-8 py-6 max-w-5xl mx-auto">
        <div className="hidden lg:block mb-6">
          <h2 className="text-2xl font-serif font-bold">Conversaciones</h2>
          <p className="text-sm text-stone-500 mt-1">Diálogos reales con dos voces, audio y vocabulario</p>
        </div>
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          {CONVERSATIONS.map(c => (
            <button key={c.id} onClick={() => setSelected(c)} className="text-left">
              <Card dark={dark} className="p-5 hover:shadow-md transition-shadow h-full">
                <div className="flex items-center gap-2 mb-2">
                  <span className="text-2xl">{c.emoji}</span>
                  <span className="text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded bg-orange-100 text-orange-700">{c.level}</span>
                  <span className="text-xs text-stone-400 ml-auto">{c.lines.length} líneas</span>
                </div>
                <p className="font-serif font-bold text-lg mb-1">{c.title}</p>
                <p className="text-xs text-stone-500 mb-2">{c.titleEn}</p>
                <p className="text-xs italic text-stone-600 line-clamp-3">{c.setting}</p>
              </Card>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

  const isEr = v.endsWith('er');

    indefinido:   [stem+'é',stem+'aste',stem+'ó',stem+'amos',stem+'asteis',stem+'aron'],
    imperfecto:   [stem+'aba',stem+'abas',stem+'aba',stem+'ábamos',stem+'abais',stem+'aban'],
    futuro:       [infinitive+'é',infinitive+'ás',infinitive+'á',infinitive+'emos',infinitive+'éis',infinitive+'án'],
    condicional:  [infinitive+'ía',infinitive+'ías',infinitive+'ía',infinitive+'íamos',infinitive+'íais',infinitive+'ían'],
    subjuntivo:   [stem+'e',stem+'es',stem+'e',stem+'emos',stem+'éis',stem+'en'],
    imperfectoSubj:[stem+'ara',stem+'aras',stem+'ara',stem+'áramos',stem+'arais',stem+'aran'],
    perfecto:     ['he '+stem+'ado','has '+stem+'ado','ha '+stem+'ado','hemos '+stem+'ado','habéis '+stem+'ado','han '+stem+'ado'],
  };
  const er = {
    presente:     [stem+'o',stem+'es',stem+'e',stem+'emos',stem+'éis',stem+'en'],
    indefinido:   [stem+'í',stem+'iste',stem+'ió',stem+'imos',stem+'isteis',stem+'ieron'],
    imperfecto:   [stem+'ía',stem+'ías',stem+'ía',stem+'íamos',stem+'íais',stem+'ían'],
    futuro:       [infinitive+'é',infinitive+'ás',infinitive+'á',infinitive+'emos',infinitive+'éis',infinitive+'án'],
    condicional:  [infinitive+'ía',infinitive+'ías',infinitive+'ía',infinitive+'íamos',infinitive+'íais',infinitive+'ían'],
    subjuntivo:   [stem+'a',stem+'as',stem+'a',stem+'amos',stem+'áis',stem+'an'],
    imperfectoSubj:[stem+'iera',stem+'ieras',stem+'iera',stem+'iéramos',stem+'ierais',stem+'ieran'],
    perfecto:     ['he '+stem+'ido','has '+stem+'ido','ha '+stem+'ido','hemos '+stem+'ido','habéis '+stem+'ido','han '+stem+'ido'],
  };
  const ir = {
    presente:     [stem+'o',stem+'es',stem+'e',stem+'imos',stem+'ís',stem+'en'],
    indefinido:   [stem+'í',stem+'iste',stem+'ió',stem+'imos',stem+'isteis',stem+'ieron'],
    imperfecto:   [stem+'ía',stem+'ías',stem+'ía',stem+'íamos',stem+'íais',stem+'ían'],
    futuro:       [infinitive+'é',infinitive+'ás',infinitive+'á',infinitive+'emos',infinitive+'éis',infinitive+'án'],
    condicional:  [infinitive+'ía',infinitive+'ías',infinitive+'ía',infinitive+'íamos',infinitive+'íais',infinitive+'ían'],
    subjuntivo:   [stem+'a',stem+'as',stem+'a',stem+'amos',stem+'áis',stem+'an'],
    imperfectoSubj:[stem+'iera',stem+'ieras',stem+'iera',stem+'iéramos',stem+'ierais',stem+'ieran'],
    perfecto:     ['he '+stem+'ido','has '+stem+'ido','ha '+stem+'ido','hemos '+stem+'ido','habéis '+stem+'ido','han '+stem+'ido'],
  };

  const forms = isAr ? ar : (isEr ? er : ir);
  let matched = false;

  // ── 1. Orthographic corrections for -ar verbs ──
  if (isAr) {
    if (v.endsWith('car')) { forms.indefinido[0] = stem.slice(0,-1) + 'qué'; }
    else if (v.endsWith('gar')) { forms.indefinido[0] = stem + 'ué'; }
    else if (v.endsWith('zar')) { forms.indefinido[0] = stem.slice(0,-1) + 'cé'; }
  }

  // ── 2. VERB_PATCHES overrides (explicitly listed verbs) ──
  const patch = VERB_PATCHES[v];
  if (patch) {
    const tenseNames = ['presente','indefinido','imperfecto','futuro','condicional','subjuntivo','imperfectoSubj','perfecto'];
    tenseNames.forEach(tense => {
      if (patch[tense]) {
        forms[tense] = forms[tense].map((reg, i) => (patch[tense][i] != null) ? patch[tense][i] : reg);
      }
    });
    type = patch._type || type;
    matched = true;
  }

  // ── 3. Compound verb detection (prefix + known irregular root) ──
  // Handles: componer, suponer, mantener, obtener, devolver, atraer, etc.
  if (!matched) {
    const COMPOUND_ROOTS = ['poner','tener','venir','hacer','decir','volver','salir','traer','caer'];
    for (const root of COMPOUND_ROOTS) {
      if (v !== root && v.endsWith(root) && v.length > root.length) {
        const prefix = v.slice(0, -root.length);
        const rootData = CONJUGATOR_VERBS[root];
        if (rootData) {
          const tenses = ['presente','indefinido','imperfecto','futuro','condicional','subjuntivo','imperfectoSubj','perfecto'];
          tenses.forEach(t => {
            if (rootData[t]) {
              forms[t] = rootData[t].map(f => {
                if (t === 'perfecto') {
                  const sp = f.indexOf(' ');
                  return f.slice(0, sp + 1) + prefix + f.slice(sp + 1);
                }
                return prefix + f;
              });
            }
          });
          type = 'compound (' + prefix + '– + ' + root + ')';
          matched = true;
        }
        break;
      }
    }
  }

  // ── 4. Auto-detect -ducir verbs (conducir, traducir, producir, etc.) ──
  if (!matched && v.endsWith('ducir')) {
    const d = v.slice(0, -5); // prefix before 'ducir'
    forms.presente[0] = d + 'duzco';
    forms.indefinido = [d+'duje',d+'dujiste',d+'dujo',d+'dujimos',d+'dujisteis',d+'dujeron'];
    forms.subjuntivo = [d+'duzca',d+'duzcas',d+'duzca',d+'duzcamos',d+'duzcáis',d+'duzcan'];
    forms.imperfectoSubj = [d+'dujera',d+'dujeras',d+'dujera',d+'dujéramos',d+'dujerais',d+'dujeran'];
    type = 'irregular (-ducir: -zco, -uje)';
    matched = true;
  }

  // ── 5. Auto-detect vowel + -cer/-cir → yo: -zco (conocer, parecer, etc.) ──
  if (!matched && (v.endsWith('cer') || v.endsWith('cir')) && stem.length >= 2) {
    const preC = stem[stem.length - 2];
    if ('aeiouáéíóú'.includes(preC)) {
      // vowel + cer/cir → -zco pattern
      const zc = stem.slice(0, -1) + 'zc';
      forms.presente[0] = zc + 'o';
      const subjEnd = isEr ? ['a','as','a','amos','áis','an'] : ['a','as','a','amos','áis','an'];
      forms.subjuntivo = subjEnd.map(e => zc + e);
      type = 'irregular (yo: -zco)';
      matched = true;
    } else {
      // consonant + cer/cir → c→z in yo (vencer→venzo, esparcir→esparzo)
      const z = stem.slice(0, -1) + 'z';
      forms.presente[0] = z + 'o';
      const subjEnd = isEr ? ['a','as','a','amos','áis','an'] : ['a','as','a','amos','áis','an'];
      forms.subjuntivo = subjEnd.map(e => z + e);
      type = 'irregular (c→z in yo)';
      matched = true;
    }
  }

  // ── 6. Auto-detect -ger/-gir → g→j in yo (coger→cojo, dirigir→dirijo) ──
  if (!matched && (v.endsWith('ger') || v.endsWith('gir'))) {
    const j = stem.slice(0, -1) + 'j';
    forms.presente[0] = j + 'o';
    const subjEnd = isEr ? ['a','as','a','amos','áis','an'] : ['a','as','a','amos','áis','an'];
    forms.subjuntivo = subjEnd.map(e => j + e);
    type = 'irregular (g→j in yo)';
    matched = true;
  }

  // ── 7. Auto-detect -guir → gu→g in yo (distinguir→distingo) ──
  if (!matched && v.endsWith('guir')) {
    const g = stem.slice(0, -2) + 'g';
    forms.presente[0] = g + 'o';
    forms.subjuntivo = ['a','as','a','amos','áis','an'].map(e => g + e);
    type = 'irregular (gu→g in yo)';
    matched = true;
  }

  // ── 8. Auto-detect -uir (not -guir) → add y (construir, incluir, huir) ──
  if (!matched && v.endsWith('uir') && !v.endsWith('guir')) {
    const u = stem; // e.g. 'constru'
    forms.presente = [u+'yo',u+'yes',u+'ye',u+'imos',u+'ís',u+'yen'];
    forms.indefinido[2] = u+'yó';
    forms.indefinido[5] = u+'yeron';
    forms.subjuntivo = [u+'ya',u+'yas',u+'ya',u+'yamos',u+'yáis',u+'yan'];
    forms.imperfectoSubj = [u+'yera',u+'yeras',u+'yera',u+'yéramos',u+'yerais',u+'yeran'];
    type = 'irregular (-uir: add y)';
    matched = true;
  }

  return { en: '', type: type + ' (auto)', ...forms };
}

// ── Auto-generate usage examples for any verb ──
function generateAutoUsage(verb, data) {
  const cap = s => s ? s.charAt(0).toUpperCase() + s.slice(1) : '';
  const [yo_p, tu_p, el_p, nos_p] = data.presente || [];
  const [yo_i, tu_i, el_i] = data.indefinido || [];
  const [yo_imp, , el_imp] = data.imperfecto || [];
  const [yo_f, tu_f] = data.futuro || [];
  const [yo_c, tu_c] = data.condicional || [];
  const [yo_s, , el_s, nos_s] = data.subjuntivo || [];
  const [yo_is] = data.imperfectoSubj || [];
  const [yo_per, tu_per] = data.perfecto || [];
  return {
    presente:{ when:'Habitual actions, current facts, near-future plans.',
      examples:[
        { es:`¿Con qué frecuencia ${tu_p}?`, en:`How often do you do it?` },
        { es:`${cap(yo_p)} cuando tengo tiempo – es una buena costumbre.`, en:`I do it when I have time – it's a good habit.` }
      ]},
    indefinido:{ when:'Completed past action – clear start and end point.',
      examples:[
        { es:`Ayer ${yo_i} y fue bastante bien.`, en:`Yesterday I did it and it went pretty well.` },
        { es:`¿${cap(tu_i)} el fin de semana pasado?`, en:`Did you do it last weekend?` }
      ]},
    imperfecto:{ when:'Past habit or ongoing background action – no fixed endpoint.',
      examples:[
        { es:`Antes ${yo_imp} mucho más que ahora.`, en:`I used to do it a lot more than I do now.` },
        { es:`De pequeño, siempre ${yo_imp} – era algo normal.`, en:`As a kid, I always did it – it was normal.` }
      ]},
    perfecto:{ when:'Recently completed or experiential past. Common in Spain.',
      examples:[
        { es:`¿Ya ${tu_per}? Yo todavía no ${yo_per} hoy.`, en:`Have you done it already? I haven't yet today.` },
        { es:`${cap(yo_per)} varias veces pero nunca lo he dominado del todo.`, en:`I've done it several times but never fully mastered it.` }
      ]},
    futuro:{ when:'Future plans, predictions, or conjectures.',
      examples:[
        { es:`${cap(yo_f)} mañana sin falta.`, en:`I'll do it tomorrow without fail.` },
        { es:`¿${cap(tu_f)} esta semana o lo dejas para más tarde?`, en:`Will you do it this week or leave it for later?` }
      ]},
    condicional:{ when:'Hypothetical situations, polite requests, reported speech.',
      examples:[
        { es:`Si tuviera más tiempo, ${yo_c} todos los días.`, en:`If I had more time, I'd do it every day.` },
        { es:`${cap(tu_c)} tú en mi lugar?`, en:`Would you do it if you were me?` }
      ]},
    subjuntivo:{ when:'After WEIRDO triggers: Wishes, Emotion, Impersonal, Recommendations, Doubt, Ojalá.',
      examples:[
        { es:`Espero que ${el_s} pronto – ya es hora.`, en:`I hope he does it soon – it's about time.` },
        { es:`Quiero que ${nos_s} juntos – será más fácil.`, en:`I want us to do it together – it'll be easier.` }
      ]},
    imperfectoSubj:{ when:'Hypothetical si-clauses, after "como si", polished formal speech.',
      examples:[
        { es:`Si ${yo_is} más, los resultados serían mejores.`, en:`If I did it more, the results would be better.` },
        { es:`Ojalá ${el_s} antes – habría sido más fácil.`, en:`I wish he'd done it sooner – it would have been easier.` }
      ]},
  };
}

function Conjugador({ dark }) {
  const verbList = Object.keys(CONJUGATOR_VERBS);
  const [customInput, setCustomInput] = useState('');
  const [verb, setVerb] = useState(() => getStorage('aprende.lastVerb', 'hablar'));
  const [filter, setFilter] = useState('');
  const [savedVerbs, setSavedVerbs] = useState(() => getStorage('aprende.saved_verbs', {}));
  const [saveEnInput, setSaveEnInput] = useState('');
  const [showSaveInput, setShowSaveInput] = useState(false);

  // Resolve current verb data: from dictionary OR saved OR auto-conjugate
  const dictData = CONJUGATOR_VERBS[verb];
  const savedData = !dictData ? savedVerbs[verb] : null;
  const autoData = !dictData && !savedData ? conjugateRegular(verb) : null;
  const data = dictData || savedData || autoData;
  const isAuto = !dictData && !savedData && !!autoData;
  const isSaved = !dictData && !!savedData;
  const isUnknown = !dictData && !savedData && !autoData;

  // Use real usage data, fall back to auto-generated for non-dictionary verbs
  const resolvedUsage = data
    ? (data.usage || (!dictData ? generateAutoUsage(verb, data) : null))
    : null;

  const selectVerb = (v) => { setVerb(v); setStorage('aprende.lastVerb', v); setShowSaveInput(false); setSaveEnInput(''); };

  const saveVerb = () => {
    const suggested = VERB_TRANSLATIONS[verb] || '';
    const en = saveEnInput.trim() || suggested || verb;
    const entry = { ...autoData, en, type: autoData.type.replace(' (auto)', '') };
    const updated = { ...savedVerbs, [verb]: entry };
    setSavedVerbs(updated);
    setStorage('aprende.saved_verbs', updated);
    setShowSaveInput(false);
    setSaveEnInput('');
  };

  const unsaveVerb = () => {
    const updated = { ...savedVerbs };
    delete updated[verb];
    setSavedVerbs(updated);
    setStorage('aprende.saved_verbs', updated);
  };

  const openSaveInput = () => {
    setSaveEnInput(VERB_TRANSLATIONS[verb] || '');
    setShowSaveInput(true);
  };

  const savedVerbList = Object.keys(savedVerbs);
  const allVerbs = [...verbList, ...savedVerbList.filter(v => !CONJUGATOR_VERBS[v])];
  const filtered = allVerbs.filter(v => {
    const entry = CONJUGATOR_VERBS[v] || savedVerbs[v];
    return v.includes(filter.toLowerCase()) ||
      ((entry && entry.en) || '').toLowerCase().includes(filter.toLowerCase());
  });
  const persons = ['yo','tú','él/ella','nosotros','vosotros','ellos'];

  const tenseGroups = [
    { key:'presente', label:'Presente' },
    { key:'indefinido', label:'Pretérito Indefinido' },
    { key:'imperfecto', label:'Pretérito Imperfecto' },
    { key:'perfecto', label:'Pretérito Perfecto' },
    { key:'futuro', label:'Futuro Simple' },
    { key:'condicional', label:'Condicional' },
    { key:'subjuntivo', label:'Presente Subjuntivo' },
    { key:'imperfectoSubj', label:'Imperfecto Subjuntivo' },
  ];

  const handleCustomSubmit = (e) => {
    e.preventDefault();
    const v = customInput.trim().toLowerCase();
    if (!v) return;
    selectVerb(v);
    setFilter('');
    setCustomInput('');
  };

  return (
    <div className="space-y-4">
      {/* ── Custom verb input ── */}
      <Card dark={dark} className="p-4">
        <form onSubmit={handleCustomSubmit} className="flex gap-2 mb-4">
          <input
            value={customInput}
            onChange={e => setCustomInput(e.target.value)}
            placeholder="Escribe cualquier verbo (ej. trabajar, correr…)"
            className={`flex-1 rounded-xl px-4 py-2.5 text-sm outline-none border-2 transition-colors ${dark ? 'bg-white/[0.06] border-white/[0.12] text-white placeholder-stone-500 focus:border-orange-500' : 'border-stone-200 focus:border-orange-500'}`} />
          <button type="submit" className="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-xl text-sm font-semibold flex-shrink-0">Conjugar</button>
        </form>
        <input value={filter} onChange={e => setFilter(e.target.value)}
          placeholder="Buscar en el diccionario..."
          className={`w-full rounded-xl px-4 py-2.5 text-sm outline-none border-2 transition-colors mb-3 ${dark ? 'bg-white/[0.06] border-white/[0.12] text-white placeholder-stone-500 focus:border-orange-500' : 'border-stone-200 focus:border-orange-500'}`} />
        <div className="flex flex-wrap gap-2">
          {filtered.map(v => {
            const isVSaved = !CONJUGATOR_VERBS[v] && !!savedVerbs[v];
            return (
              <button key={v} onClick={() => selectVerb(v)}
                className={`px-3 py-1.5 rounded-full text-xs font-bold transition-colors ${verb === v ? 'bg-orange-500 text-white' : isVSaved ? (dark ? 'bg-emerald-900/40 text-emerald-300 hover:bg-emerald-900/60' : 'bg-emerald-100 text-emerald-700 hover:bg-emerald-200') : dark ? 'bg-white/[0.08] text-stone-300 hover:bg-white/[0.14]' : 'bg-stone-100 text-stone-700 hover:bg-stone-200'}`}>
                {isVSaved ? `⭐ ${v}` : v}
              </button>
            );
          })}
        </div>
      </Card>

      {isUnknown && (
        <Card dark={dark} className="p-5">
          <p className={`text-sm font-semibold mb-1 ${dark ? 'text-amber-300' : 'text-amber-700'}`}>Verbo no reconocido</p>
          <p className={`text-xs ${dark ? 'text-stone-400' : 'text-stone-500'}`}>
            "{verb}" no termina en -ar/-er/-ir o no está en el diccionario. Prueba con un verbo como "trabajar", "correr" o "escribir".
          </p>
        </Card>
      )}

      {data && (
        <Card dark={dark} className="p-5">
          <div className="flex items-center gap-3 mb-1">
            <p className="font-serif font-bold text-3xl">{verb}</p>
            <SpeakBtn text={verb} size="lg" />
          </div>
          {data.en && <p className={`text-sm mb-0.5 ${dark ? 'text-stone-400' : 'text-stone-500'}`}>{data.en}</p>}
          <div className="flex flex-wrap items-center gap-2 mb-4">
            <p className={`text-xs ${dark ? 'text-stone-500' : 'text-stone-400'}`}>{data.type}</p>
            {isAuto && (
              <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-amber-100 text-amber-700">
                conjugado como regular – las irregularidades no se aplican
              </span>
            )}
            {isSaved && (
              <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700">
                ⭐ guardado en tu lista
              </span>
            )}
          </div>

          {/* Save / unsave actions */}
          {isAuto && !showSaveInput && (
            <div className="mb-5">
              <button onClick={openSaveInput}
                className="text-xs font-semibold px-3 py-1.5 rounded-xl bg-emerald-500 hover:bg-emerald-600 text-white transition-colors">
                💾 Guardar en mi lista
              </button>
            </div>
          )}
          {isAuto && showSaveInput && (
            <div className={`rounded-xl p-4 mb-5 ${dark ? 'bg-emerald-900/20' : 'bg-emerald-50'}`}>
              <p className={`text-xs font-bold mb-2 ${dark ? 'text-emerald-300' : 'text-emerald-700'}`}>Guardar "{verb}" en tu lista</p>
              <div className="flex gap-2">
                <input value={saveEnInput} onChange={e => setSaveEnInput(e.target.value)}
                  placeholder={`Traducción en inglés (ej. "to carry")`}
                  className={`flex-1 rounded-lg px-3 py-1.5 text-sm outline-none border-2 transition-colors ${dark ? 'bg-white/[0.06] border-white/[0.12] text-white placeholder-stone-500 focus:border-emerald-500' : 'border-stone-200 focus:border-emerald-500'}`} />
                <button onClick={saveVerb}
                  className="bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-1.5 rounded-lg text-sm font-semibold flex-shrink-0">Guardar</button>
                <button onClick={() => { setShowSaveInput(false); setSaveEnInput(''); }}
                  className={`px-3 py-1.5 rounded-lg text-sm font-semibold flex-shrink-0 ${dark ? 'bg-white/[0.08] text-stone-300' : 'bg-stone-100 text-stone-600'}`}>✕</button>

                      <p className={`text-xs italic mb-2.5 leading-snug ${dark ? 'text-stone-400' : 'text-stone-500'}`}>{u.when}</p>
                      <div className="space-y-3">

                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </Card>
      )}
    </div>
  );
}

const COMMON_MISTAKES = [
  { wrong:'Soy 30 años', right:'Tengo 30 años', en:'I am 30 years old', why:'Use "tener" for age, not "ser". The verb is literally "to have years".' },
  { wrong:'Estoy caliente', right:'Tengo calor', en:'I am hot (body temperature)', why:'"Estoy caliente" has a sexual meaning in Spain (horny). Always use "tener calor" for body temperature. Same for "tener frío" = to feel cold.' },
  { wrong:'Soy aburrido (if you mean "I feel bored")', right:'Estoy aburrido', en:'I am bored', why:'"Estoy aburrido" = I feel bored right now. "Soy aburrido" = I am a boring person. Ser vs estar changes the meaning. Same trap: cansado, listo, rico, malo.' },
  { wrong:'Voy en casa de mi amiga', right:'Voy a casa de mi amiga', en:'I\'m going to my friend\'s house', why:'Movement towards = "a", never "en". "En" describes a fixed location. "Estoy en casa de mi amiga" vs "Voy a casa de mi amiga".' },
  { wrong:'Sé como nadar', right:'Sé nadar', en:'I know how to swim', why:'"Saber + infinitivo" already means "to know how to". Don\'t add "cómo".' },
  { wrong:'No pienso que es bueno', right:'No pienso que sea bueno', en:'I don\'t think it\'s good', why:'"Pensar que" affirmative takes indicative ("pienso que es bueno"). The NEGATIVE "no pienso que" triggers subjunctive because it expresses doubt.' },
  { wrong:'Realizar mi error', right:'Darme cuenta de mi error', en:'To realise my mistake', why:'False friend! "Realizar" means "to carry out, to achieve". To realise something mentally = "darse cuenta de".' },
  { wrong:'Estoy embarazada', right:'Tengo vergüenza / Me da vergüenza', en:'I\'m embarrassed', why:'False friend! "Embarazada" = pregnant. Use "vergüenza" for embarrassment. "Me da vergüenza hablar en público" = I\'m embarrassed speaking in public.' },
  { wrong:'Atender al concierto', right:'Asistir al concierto', en:'To attend the concert', why:'False friend! "Atender" = to assist/serve a customer or pay attention. To attend an event = "asistir a".' },
  { wrong:'Trabajo para vivir en Valencia', right:'Trabajo por vivir en Valencia', en:'I work because I live in Valencia (not "in order to live")', why:'Por = cause/motivation ("because of"). Para = purpose/destination ("in order to"). "Estudio español para hablar con locales" (purpose) vs "Estudio español por amor al idioma" (motivation).' },
  { wrong:'Yo gusto el café', right:'Me gusta el café', en:'I like coffee', why:'"Gustar" works backwards: the thing you like is the subject. "Me gusta" literally means "coffee pleases me". Same with encantar, molestar, doler, faltar, quedar.' },
  { wrong:'Este es más mejor', right:'Este es mejor', en:'This is better', why:'"Mejor" already means "more good". Never say "más mejor" or "más peor". Same for "más mayor" / "más menor".' },
  { wrong:'Voy a ir a la playa', right:'Voy a la playa / Iré a la playa', en:'I\'m going to the beach', why:'Redundant double "ir". Use just "voy a + lugar" or the future "iré a + lugar".' },
  { wrong:'Tengo que ir a la mi casa', right:'Tengo que ir a mi casa', en:'I have to go to my house', why:'Don\'t use article + possessive together. Just "mi casa", never "la mi casa".' },
  { wrong:'Quiero que tú vienes', right:'Quiero que tú vengas', en:'I want you to come', why:'"Querer que + otra persona" triggers subjunctive. Any verb of wishing/desiring + "que" + different subject → subjuntivo. WEIRDO rule.' },
  { wrong:'Si tendría dinero, viajaría', right:'Si tuviera dinero, viajaría', en:'If I had money, I\'d travel', why:'Hypothetical "si" clauses use imperfect subjunctive, not conditional. Formula: "Si + imperfecto subjuntivo, + condicional". Never "si + condicional".' },
  { wrong:'En la mañana', right:'Por la mañana', en:'In the morning', why:'In Spain, use "por" with parts of the day: por la mañana, por la tarde, por la noche. "En la mañana" is more Latin American.' },
  { wrong:'Hace dos años que no le veo', right:'Hace dos años que no lo veo', en:'I haven\'t seen him in two years', why:'Use "lo" for direct object (him/it), "le" for indirect object. Spain tolerates leísmo for people, but "lo" is the prescriptive form.' },
  { wrong:'Me caigo bien con ella', right:'Me cae bien ella', en:'I get along with her', why:'"Caer bien" works like "gustar". She falls well to me = I like her. "Ella me cae bien" or just "Me cae bien".' },
  { wrong:'La problema es grande', right:'El problema es grande', en:'The problem is big', why:'"Problema" is masculine despite ending in -a. Same trap: el día, el mapa, el tema, el sistema, el programa, el idioma, el clima, el planeta – all Greek-origin and masculine.' },
  { wrong:'El mano, el foto', right:'La mano, la foto', en:'The hand, the photo', why:'"Mano" is feminine despite ending in -o. "Foto" is short for "fotografía" so it stays feminine. Same: la moto, la radio.' },
  { wrong:'Busco por un piso', right:'Busco un piso', en:'I\'m looking for a flat', why:'"Buscar" never takes "por". The object follows directly. Same with "pedir" (ask for) and "esperar" (wait for) – no preposition in Spanish.' },
  { wrong:'Preguntar una pregunta', right:'Hacer una pregunta', en:'To ask a question', why:'Use "hacer una pregunta", never "preguntar una pregunta" (redundant). "Preguntar algo a alguien" is fine: "Le pregunté dónde vivía".' },
  { wrong:'Escuchar a la música', right:'Escuchar música', en:'To listen to music', why:'No preposition. "Escuchar" is transitive. But for people you DO use "a": "Escucho a mi profesora".' },
  { wrong:'Cada días', right:'Cada día / Todos los días', en:'Every day', why:'"Cada" takes singular. "Cada día" or "cada semana". For plurals use "todos los días".' },
  { wrong:'Soy acuerdo', right:'Estoy de acuerdo', en:'I agree', why:'"Estar de acuerdo", not "ser". Fixed expression – always with "estar" and always with "de".' },
  { wrong:'Es muy importante de practicar', right:'Es muy importante practicar', en:'It is very important to practise', why:'Impersonal "es + adjective + infinitive" takes NO preposition. "Es difícil aprender", "Es necesario estudiar" – all direct.' },
  { wrong:'Aunque es caro, lo compro (uncertain future)', right:'Aunque sea caro, lo compraré', en:'Even if it\'s expensive, I\'ll buy it', why:'"Aunque" + indicative = known fact. "Aunque" + subjunctive = hypothetical or concession about the future. Choose based on certainty.' },
  { wrong:'Me olvidé las llaves', right:'Se me olvidaron las llaves', en:'I forgot the keys', why:'"Accidental se" is very Spanish. "Se me olvidó/olvidaron + thing" pushes blame onto the situation, not you. Same with "se me cayó" (I dropped it), "se me rompió" (it broke on me).' },
  { wrong:'Quiero un poco de agua fría', right:'Quiero un poco de agua fría', en:'I want a little cold water', why:'Watch out: "agua" is feminine but takes "el agua" in singular (stressed initial A-sound). Plural "las aguas", adjective still feminine: "el agua fría".' },
  { wrong:'Más grande que mí', right:'Más grande que yo', en:'Bigger than me', why:'After "que" in comparisons, use subject pronouns (yo, tú, él), not object pronouns (mí, ti). Same after "como", "entre", "excepto", "según".' },
  { wrong:'Muy mucho', right:'Mucho (or muchísimo)', en:'Very much', why:'Never combine "muy" and "mucho". Use "muchísimo" for "very much". "Muy" modifies adjectives/adverbs, "mucho" modifies verbs/nouns.' },
  { wrong:'Hay personas que quieren...', right:'Hay personas que quieran... (hypothetical)', en:'Are there people who want...? (hypothetical)', why:'"Hay" + relative clause: if the antecedent is unknown/hypothetical, use subjunctive. "Busco un amigo que hable inglés" (hypothetical) vs "Tengo un amigo que habla inglés" (known).' },
  { wrong:'Pedí para un café', right:'Pedí un café', en:'I ordered a coffee', why:'"Pedir" means "to ask for" – the "for" is baked in. Never add "por" or "para".' },
  { wrong:'Es la primera vez que voy', right:'Es la primera vez que voy / vaya', en:'It\'s the first time I go', why:'"Es la primera vez que + indicative" is accepted in speech. Formal writing prefers subjunctive: "Es la primera vez que vaya a Madrid".' },
  { wrong:'No tengo ningún dinero', right:'No tengo dinero / No tengo nada de dinero', en:'I don\'t have any money', why:'"Ningún" doesn\'t combine with uncountables. Use "no tengo + noun" or "no tengo nada de + noun". "Ningún" works with countables: "No tengo ningún amigo aquí".' },
];

const PRONUNCIATION_GUIDE = [
  { letter:'a / e / i / o / u', sound:'pure short vowel', example:'casa, mesa, pino, foto, luna', tip:'Spanish vowels never change. They\'re short and clean – never glide like English vowels.' },
  { letter:'c (before a/o/u)', sound:'/k/ as in cat', example:'casa, color, cuna', tip:'Hard "k" sound.' },
  { letter:'c (before e/i)', sound:'/θ/ "th" in Spain', example:'cinco, cena, ciudad', tip:'In Spain (Castilian), "ce/ci" sound like English "th" in "thin". In Latin America, it\'s /s/.' },
  { letter:'g (before a/o/u)', sound:'/g/ as in go', example:'gato, gota, gusto', tip:'Hard "g".' },
  { letter:'g (before e/i)', sound:'/x/ throaty h', example:'gente, gigante', tip:'Like German "ch" in "Bach" or Scottish "loch". A throat sound.' },
  { letter:'h', sound:'silent', example:'hola, hablar, hospital', tip:'Always silent in Spanish. Pronounce "hola" as "ola".' },
  { letter:'j', sound:'/x/ throaty h', example:'jamón, joven, jefe', tip:'Same throaty sound as "g" before e/i. Stronger than English h.' },
  { letter:'ll', sound:'/ʝ/ like English y', example:'llave, calle, pollo', tip:'In most of Spain, like English "y" in "yes". (Older speakers may pronounce it like "ly".)' },
  { letter:'ñ', sound:'/ɲ/ ny', example:'año, niño, mañana', tip:'Like the "ny" in "canyon". Tilde matters: "año" (year) vs "ano" (anus)!' },
  { letter:'qu', sound:'/k/ – u silent', example:'queso, quiero, aquí', tip:'The u is silent. "Queso" sounds like "keso".' },
  { letter:'r (single, middle)', sound:'tap', example:'pero, caro, hablar', tip:'Quick tap of the tongue, like American English "tt" in "butter".' },
  { letter:'rr / r (start)', sound:'rolled trill', example:'perro, rojo, ruido', tip:'Rolled "r". Take time to learn it – "pero" (but) vs "perro" (dog) is meaning-changing.' },
  { letter:'v', sound:'/b/ same as b', example:'vino, vaca, vivir', tip:'V and B sound IDENTICAL in Spanish. Both like a soft English "b".' },
  { letter:'z', sound:'/θ/ "th" in Spain', example:'zapato, zumo, vez', tip:'In Spain, like English "th" in "thin". In Latin America, like /s/.' },
  { letter:'y', sound:'/ʝ/ or /i/', example:'yo, ya, hay', tip:'Like English "y" between vowels. At end of word or alone, sounds like "i" (hay = "ai").' },
  { letter:'b/v at start', sound:'/b/', example:'banco, viento', tip:'Soft b sound. Lips barely close.' },
  { letter:'d (between vowels)', sound:'/ð/ soft th', example:'nada, todo, ciudad', tip:'Like English "th" in "this". In "ciudad" the final d is barely pronounced.' },
];

function VocabTemas({ onBack, dark }) {
  const [selectedTheme, setSelectedTheme] = useState(null);
  const [filter, setFilter] = useState('all');

  const colorAccentMap = {
    orange:'bg-orange-500', green:'bg-green-500', blue:'bg-blue-500',
    amber:'bg-amber-500', indigo:'bg-indigo-500', red:'bg-red-500',
    pink:'bg-pink-500', violet:'bg-violet-500', sky:'bg-sky-500',
    cyan:'bg-cyan-500', rose:'bg-rose-500', teal:'bg-teal-500'
  };

  const handlePracticar = (theme) => {
    const existing = getStorage('aprende.glossary', []);
    const existingEs = new Set(existing.map(e => (e.es || '').toLowerCase()));
    const toAdd = theme.words
      .filter(w => !existingEs.has(w.es.toLowerCase()))
      .map((w, i) => ({
        id: Date.now() + i,
        es: w.es,
        en: w.en,
        type: w.type,
        example: w.example,
        source: `tema:${theme.theme}`,
      }));
    if (toAdd.length === 0) {
      alert(`Todas las palabras de "${theme.titleEs}" ya están en tu glosario. ¡Ve a Vocabulario → Glosario → Tarjetas para repasar!`);
      return;
    }
    setStorage('aprende.glossary', [...toAdd, ...existing]);
    alert(`Añadidas ${toAdd.length} palabras nuevas al glosario (${theme.words.length - toAdd.length} ya existían). ¡Ve a Glosario → Tarjetas para empezar a repasar!`);
  };

  const handleThemeAnki = (theme) => {
    const escape = (s) => String(s || '').replace(/\t/g,' ').replace(/\r?\n/g,'<br>');
    const rows = theme.words.map(w => [
      escape(w.es),
      escape(w.en) + (w.example ? `<br><i>${escape(w.example)}</i>` : ''),
      [w.type, `tema-${theme.theme}`, 'aprende'].filter(Boolean).join(' ')
    ].join('\t'));
    const txt = '#separator:tab\n#html:true\n' + rows.join('\n');
    const blob = new Blob([txt], { type: 'text/plain;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `anki-${theme.theme}-${todayStr()}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  if (selectedTheme) {
    const types = ['all','noun','verb','adj','phrase'];
    const filtered = filter === 'all' ? selectedTheme.words : selectedTheme.words.filter(w => w.type === filter);
    return (
      <div>
        <BackHeader title={selectedTheme.titleEs} subtitle={selectedTheme.titleEn} onBack={() => setSelectedTheme(null)} dark={dark} />
        <div className="px-4 lg:px-8 py-6 max-w-6xl mx-auto">
          <div className="flex flex-wrap gap-2 mb-5">
            <button onClick={() => handlePracticar(selectedTheme)}
              className="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-xl text-sm font-semibold transition-colors">
              📚 Practicar ({selectedTheme.words.length})
            </button>
            <button onClick={() => handleThemeAnki(selectedTheme)}
              className={`px-4 py-2 rounded-xl text-sm font-semibold transition-colors ${dark ? 'bg-white/[0.08] text-stone-200 hover:bg-white/[0.12]' : 'bg-stone-100 text-stone-700 hover:bg-stone-200'}`}>
              🃏 Anki
            </button>
          </div>
          <p className={`text-xs mb-5 ${dark ? 'text-stone-500' : 'text-stone-400'}`}>🃏 <strong>Anki</strong> is a free spaced-repetition flashcard app. Tap the button to export these words, then open Anki → File → Import to load them.</p>
          <div className="mb-5 overflow-x-auto hide-scroll">
            <div className="flex gap-2">
              {types.map(t => (
                <button key={t} onClick={() => setFilter(t)}
                  className={`flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold transition-all ${filter === t ? 'bg-orange-500 text-white' : dark ? 'bg-white/[0.08] text-stone-300' : 'bg-stone-100 text-stone-600'}`}>
                  {t === 'all' ? 'Todos' : t}
                </button>
              ))}
            </div>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            {filtered.map((word, i) => (
              <Card key={i} dark={dark} className="p-5 flex flex-col min-h-[140px]">
                <div className="flex items-center gap-1.5 mb-2">
                  <TypeBadge type={word.type} />
                  <SpeakBtn text={word.es} size="sm" />
                </div>
                <p className="font-serif font-bold text-xl leading-tight mb-1">{word.es}</p>
                <p className={`text-sm font-medium mb-1 ${dark ? 'text-stone-400' : 'text-stone-500'}`}>{word.en}</p>
                {word.example && (
                  <p className={`text-sm italic mt-auto pt-2 ${dark ? 'text-stone-500' : 'text-stone-500'}`}>"{word.example}"</p>
                )}
              </Card>
            ))}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="px-4 lg:px-8 py-6 max-w-5xl mx-auto">
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
        {VOCAB_THEMES.map(theme => (
          <button key={theme.theme} onClick={() => { setSelectedTheme(theme); setFilter('all'); }}
            className={`rounded-2xl p-6 text-left transition-all hover:scale-[1.02] hover:shadow-md min-h-[160px] ${dark ? 'bg-white/[0.04] border border-white/[0.08] hover:bg-white/[0.08]' : 'bg-white border border-stone-200/80 shadow-sm'}`}>
            <div className={`w-12 h-12 rounded-xl flex items-center justify-center text-2xl mb-4 ${colorAccentMap[theme.color] || 'bg-stone-400'} text-white`}>
              {theme.emoji}
            </div>
            <p className="font-bold text-base lg:text-lg leading-tight">{theme.titleEs}</p>
            <p className={`text-sm mt-1 ${dark ? 'text-stone-400' : 'text-stone-500'}`}>{theme.titleEn}</p>
            <p className={`text-xs mt-3 font-semibold ${dark ? 'text-orange-400' : 'text-orange-600'}`}>{theme.words.length} palabras</p>
          </button>
        ))}
      </div>
    </div>
  );
}

function ExerciseView({ exercise, dark, onComplete, onNext, category }) {
  const [userAnswer, setUserAnswer] = useState('');
  const [submitted, setSubmitted] = useState(false);
  const [correct, setCorrect] = useState(false);
  const [selectedOption, setSelectedOption] = useState(null);

  // Match state
  const [leftItems] = useState(() => {
    if (exercise.type !== 'match') return [];
    return [...exercise.pairs].map((p, i) => ({...p, idx: i})).sort(() => Math.random() - 0.5);
  });
  const [rightItems] = useState(() => {
    if (exercise.type !== 'match') return [];
    return [...exercise.pairs].map((p, i) => ({...p, idx: i})).sort(() => Math.random() - 0.5);
  });
  const [selectedLeft, setSelectedLeft] = useState(null);
  const [matched, setMatched] = useState(new Set());
  const [wrongPair, setWrongPair] = useState(null);
  const [matchComplete, setMatchComplete] = useState(false);

  const handleFillSubmit = () => {
    if (!userAnswer.trim()) return;
    const isCorrect = userAnswer.trim().toLowerCase() === exercise.answer.toLowerCase();
    setCorrect(isCorrect);
    setSubmitted(true);
    try {
      const _hist = getStorage('aprende.exercise_history', []);
      const _cat = category || '';
      setStorage('aprende.exercise_history', [..._hist.slice(-300), { id: exercise.id || '', category: _cat, correct: isCorrect, date: Date.now() }]);
    } catch(e) {}
  };

  const handleMCQSelect = (option) => {
    if (submitted) return;
    setSelectedOption(option);
    const isCorrect = option === exercise.answer;
    setCorrect(isCorrect);
    setSubmitted(true);
    try {
      const _hist = getStorage('aprende.exercise_history', []);
      const _cat = category || '';
      setStorage('aprende.exercise_history', [..._hist.slice(-300), { id: exercise.id || '', category: _cat, correct: isCorrect, date: Date.now() }]);
    } catch(e) {}
  };

  const handleTranslationSubmit = () => {
    if (!userAnswer.trim()) return;
    setSubmitted(true);
    setCorrect(true);
  };

  const handleLeftClick = (item) => {
    if (matched.has(item.idx)) return;
    setSelectedLeft(item);
  };

  const handleRightClick = (item) => {
    if (matched.has(item.idx)) return;
    if (!selectedLeft) return;
    if (selectedLeft.idx === item.idx) {
      const newMatched = new Set(matched);
      newMatched.add(item.idx);
      setMatched(newMatched);
      setSelectedLeft(null);
      if (newMatched.size === exercise.pairs.length) {
        setMatchComplete(true);
      }
    } else {
      setWrongPair({ left: selectedLeft.idx, right: item.idx });
      setTimeout(() => {
        setWrongPair(null);
        setSelectedLeft(null);
      }, 700);
    }
  };

  if (exercise.type === 'match') {
    if (matchComplete) {
      return (
        <div className="text-center py-8">
          <p className="text-4xl mb-3">🎉</p>
          <p className="text-xl font-bold mb-2">¡Perfecto!</p>
          <p className={`text-sm mb-6 ${dark ? 'text-stone-400' : 'text-stone-500'}`}>Has emparejado todo correctamente.</p>
          <button onClick={onNext} className="bg-orange-500 text-white px-6 py-2 rounded-xl font-semibold text-sm">Siguiente →</button>
        </div>
      );
    }
    return (
      <div>
        <p className={`text-xs font-bold uppercase tracking-wide mb-1 ${dark ? 'text-stone-400' : 'text-stone-500'}`}>{exercise.type} · Emparejar</p>
        <p className="font-bold text-lg mb-4">{exercise.title}</p>
        <p className={`text-xs mb-4 ${dark ? 'text-stone-500' : 'text-stone-400'}`}>Toca un elemento de la izquierda, luego el correspondiente de la derecha.</p>
        <div className="grid grid-cols-2 gap-3">
          <div className="space-y-2">
            {leftItems.map((item, i) => {
              const isMatched = matched.has(item.idx);
              const isSelected = selectedLeft && selectedLeft.idx === item.idx;
              const isWrong = wrongPair && wrongPair.left === item.idx;
              return (
                <button key={i} onClick={() => handleLeftClick(item)} disabled={isMatched}
                  className={`w-full py-3 px-3 rounded-xl text-sm font-medium text-left transition-all
                    ${isMatched ? 'opacity-0 pointer-events-none' : ''}
                    ${isWrong ? 'bg-red-500 text-white' : ''}
                    ${isSelected && !isWrong ? 'bg-orange-500 text-white' : ''}
                    ${!isSelected && !isWrong && !isMatched ? dark ? 'bg-white/[0.08] text-stone-200 hover:bg-white/[0.12]' : 'bg-stone-100 text-stone-700 hover:bg-stone-200' : ''}
                  `}>
                  {item.left}
                </button>
              );
            })}
          </div>
          <div className="space-y-2">
            {rightItems.map((item, i) => {
              const isMatched = matched.has(item.idx);
              const isWrong = wrongPair && wrongPair.right === item.idx;
              return (
                <button key={i} onClick={() => handleRightClick(item)} disabled={isMatched}
                  className={`w-full py-3 px-3 rounded-xl text-sm font-medium text-left transition-all
                    ${isMatched ? 'opacity-0 pointer-events-none' : ''}
                    ${isWrong ? 'bg-red-500 text-white' : ''}
                    ${!isWrong && !isMatched ? dark ? 'bg-white/[0.08] text-stone-200 hover:bg-white/[0.12]' : 'bg-stone-100 text-stone-700 hover:bg-stone-200' : ''}
                  `}>
                  {item.right}
                </button>
              );
            })}
          </div>
        </div>

}

function TimedQuiz({ onExit, dark }) {
  // Build a pool of MCQ exercises across all categories
  const pool = React.useMemo(() => {
    const all = [];
    EXERCISES.forEach(cat => {
      cat.exercises.forEach(ex => {
        if (ex.type === 'mcq') all.push({ ...ex, category: cat.categoryEs });
      });
    });
    // Compute per-category weakness from history
    const history = getStorage('aprende.exercise_history', []);
    const catStats = {};
    history.forEach(h => {
      if (!catStats[h.category]) catStats[h.category] = { correct: 0, total: 0 };
      catStats[h.category].total++;
      if (h.correct) catStats[h.category].correct++;
    });
    // Weight: weak categories (< 60% in last 10) get 3x representation
    const weighted = [];
    all.forEach(ex => {
      const last10 = history.filter(h => h.category === ex.category).slice(-10);
      const acc = last10.length >= 3 ? (last10.filter(h => h.correct).length / last10.length) : 1;
      const weight = acc < 0.6 ? 3 : 1;
      for (let i = 0; i < weight; i++) weighted.push(ex);
    });
    return weighted.sort(() => Math.random() - 0.5).slice(0, 10);
  }, []);

  const [idx, setIdx] = useState(0);
  const [score, setScore] = useState(0);
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const [timeLeft, setTimeLeft] = useState(30);
  const [finished, setFinished] = useState(false);

  useEffect(() => {
    if (finished || revealed) return;
    if (timeLeft <= 0) {
      setRevealed(true);
      return;
    }
    const t = setTimeout(() => setTimeLeft(t => t - 1), 1000);
    return () => clearTimeout(t);
  }, [timeLeft, revealed, finished]);

  useEffect(() => {
    setSelected(null);
    setRevealed(false);
    setTimeLeft(30);
  }, [idx]);

  if (pool.length === 0) {
    return (
      <div className="text-center py-16">
        <p className="text-stone-500">No hay preguntas disponibles.</p>
        <button onClick={onExit} className="mt-4 px-4 py-2 bg-orange-500 text-white rounded-xl font-semibold">Volver</button>
      </div>
    );
  }

  if (finished) {
    const pct = Math.round((score / pool.length) * 100);
    return (
      <div>
        <BackHeader title="Quiz cronometrado" subtitle="Resultados" onBack={onExit} dark={dark} />
        <div className="px-4 lg:px-8 py-6 max-w-xl mx-auto">
          <Card dark={dark} className="p-8 text-center">
            <p className="text-[10px] font-bold uppercase tracking-widest text-orange-500 mb-2">Resultado final</p>
            <p className="font-serif font-bold text-6xl mb-2">{score}/{pool.length}</p>
            <p className="text-stone-500 mb-6">{pct}% correcto</p>
            <div className={`inline-block px-4 py-2 rounded-full text-sm font-bold ${pct >= 80 ? 'bg-emerald-100 text-emerald-700' : pct >= 50 ? 'bg-amber-100 text-amber-700' : 'bg-rose-100 text-rose-700'}`}>
              {pct >= 80 ? '¡Excelente! 🎉' : pct >= 50 ? 'Bien hecho 👍' : 'Sigue practicando 💪'}
            </div>
            <div className="mt-6 flex gap-2">
              <button onClick={() => window.location.reload()} className="flex-1 bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-xl text-sm font-bold">Otra vez</button>
              <button onClick={onExit} className="flex-1 bg-stone-100 hover:bg-stone-200 text-stone-700 py-3 rounded-xl text-sm font-bold">Volver</button>
            </div>
          </Card>
        </div>
      </div>
    );
  }

  const ex = pool[idx];
  const handleSelect = (opt) => {
    if (revealed) return;
    setSelected(opt);
    setRevealed(true);
    if (opt === ex.answer) setScore(s => s + 1);
  };
  const handleNext = () => {
    if (idx < pool.length - 1) setIdx(i => i + 1);
    else setFinished(true);
  };

  return (
    <div>
      <BackHeader title="Quiz cronometrado" subtitle={`Pregunta ${idx + 1} / ${pool.length}`} onBack={onExit} dark={dark} />
      <div className="px-4 lg:px-8 py-6 max-w-xl mx-auto">
        <div className="flex items-center justify-between mb-4">
          <div className="flex-1 mr-3">
            <div className="h-1.5 rounded-full bg-stone-200">
              <div className="h-1.5 bg-orange-500 rounded-full transition-all" style={{width:`${((idx) / pool.length) * 100}%`}} />
            </div>
          </div>
          <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-sm font-bold ${timeLeft <= 5 ? 'bg-rose-100 text-rose-700 animate-pulse' : 'bg-stone-100 text-stone-700'}`}>
            <span>⏱</span>
            <span>{timeLeft}s</span>
          </div>
        </div>
        <p className="text-xs text-stone-400 mb-2">{ex.category} · Puntos: {score}</p>

        <Card dark={dark} className="p-5">
          <p className="font-semibold text-base mb-4">{ex.question}</p>
          <div className="space-y-2">
            {ex.options.map(opt => {
              const isCorrect = opt === ex.answer;
              const isSelected = opt === selected;
              let cls = 'border-stone-200 hover:border-orange-300 hover:bg-orange-50';
              if (revealed) {
                if (isCorrect) cls = 'border-emerald-400 bg-emerald-50 text-emerald-800';
                else if (isSelected) cls = 'border-rose-400 bg-rose-50 text-rose-800';
                else cls = 'border-stone-200 text-stone-400';
              }
              return (
                <button key={opt} onClick={() => handleSelect(opt)} disabled={revealed}
                  className={`w-full text-left px-4 py-3 rounded-xl border-2 text-sm font-medium transition-all ${cls}`}>
                  {opt} {revealed && isCorrect && ' ✓'} {revealed && isSelected && !isCorrect && ' ✗'}
                </button>
              );
            })}
          </div>
          {revealed && (
            <button onClick={handleNext} className="w-full mt-5 bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-xl text-sm font-bold">
              {idx < pool.length - 1 ? 'Siguiente →' : 'Ver resultados'}
            </button>
          )}
        </Card>
      </div>
    </div>
  );
}

// ------------------------------------------------------------
// Sentence builder drill – random {verb, tense, pronoun} prompts
// reusing CONJUGATOR_VERBS. Two difficulty modes: basic (regular
// -ar/-er/-ir only) and hard (includes irregulars).
// ------------------------------------------------------------
function SentenceBuilderDrill({ onExit, dark }) {
  const pronouns = [
    { es:'yo',       en:'I' },
    { es:'tú',       en:'you (informal)' },
    { es:'él/ella',  en:'he / she' },
    { es:'nosotros', en:'we' },
    { es:'vosotros', en:'you all (Spain)' },
    { es:'ellos',    en:'they' },
  ];
  const tenses = [
    { key:'presente',       label:'Presente' },
    { key:'indefinido',     label:'Pretérito Indefinido' },
    { key:'imperfecto',     label:'Pretérito Imperfecto' },
    { key:'futuro',         label:'Futuro Simple' },
    { key:'condicional',    label:'Condicional' },
    { key:'subjuntivo',     label:'Presente Subjuntivo' },
  ];

  const allVerbs = Object.keys(CONJUGATOR_VERBS);
  const regularVerbs = allVerbs.filter(v => {
    const t = CONJUGATOR_VERBS[v].type || '';
    return t.includes('regular');
  });

  const [difficulty, setDifficulty] = useState('basic'); // 'basic' | 'hard'
  const [prompt, setPrompt] = useState(null);
  const [input, setInput] = useState('');
  const [state, setState] = useState('answering'); // 'answering' | 'correct' | 'wrong'
  const [score, setScore] = useState({ correct:0, total:0 });
  const inputRef = useRef(null);

  const normalise = (s) => (s || '').toString().trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, ''); // strip accents for forgiveness

  const pickPrompt = useCallback(() => {
    const pool = difficulty === 'basic' ? regularVerbs : allVerbs;
    const verb = pool[Math.floor(Math.random() * pool.length)];
    const tense = tenses[Math.floor(Math.random() * tenses.length)];
    const pIdx = Math.floor(Math.random() * pronouns.length);
    const data = CONJUGATOR_VERBS[verb];
    const answer = data && data[tense.key] && data[tense.key][pIdx];
    if (!answer) return pickPrompt(); // fallback if data missing
    return { verb, verbEn: data.en, tense, pronoun: pronouns[pIdx], pronounIdx: pIdx, answer };
  }, [difficulty]);

  useEffect(() => {
    setPrompt(pickPrompt());
    setInput('');
    setState('answering');
  }, [difficulty]);

  useEffect(() => {
    if (state === 'answering' && inputRef.current) inputRef.current.focus();
  }, [prompt, state]);

  const check = () => {
    if (!prompt || !input.trim()) return;
    const correct = normalise(input) === normalise(prompt.answer);
    setScore(s => ({ correct: s.correct + (correct ? 1 : 0), total: s.total + 1 }));
    if (correct) {
      setState('correct');
      setTimeout(() => {
        setPrompt(pickPrompt());
        setInput('');
        setState('answering');
      }, 650);
    } else {
      setState('wrong');
    }
  };

  const next = () => {
    setPrompt(pickPrompt());
    setInput('');
    setState('answering');
  };

  if (!prompt) return null;
  const pct = score.total > 0 ? Math.round((score.correct / score.total) * 100) : 0;

  return (
    <div>
      <BackHeader title="Conjugador drill" subtitle="Sentence builder" onBack={onExit} dark={dark} />
      <div className="px-4 lg:px-8 py-6 max-w-xl mx-auto">
        <div className="hidden lg:flex items-center justify-between mb-6">
          <button onClick={onExit} className={`text-sm font-medium ${dark ? 'text-stone-400 hover:text-white' : 'text-stone-500 hover:text-stone-900'}`}>← Ejercicios</button>
          <span className={`text-xs font-semibold ${dark ? 'text-stone-500' : 'text-stone-400'}`}>{score.correct} / {score.total} · {pct}%</span>
        </div>

        {/* Difficulty toggle */}
        <div className="flex gap-2 mb-5">
          {[{id:'basic',label:'Básico (regulares)'},{id:'hard',label:'Difícil (incluye irregulares)'}].map(d => (
            <button key={d.id} onClick={() => { setDifficulty(d.id); setScore({correct:0,total:0}); }}
              className={`flex-1 px-3 py-2 rounded-xl text-xs font-semibold transition-all ${difficulty === d.id ? 'bg-orange-500 text-white shadow-sm' : dark ? 'bg-white/[0.08] text-stone-300' : 'bg-stone-100 text-stone-600'}`}>
              {d.label}
            </button>
          ))}
        </div>

        {/* Score pill (mobile) */}
        <div className="lg:hidden mb-4 flex items-center justify-end">
          <span className={`text-xs font-semibold px-3 py-1 rounded-full ${dark ? 'bg-white/[0.06] text-stone-400' : 'bg-stone-100 text-stone-500'}`}>{score.correct} / {score.total} · {pct}%</span>
        </div>

        <Card dark={dark} className="p-6">
          <p className={`text-xs font-bold uppercase tracking-wider mb-2 ${dark ? 'text-stone-500' : 'text-stone-400'}`}>Conjuga</p>
          <div className="flex items-center gap-2 mb-1">
            <p className="font-serif font-bold text-3xl">{prompt.verb}</p>
            <SpeakBtn text={prompt.verb} size="sm" />
          </div>
          <p className={`text-sm italic mb-5 ${dark ? 'text-stone-500' : 'text-stone-400'}`}>{prompt.verbEn}</p>

          <div className="grid grid-cols-2 gap-3 mb-5">
            <div className={`rounded-xl p-3 ${dark ? 'bg-white/[0.05]' : 'bg-stone-50'}`}>
              <p className={`text-[10px] font-bold uppercase tracking-wider mb-1 ${dark ? 'text-stone-500' : 'text-stone-400'}`}>Tiempo</p>
              <p className="font-semibold text-sm">{prompt.tense.label}</p>
            </div>
            <div className={`rounded-xl p-3 ${dark ? 'bg-white/[0.05]' : 'bg-stone-50'}`}>
              <p className={`text-[10px] font-bold uppercase tracking-wider mb-1 ${dark ? 'text-stone-500' : 'text-stone-400'}`}>Pronombre</p>
              <p className="font-semibold text-sm">{prompt.pronoun.es}</p>
              <p className={`text-[11px] ${dark ? 'text-stone-500' : 'text-stone-400'}`}>{prompt.pronoun.en}</p>
            </div>
          </div>

          <input
            ref={inputRef}
            type="text"
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => {
              if (e.key === 'Enter') {
                if (state === 'wrong') next(); else check();
              }
            }}
            disabled={state === 'correct'}
            placeholder={`${prompt.pronoun.es} …`}
            className={`w-full rounded-xl px-4 py-3 text-base lg:text-lg font-semibold outline-none border-2 transition-colors ${
              state === 'correct' ? 'border-green-500 bg-green-50 text-green-700' :
              state === 'wrong' ? 'border-red-400 bg-red-50 text-red-700' :
              dark ? 'border-white/[0.1] bg-white/[0.05] focus:border-orange-500' :
              'border-stone-200 focus:border-orange-500'
            }`} />

          {state === 'wrong' && (
            <div className="mt-4 rounded-xl bg-green-50 border border-green-200 p-4">
              <p className="text-[11px] font-bold uppercase tracking-wider text-green-700 mb-1">Respuesta correcta</p>
              <div className="flex items-center gap-2">
                <p className="font-serif font-bold text-xl text-green-800">{prompt.answer}</p>
                <SpeakBtn text={`${prompt.pronoun.es === 'él/ella' ? 'él' : prompt.pronoun.es} ${prompt.answer}`} size="sm" />
              </div>
            </div>
          )}

          <div className="mt-5 flex gap-2">
            {state === 'answering' && (
              <button onClick={check} className="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3 rounded-xl transition-colors">
                Comprobar
              </button>
            )}
            {state === 'wrong' && (
              <button onClick={next} className="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3 rounded-xl transition-colors">
                Siguiente →
              </button>
            )}
            {state === 'correct' && (
              <button disabled className="flex-1 bg-green-500 text-white font-semibold py-3 rounded-xl opacity-90">
                ¡Correcto! ✓
              </button>
            )}
          </div>
        </Card>

        <p className={`mt-4 text-xs text-center ${dark ? 'text-stone-500' : 'text-stone-400'}`}>
          Tip: los acentos no son obligatorios – si lo tecleas sin tilde, cuenta como correcto.
        </p>
      </div>
    </div>
  );
}
